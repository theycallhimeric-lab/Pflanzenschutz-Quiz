<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pflanzenschutz-Profi | Prüfungstraining 3. Lehrjahr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a3328;
    --moss: #2d5a40;
    --sage: #4a7c59;
    --mint: #a8d5b5;
    --cream: #f5f0e8;
    --gold: #c9893a;
    --gold-light: #e8b86d;
    --earth: #6b4423;
    --red: #8b2635;
    --red-light: #fce8eb;
    --green-light: #e8f5ec;
    --white: #ffffff;
    --text: #1a2620;
    --text-muted: #5a6e62;
    --border: #dce8e0;
    --shadow: rgba(26,51,40,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: var(--forest);
    position: relative;
    overflow: hidden;
    padding: 48px 24px 40px;
    text-align: center;
  }

  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 20% 50%, rgba(74,124,89,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 50% 70% at 80% 50%, rgba(201,137,58,0.15) 0%, transparent 60%);
  }

  .header-inner { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; }

  .header-badge {
    display: inline-block;
    border: 1px solid rgba(201,137,58,0.5);
    color: var(--gold-light);
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 18px;
    font-weight: 500;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 12px;
  }

  .header h1 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .header p {
    color: var(--mint);
    font-size: 0.95rem;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* leaf decoration */
  .leaf-deco {
    position: absolute;
    font-size: 7rem;
    opacity: 0.07;
    pointer-events: none;
  }
  .leaf-deco.l1 { top: -10px; left: -10px; transform: rotate(-20deg); }
  .leaf-deco.l2 { bottom: -20px; right: -10px; transform: rotate(40deg); }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    justify-content: center;
    gap: 40px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--forest);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }

  .stat-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  /* ── MAIN ── */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--gold));
    border-radius: 6px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .progress-label {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--white);
    border-radius: 20px;
    padding: 36px 36px 28px;
    box-shadow: 0 4px 24px var(--shadow);
    margin-bottom: 16px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--moss), var(--gold));
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .q-category {
    background: var(--green-light);
    color: var(--moss);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .q-number {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: auto;
  }

  .q-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.22rem;
    line-height: 1.5;
    color: var(--forest);
    margin-bottom: 28px;
  }

  /* ── ANSWER OPTIONS ── */
  .options-grid {
    display: grid;
    gap: 10px;
  }

  .opt-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--cream);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--text);
    transition: all 0.18s ease;
    line-height: 1.4;
  }

  .opt-btn:hover:not(:disabled) {
    background: var(--green-light);
    border-color: var(--sage);
    transform: translateX(4px);
  }

  .opt-letter {
    min-width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--border);
    color: var(--text-muted);
    font-size: 0.78rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s ease;
    letter-spacing: 0.05em;
  }

  .opt-btn:hover:not(:disabled) .opt-letter {
    background: var(--sage);
    color: white;
  }

  .opt-btn.correct {
    background: var(--green-light) !important;
    border-color: var(--sage) !important;
    transform: none;
  }
  .opt-btn.correct .opt-letter {
    background: var(--moss) !important;
    color: white !important;
  }

  .opt-btn.wrong {
    background: var(--red-light) !important;
    border-color: var(--red) !important;
    transform: none;
  }
  .opt-btn.wrong .opt-letter {
    background: var(--red) !important;
    color: white !important;
  }

  .opt-btn:disabled { cursor: default; }

  /* ── FEEDBACK ── */
  .feedback {
    display: none;
    margin-top: 18px;
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.6;
    animation: slideUp 0.25s ease;
  }

  .feedback.correct-fb {
    background: var(--green-light);
    border-left: 4px solid var(--sage);
    color: var(--forest);
  }

  .feedback.wrong-fb {
    background: var(--red-light);
    border-left: 4px solid var(--red);
    color: #4a1020;
  }

  .feedback-icon { font-size: 1.1rem; margin-right: 6px; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── NEXT BUTTON ── */
  .next-btn {
    display: none;
    width: 100%;
    padding: 16px;
    background: var(--forest);
    color: var(--white);
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    letter-spacing: 0.03em;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .next-btn::after {
    content: '→';
    margin-left: 8px;
    display: inline-block;
    transition: transform 0.2s ease;
  }

  .next-btn:hover {
    background: var(--moss);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(26,51,40,0.25);
  }

  .next-btn:hover::after { transform: translateX(4px); }

  /* ── RESULT SCREEN ── */
  .result-card {
    background: var(--white);
    border-radius: 20px;
    padding: 48px 36px;
    text-align: center;
    box-shadow: 0 4px 24px var(--shadow);
    border: 1px solid var(--border);
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-icon { font-size: 3.5rem; margin-bottom: 16px; }

  .result-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--forest);
    margin-bottom: 8px;
  }

  .score-display {
    margin: 24px 0;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
  }

  .score-number {
    font-family: 'DM Serif Display', serif;
    font-size: 5rem;
    color: var(--moss);
    line-height: 1;
  }

  .score-unit {
    font-size: 1.5rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin: 24px 0;
    padding: 20px;
    background: var(--cream);
    border-radius: 12px;
  }

  .breakdown-item {
    text-align: center;
  }

  .breakdown-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    display: block;
  }

  .breakdown-num.good { color: var(--moss); }
  .breakdown-num.bad { color: var(--red); }

  .breakdown-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .result-msg {
    font-size: 0.95rem;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 440px;
    margin: 0 auto 28px;
  }

  .restart-btn {
    display: inline-block;
    padding: 16px 40px;
    background: var(--forest);
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    background: var(--moss);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(26,51,40,0.25);
  }

  /* ── INTRO SCREEN ── */
  .intro-card {
    background: var(--white);
    border-radius: 20px;
    padding: 48px 36px;
    text-align: center;
    box-shadow: 0 4px 24px var(--shadow);
    border: 1px solid var(--border);
  }

  .intro-icon { font-size: 3rem; margin-bottom: 16px; }

  .intro-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--forest);
    margin-bottom: 12px;
  }

  .intro-desc {
    color: var(--text-muted);
    font-size: 0.95rem;
    line-height: 1.7;
    margin-bottom: 28px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 32px;
    text-align: left;
  }

  .topic-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--cream);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--forest);
  }

  .topic-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--sage);
    flex-shrink: 0;
  }

  .start-btn {
    display: inline-block;
    padding: 18px 52px;
    background: var(--forest);
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .start-btn:hover {
    background: var(--moss);
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(26,51,40,0.3);
  }

  /* ── BILD-FRAGEN ── */
  .q-image {
    margin: 0 auto 22px;
    display: flex;
    justify-content: center;
    background: #f0f6f2;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid var(--border);
    max-width: 340px;
  }
  .q-image svg { width: 100%; height: auto; max-height: 180px; display: block; }
  .q-category.cat-ghs      { background: #fff0f0; color: #8b2635; }
  .q-category.cat-techbild { background: #fff8e6; color: #7a5200; }
  .q-category.cat-krank    { background: #f0fdf4; color: #2d5a40; }
  .q-category.cat-bbch     { background: #e8f4ff; color: #1a4080; }

  /* responsive */
  @media (max-width: 500px) {
    .q-card { padding: 24px 20px 20px; }
    .stats-bar { gap: 24px; }
    .topics-grid { grid-template-columns: 1fr; }
    .q-text { font-size: 1.08rem; }
    .q-image { padding: 10px; }
  }
</style>
</head>
<body>

  <div class="leaf-deco l1">🌿</div>
  <div class="leaf-deco l2">🌾</div>
  <div class="header-inner">

</div>

<script>
const fullPool = [{"c":"Technik","q":"Welchen physikalischen Effekt nutzt eine Injektordüse (IDK/IDKN) zur Abdriftminderung und warum entstehen dabei gröbere Tropfen?","o":["Das Venturi-Prinzip saugt Luft in die Düse; Luft-Flüssigkeits-Mischung erzeugt blasige, schwere Tropfen mit geringer Abdrift","Elektrostatik lädt Tropfen negativ auf; elektrostatische Abstoßung erzeugt größere, schwerer fallende Tröpfchen","Zentrifugalkraft durch schnelle Rotation schleudert Flüssigkeit in flachen Bogen mit reduzierten Feintropfen","Kapillarwirkung saugt Luft durch enge Kanäle; Luftblasen heben Tröpfchen an und reduzieren ihre Auftreffenergie"],"a":0,"e":"Injektordüsen (Venturi-Prinzip) saugen Umgebungsluft an. Luft und Flüssigkeit vermischen sich zu blasigen, deutlich schwereren Tropfen – diese haben eine viel geringere Abdriftneigung als feine Tropfen klassischer Flachstrahldüsen."},{"c":"Technik","q":"Was bewirkt ein zu hoher Spritzdruck (z. B. > 6 bar bei Flachstrahldüsen) in Bezug auf Abdrift und Wirkung?","o":["Zu hoher Druck zerkleinert die Flüssigkeit in Feinst-Tröpfchen, die stark abdriften und das Ziel verfehlen","Zu hoher Druck erhöht die Tropfengröße und verbessert dadurch die Flächenabdeckung","Zu hoher Druck schaltet das Antitropfventil dauerhaft ab und erzeugt Nachtropfen","Zu hoher Druck erwärmt die Brühe über 30 °C und zersetzt hitzeempfindliche Wirkstoffe"],"a":0,"e":"Höherer Druck zerschlägt die Flüssigkeit in immer feinere Tröpfchen. Feine Tropfen sind windanfällig und können sich in der Luft halten, bevor sie das Ziel erreichen."},{"c":"Technik","q":"Welcher ISO-Farbcode kennzeichnet eine Düsengröße '03' (0,3 US-gal/min bei 2,76 bar)?","o":["Rot","Gelb","Blau","Lila"],"a":2,"e":"ISO-Norm 10625: 01=Orange, 02=Gelb, 03=Blau, 04=Rot, 05=Braun, 06=Grau, 08=Weiß, 10=Gelb (höhere Reihe)."},{"c":"Technik","q":"Warum ist die Gestängehöhe bei 110°-Düsen auf exakt 50 cm über dem Zielbestand zu halten – was passiert bei zu großem oder zu geringem Abstand?","o":["Bei 50 cm überlappen sich die Spritzkegel dreifach; zu viel Abstand = Abdrift, zu wenig = Lücken im Streifen","Bei 50 cm verhindert ein Sicherheitsventil das Überspritzen des Feldrandstreifens","Bei 50 cm aktiviert sich der automatische Abdrift-Sensor und reduziert den Druck","Bei 50 cm werden Antitropfventile durch Schwerkraft korrekt gespannt und schließen dicht"],"a":0,"e":"110°-Düsen sind auf 50 cm Höhe ausgelegt, damit die Spritzkegel exakt mehrfach überlappen und eine gleichmäßige Querverteilung entsteht. Größerer Abstand = mehr Abdrift; kleiner Abstand = Lücken zwischen den Kegeln."},{"c":"Technik","q":"Was ist die Aufgabe des Windkessels an einer Kolbenmembranpumpe?","o":["Er dämpft Druckpulse der Pumpe durch ein Luftpolster und sorgt für gleichmäßigen Spritzstrahl","Er speichert kinetische Energie und gibt sie beim Bremsen als Hydraulikdruck wieder frei","Er verbessert die Brühehomogenität im Tank durch gleichmäßige Druckverteilung im Kreislauf","Er regelt die Rührwerkdrehzahl proportional zum Fahrtempo über ein Hydraulikventil"],"a":0,"e":"Kolbenmembranpumpen fördern stoßweise. Der Windkessel (ein Druckbehälter mit Luftpolster) puffert die Druckspitzen und gibt die gespeicherte Energie zwischen den Hüben ab – so fließt die Brühe gleichmäßig."},{"c":"Technik","q":"Welches Bauteil verhindert das Nachtropfen der Düsen, nachdem der Spritzdruck abgefallen ist?","o":["Druckbegrenzungsventil – begrenzt den maximalen Betriebsdruck und schützt die Pumpe vor Überlastung","Gleichdruckregler – hält den Düsendruck konstant beim Schalten von Teilbreiten","Membran-Antitropfventil (Anti-Drip) – schließt bei Druckabfall und verhindert Nachtropfen","Saugfilter – reinigt die Brühe vor der Pumpe und schützt Membranen vor Partikelschäden"],"a":2,"e":"Das Membranventil in der Düsenkappe schließt bei einem Druckabfall unter ca. 0,5–0,7 bar federbelastet – kein Nachtropfen auf der Wendfahrt, keine Schäden durch Doppelüberlappung."},{"c":"Technik","q":"Wie halbiert man die Ausbringmenge (l/ha), ohne die Düsen zu wechseln?","o":["Fahrgeschwindigkeit verdoppeln ODER Druck so weit senken, dass Düsendurchfluss halbiert wird","Motor auf halbe Leerlaufdrehzahl reduzieren und Pumpenhub mechanisch auf Minimum stellen","Tank zur Hälfte entleeren und mit sauberem Wasser auffüllen, um die Konzentration zu halbieren","Rührwerk abschalten, damit Wirkstoff sedimentiert und die aktive Konzentration in der Brühe sinkt"],"a":0,"e":"Ausbringmenge = Durchfluss ÷ Fahrgeschwindigkeit × Korrekturfaktor. Verdoppelt man die Geschwindigkeit, wird auf der gleichen Fläche pro Zeiteinheit doppelt so schnell gefahren, also halbiert sich die Menge."},{"c":"Technik","q":"Ab welchem Nennvolumen ist ein Spülwassertank (mind. 10 % des Nennvolumens) gesetzlich vorgeschrieben?","o":["Ab 100 Liter","Ab 400 Liter","Ab 1000 Liter","Alle Feldspritzen, unabhängig vom Volumen"],"a":1,"e":"Die Pflanzenschutzgeräte-Verordnung verlangt ab 400 Litern Nennvolumen einen separaten Spülwassertank mit mind. 10 % des Nennvolumens zur Feldvorreinigung."},{"c":"Technik","q":"In welchem Intervall müssen Pflanzenschutzgeräte (Feldspritzen) nach der aktuellen Pflanzenschutzgeräte-Verordnung amtlich geprüft werden?","o":["Alle 3 Jahre (6 Kalenderhalbjahre) – Plakette 2024 → nächste Prüfung spätestens 1. Halbjahr 2027","Alle 2 Jahre – gilt für alle Spritzen über 200 Liter Tankvolumen seit 2018","Jährlich – außer bei neuen Geräten, die eine 5-jährige Erstbetriebsfreigabe besitzen","Alle 5 Jahre – Intervall wurde 2020 im Zuge der Farm-to-Fork-Strategie verlängert"],"a":2,"e":"Der Prüfintervall beträgt 3 Jahre (6 Kalenderhalbjahre). Eine gültige Plakette von 2024 bedeutet: nächste Prüfung spätestens im 1. Halbjahr 2027."},{"c":"Technik","q":"Was misst der Variationskoeffizient (V-Wert) bei der Spritzen-Prüfung, und welcher Grenzwert gilt?","o":["Gleichmäßigkeit der Querverteilung über die Arbeitsbreite; Grenzwert ≤ 7 % (Neugerat) / 9 % (alt)","Druckdifferenz zwischen Saugseite und Druckseite der Pumpe; Grenzwert 0,5 bar Abweichung","Anteil der Feintropfen unter 100 µm; Grenzwert maximal 15 % des Gesamtvolumens","Abweichung der Fahrgeschwindigkeit vom Sollwert; Grenzwert ± 2 km/h bei GPS-Steuerung"],"a":0,"e":"Ein V-Wert über 7 % (Neugeräte) bzw. 9 % (Gebrauchtgeräte) zeigt ungleichmäßige Querverteilung – der Bestand wird fleckig behandelt, Wirkungslücken entstehen."},{"c":"Technik","q":"Was bewirkt ein undichter Saugfilter (Nebenluft)?","o":["Die Pumpe zieht Luft, baut keinen stabilen Druck auf, der Spritzstrahl reißt ab und schäumt","Der Filter gibt Druck frei und die Spritze drückt zu viel aus","Das Rührwerk läuft zu schnell","Der Tank überfüllt sich"],"a":0,"e":"Nebenluft am Saugfilter führt zu Kavitation in der Pumpe. Ohne stabilen Unterdruck bricht die Förderleistung zusammen – Spritzstrahl wird ungleichmäßig oder reißt ab."},{"c":"Technik","q":"Was ist die Funktion des Gleichdruckreglers (Gleichdruckarmatur) beim Abschalten von Teilbreiten?","o":["Er leitet überschüssige Flüssigkeit in den Tank zurück und hält den Düsendruck konstant","Er schaltet die Pumpe bei Teilbreitenbetrieb auf halbe Drehzahl um","Er öffnet ein Bypass-Ventil und schleust Teilbreiten-Brühe in den Spülwassertank","Er aktiviert automatisch den Windkessel, wenn eine Teilbreite abgeschaltet wird"],"a":0,"e":"Wenn Teilbreiten abgeschaltet werden, würde der Druck im System steigen. Der Gleichdruckregler leitet überschüssige Flüssigkeit in den Tank zurück und hält den Düsendruck stabil."},{"c":"Technik","q":"Für was steht die JKI-Anerkennung von 'Verlustmindernden Geräten' und welche Minderungsklassen gibt es?","o":["Anerkannte Geräte-Kombination (Düse/Druck/Höhe) mit 50, 75 oder 90 % weniger Abdrift als Referenztechnik","Staatliche Förderprämie für Betriebe, die Injektordüsen auf allen Schlägen einsetzen","Pflichtprüfung für alle Spritzen, die auf Betrieben mit Wasserschutzauflagen eingesetzt werden","Zertifizierungssystem für Spritzentechniker mit drei Stufen: Bronze, Silber, Gold"],"a":0,"e":"Nur JKI-anerkannte Kombinationen aus Düsentyp, Betriebsdruck und Gestängehöhe dürfen bei NW-Auflagen (z. B. NW 603, NW 605) zur Abstandsreduzierung genutzt werden."},{"c":"Technik","q":"Wie verhält sich die Ausbringmenge (l/ha), wenn die Fahrgeschwindigkeit von 8 km/h auf 10 km/h erhöht wird (alle anderen Werte gleich)?","o":["Die Menge sinkt um 20 %","Die Menge steigt um 20 %","Die Menge bleibt gleich","Die Menge halbiert sich"],"a":0,"e":"Ausbringmenge ~ 1/Geschwindigkeit. Wenn die Geschwindigkeit um 25 % steigt (8→10 km/h), sinkt die Menge um 20 % (10/8 = 1,25 → 1/1,25 = 0,8)."},{"c":"Technik","q":"Welches Bauteil schützt das öffentliche Trinkwassernetz beim Befüllen aus dem Hydranten vor PSM-Kontamination?","o":["Systemtrenner (BA/CA) verhindert, dass PSM bei Druckabfall ins Trinkwassernetz zurückgesaugt werden","Feinfilter am Hydranten hält Schmutzpartikel aus dem Netz fern und schützt die Pumpe","Rückschlagventil am Tank-Zulauf stoppt die Befüllung automatisch bei Überfüllung","Druckminderer am Befüllschlauch verhindert Überdruck und Leitungsbruch am Hydrant"],"a":0,"e":"Der Systemtrenner verhindert hydraulisch, dass Pflanzenschutzmittel durch Druckabfall im Netz in die öffentliche Wasserleitung zurückgesaugt werden (gesetzliche Pflicht)."},{"c":"Recht","q":"Was besagt das Minimierungsgebot im Pflanzenschutzgesetz und worauf zielt der Integrierte Pflanzenschutz (IPS)?","o":["PSM-Einsatz auf das notwendige Minimum beschränken; chemische Maßnahmen erst nach Ausschöpfung anderer Methoden","PSM so früh wie möglich präventiv einsetzen, um Schäden vor dem Entstehen zu verhindern","Immer das günstigste Mittel wählen, um Betriebskosten gering zu halten","Spritzungen grundsätzlich auf Abend- und Nachtstunden beschränken"],"a":0,"e":"Das Minimierungsgebot verlangt, dass PSM nur so viel und so oft eingesetzt werden, wie wirklich notwendig. Der IPS priorisiert ackerbauliche, biologische und mechanische Maßnahmen vor der Chemie."},{"c":"Recht","q":"Wie lang ist die gesetzliche Aufbrauchfrist nach dem Widerruf der Zulassung eines Pflanzenschutzmittels (Regelfall)?","o":["Sofortiges Verkaufs- und Anwendungsverbot","6 Monate Abverkauf + 12 Monate Aufbrauch nach Widerrufsdatum","Bis Ende des übernächsten Kalenderjahres","5 Jahre, sofern kein Umweltrisiko besteht"],"a":1,"e":"Die Standardregelung: 6 Monate darf der Handel noch abgeben, danach 12 Monate darf der Landwirt vorhandene Bestände aufbrauchen. Bei akutem Risiko kann die Behörde kürzere Fristen setzen."},{"c":"Recht","q":"Was bedeutet die Bienenschutz-Einstufung 'B1' auf einem Insektizid?","o":["Absolut bienengefährlich; Anwendung auf blühende Bestände oder Begleitkrautflora verboten","Bedingt bienengefährlich; Anwendung nur morgens vor 7 Uhr und abends nach 20 Uhr zulässig","Unbedenklich für Honigbienen, aber giftig für Hummeln und solitäre Wildbienen","Bienenschutz nur bei Direktkontakt; Abdrift ist nach B1-Einstufung zulässig"],"a":0,"e":"B1 = höchste Gefahrenklasse. Jede Anwendung auf blühende Bestände oder Bestände mit blühendem Unkraut ist verboten – unabhängig von Tageszeit oder Witterung."},{"c":"Recht","q":"Wie lange muss das Pflanzenschutz-Anwendertagebuch (Dokumentation) aufbewahrt werden?","o":["3 Jahre ab Ende des Anwendungsjahres; Pflicht für alle beruflichen Anwender nach § 67 PflSchG","1 Jahr; Frist gilt ab dem Tag der letzten Anwendung auf dem jeweiligen Schlag","5 Jahre; nur für Betriebe mit mehr als 100 ha bewirtschafteter Fläche","10 Jahre; gilt für Mittel mit Grundwasserrelevanz (Kennzeichnung GW 1)"],"a":1,"e":"Das PflSchG (§ 67 Abs. 3) schreibt 3 Jahre Aufbewahrung ab dem Ende des Kalenderjahres der Anwendung vor. Die Pflicht gilt für alle beruflichen Anwender."},{"c":"Recht","q":"Welche Behörde erteilt die Zulassung für Pflanzenschutzmittel in Deutschland?","o":["Das Julius Kühn-Institut (JKI)","Das Bundesamt für Verbraucherschutz und Lebensmittelsicherheit (BVL)","Das Umweltbundesamt (UBA)","Die zuständige Landwirtschaftsbehörde des Bundeslandes"],"a":1,"e":"Das BVL entscheidet über die Zulassung, nachdem JKI (Wirksamkeit/Rückstände), UBA (Umweltwirkungen) und BfR (Verbraucher-/Anwenderschutz) fachlich bewertet haben."},{"c":"Recht","q":"Warum ist die Anwendung von Pflanzenschutzmitteln auf einer asphaltierten Einfahrt oder einem gepflasterten Hofplatz in Deutschland verboten?","o":["Verboten, weil versiegelte Flächen als Nichtkulturland gelten und PSM ungefiltert in Kanalisation/Gewässer gelangen","Erlaubt mit zugelassenen Totalherbiziden, wenn diese ausdrücklich für befestigte Flächen zugelassen sind","Nur verboten bei Regenwetter; bei Trockenheit trocknet das Mittel auf und richtet keinen Schaden an","Erlaubt bis 10 m von öffentlichen Gewässern; darüber hinaus ist Genehmigung der Behörde nötig"],"a":0,"e":"§ 12 PflSchG verbietet die Anwendung auf befestigten Flächen außerhalb der Landwirtschaft ausdrücklich. PSM auf Asphalt können nicht abgebaut werden und gelangen ungefiltert ins Grundwasser oder in Gewässer."},{"c":"Recht","q":"Was besagt die 'NW 605'-Auflage, und wie kann der Abstand durch verlustmindernde Technik reduziert werden?","o":["5 m Abstand zu Gewässern; reduzierbar auf 0 m mit nachgewiesener 90-%-Abdriftminderungstechnik","20 m Abstand zu Naturwäldern; nicht reduzierbar, auch nicht mit anerkannter Technik","1 m Abstand zur Schlaggrenze; gilt unabhängig von Gewässernähe und Windrichtung","50 m Abstand zu Trinkwasserschutzzonen I; keine Ausnahme für Niedrigdosismittel"],"a":0,"e":"NW 605 = 5 m Abstand zu Gewässern. Mit anerkannter 90-%-Abdriftminderungstechnik kann dieser auf 0 m reduziert werden (Eintrag ins Spritztagebuch Pflicht)."},{"c":"Recht","q":"Was bedeutet 'MRL' (Maximum Residue Level) und welche Konsequenz hat eine Überschreitung?","o":["Rückstandshöchstgehalt im Lebensmittel; Überschreitung = Vermarktungsverbot und Strafverfolgung","Mindestrestmenge im Tank nach Spritzung; darf nicht übertreten werden, sonst droht Bußgeld","Maximale Regenmenge in 24 h nach der Anwendung; bei Überschreitung ist Wiederholung nötig","Maximaler Restwirkstoffgehalt im Boden nach der Ernte; relevant nur für Zulassungsbehörden"],"a":0,"e":"MRL-Werte schützen Verbraucher. Werden sie überschritten, muss die Charge vernichtet oder umgewidmet werden. Strafrechtliche Konsequenzen für den Erzeuger sind möglich."},{"c":"Umwelt","q":"Was regeln 'NW-Auflagen' (z. B. NW 603, NW 605) im Zulassungsbescheid?","o":["Mindestabstände zu Oberflächengewässern zum Schutz aquatischer Organismen; ggf. reduzierbar mit verlustmindernder Technik","Mindestabstände zu Naturwäldern; nur für forstlich eingesetzte Fungizide relevant","Spritzverbote bei Nacht zum Schutz nachtaktiver Insekten wie Fledermäuse und Nachtfalter","Nachbauwartezeiten für PSM-belastete Böden; definiert den frühestmöglichen Folgeanbau"],"a":0,"e":"NW = Naturschutz Wasser. Die Auflagen legen Mindestabstände von 5, 10 oder 20 m zu Gewässern fest und erlauben unter Bedingungen (anerkannte Technik) eine Reduzierung."},{"c":"Umwelt","q":"Welche Windgeschwindigkeit gilt als praktische Obergrenze für Pflanzenschutzspritzungen im Freiland?","o":["1 m/s – ab Windstille sind selbst gröbste Injektordüsen nicht abdriftfrei einzusetzen","3 m/s – oberhalb dieser Windstärke sind alle Mittel mit NW-Auflagen generell verboten","5 m/s – ab Windstärke 3 ist auch mit verlustmindernder Technik kaum kontrollierbare Abdrift","10 m/s – erst Windstärke 5 erfordert laut EU-Rahmenrichtlinie einen Spritzstopp"],"a":2,"e":"Ab 5 m/s ist auch mit Injektordüsen die Abdrift kaum noch kontrollierbar. Für besonders empfindliche Gewässer-Schutzauflagen können geringere Schwellenwerte gelten."},{"c":"Umwelt","q":"Wie ist mit Restbrühe im Spritztank nach der Behandlung korrekt zu verfahren?","o":["Zehnfach mit Wasser verdünnen und auf der behandelten Fläche ausspritzen – nie in Kanalisation","Im Hofgully ablassen, wenn der Betrieb eine Kläranlage mit PSM-Aktivkohle-Filterstufe betreibt","Auf dem Kompost entsorgen, da Mikroorganismen im Kompost PSM-Wirkstoffe vollständig abbauen","Restbrühe kann versiegelt im Tank bis zur nächsten Saison aufbewahrt werden, wenn Temperatur passt"],"a":0,"e":"Verdünnte Restbrühe auf die Behandlungsfläche ausbringen ist die einzig legale Feldmethode. Abwasser-Einleitung von PSM ist eine Straftat; Biobed-Anlagen sind eine weitere Option für Hofwaschwasser."},{"c":"Umwelt","q":"Wofür steht das GHS09-Gefahrenpiktogramm (Baum mit totem Fisch)?","o":["Gewässergefährdung: Mittel ist für aquatische Organismen akut oder chronisch toxisch","Holzschutzmittel: das Mittel greift Holz an und darf nur mit zugelassenen Geräten ausgebracht werden","Kältegefahr: Mittel darf unter 0 °C nicht gelagert werden und muss frostsicher transportiert werden","Fischkrankheit: Mittel ist nur in Teichanlagen und Aquakulturen verboten, im Freiland erlaubt"],"a":0,"e":"GHS09 warnt vor akuter oder chronischer Gefährdung für Wasserorganismen (Fische, Kleinkrebse, Algen). Das Piktogramm ist Pflicht bei Einstufung als aquatisch gefährlich (H400/H410 usw.)."},{"c":"Umwelt","q":"Was ist ein 'Bio-Bed' und wozu dient es auf dem Betrieb?","o":["Filtersystem aus Stroh, Humus und Erde, das PSM-Rückstände im Waschwasser biologisch abbaut","Blühstreifen am Hofrand zur Förderung von Nützlingen und Bestäubern im Betriebsumfeld","Abgedeckte Lagerfläche für leere Pflanzenschutzmittelgebinde vor der Rückgabe","Spülsystem mit Aktivkohlefilter für die Innenreinigung des Spritzentanks"],"a":0,"e":"Im Bio-Bed bauen Bodenmikroorganismen (Pilze und Bakterien) Pflanzenschutzmittelrückstände im Abwasser der Spritzenreinigung ab, bevor das Wasser in den Boden gelangt."},{"c":"Umwelt","q":"Warum sollte bei Temperaturen über 25 °C nicht gespritzt werden?","o":["Hohe Verdunstung der Tröpfchen (Drift als Dampf), erhöhte Phytotoxizitätsgefahr und schlechtere Wirkung","Traktormotoren überhitzen bei >25 °C; daher sind Pausen vorgeschrieben","Düsen geben bei >25 °C einen breiteren Spritzwinkel ab, der NW-Abstände verletzt","Pflanzenschutzmittel kristallisieren bei Hitze im Tank und verstopfen den Saugfilter"],"a":0,"e":"Hohe Temperaturen beschleunigen die Verdunstung feiner Tröpfchen (Drift als Dampf), können Blattverbrennungen auslösen (Phytotoxizität) und vermindern die Wirkstoffmenge, die tatsächlich auf dem Blatt ankommt."},{"c":"Biologie","q":"Woran erkennt man Gelbrost (Puccinia striiformis) im Winterweizen – und wie unterscheidet er sich vom Braunrost?","o":["Gelbe Sporenpusteln in Längsstreifen entlang der Blattadern; kühle, feuchte Witterung begünstigt Ausbreitung","Runde, dunkelorangefarbene Pusteln zufällig verteilt; optimale Sporenkeimung bei 20–25 °C","Weißer mehliger Belag auf der Blattoberseite; breitet sich bei trockener Wärme aus","Netzartige, braune Läsionen mit hellen Zentren; hohe Sporenproduktion bei Blattnässe"],"a":0,"e":"Gelbrost bildet charakteristische Streifen (wie eine Schraff-Linie) entlang der Blattadern – daher 'Streifenrost'. Braunrost bildet unregelmäßig verteilte, runde orangebraune Sporenhäufchen (Uredien)."},{"c":"Biologie","q":"Was sind die charakteristischen Merkmale von Septoria tritici (Blattdürre) im Weizen?","o":["Nekrotische Blattflecken mit kleinen schwarzen Pyknidien darin; Verbreitung durch Regenspritzer von unten","Gelb-orangefarbene Sporenpusteln in Streifenform; werden durch Wind über weite Strecken verbreitet","Weißer abwischbarer Belag auf Blattoberseite; bildet Kleistothezien bei trockener Witterung","Graugrüne Flecken mit dunklem Rand; Pyknidien sitzen auf der Blattunterseite in Reihen"],"a":0,"e":"Die schwarzen Pyknidien (Sporenträger des Pilzes) im Inneren der braungrauen Flecken sind das Schlüsselmerkmal zur Unterscheidung von Septoria tritici von anderen Weizenkrankheiten."},{"c":"Biologie","q":"Welches Symptom verursacht Fusarium spp. an der Weizenähre, und welches toxikologische Risiko besteht?","o":["Rötliche bis lachsfarbene Sporenpolster an Ährenspindeln und Spelzen; oft verbunden mit Taubährigkeit","Braune, wässrige Verfärbung der Spelzen mit weißem Sporenstaub; überträgt Mykotoxine auf Körner","Weißliche Verbleiching der Ähre von der Spitze her; Erreger wächst durch den Halmquerschnitt","Schwarze Staubmasse, die die gesamte Ähre ersetzt; sporenhaltig, auf Wind angewiesen"],"a":0,"e":"Fusarium-Infektionen zur Blüte erzeugen das gefährliche Mykotoxin DON. Es ist hitzestabil und kann sich im Mehl anreichern – Grenzwerte für Backweizen sind streng reglementiert."},{"c":"Biologie","q":"Was ist Halmbruch (Pseudocercosporella herpotrichoides / Oculimacula spp.) und welches typische Symptom tritt an der Halmbasis auf?","o":["Linsenförmige Augenflecken an der Halmbasis mit hellem Zentrum; Leitbündel werden zerstört, Halm knickt ein","Rötliche Verfärbung der Halmbasis ohne klare Flecken; Stängel fault von innen nach außen","Schwärzung und Einschnürung an Bodennahme; ähnelt Schwarzbeinigkeit, befällt aber nur Gerste","Weißes Myzel mit schwarzen Sklerotien am untersten Internodium; befällt bevorzugt Winterroggen"],"a":0,"e":"Die 'Augenflecken' (eye spots) an der Halmbasis sind das Erkennungsmerkmal. Der Pilz zerstört die Leitbündel, der Halm knickt ein (Lager), Ertrag und Qualität leiden massiv."},{"c":"Biologie","q":"Welche Pilzkrankheit verursacht die sogenannte 'Ringelfleckigkeit' oder 'Sprenkelkrankheit' bei Gerste (Ramularia collo-cygni)?","o":["Sclerotinia sclerotiorum; weißes Myzel und schwarze Sklerotien im Stängel; typisch bei feuchter Blüte","Alternaria brassicae; konzentrische Ringflecken auf Blättern; befällt alte Rapspflanzen nach Hagel","Verticillium longisporum; Gelbverfärbung und Verbräunung der Gefäße; nur durch Schnitt sichtbar","Phoma lingam; graue Blattflecken im Herbst, Stängelgrund-Fäulnis; tritt schon ab Keimlingsstadium auf"],"a":0,"e":"Ramularia tritt oft erst spät auf (nach Blüte), wird durch Umweltstress getriggert und ist durch seine charakteristischen, rechteckigen (durch die Blattadern begrenzten) Flecken identifizierbar."},{"c":"Biologie","q":"Woran erkennt man die Kohlhernie (Plasmodiophora brassicae) und wie unterscheidet sie sich vom Kohlgallenrüssler?","o":["Gallen (Auftreibungen) an der Hauptwurzel; Pflanze welkt trotz Bewässerung, typisch auf sauren Böden","Vergilbung und Nekrosen der Blätter; Wurzelquerschnitt zeigt bräunliche Gefäßverfärbung","Weißer Pilzbelag auf der Blattunterseite; Blattgewebe bleibt grün, keine Wurzelschäden","Schwarze Punkte (Pyknidien) in Blattnekrosen; Übertragung durch infiziertes Saatgut"],"a":0,"e":"Kohlhernie-Gallen bestehen aus hypertrophiertem Pflanzengewebe (massiv, fest). Rüsslergallen sind hohl und enthalten eine cremefarben-weiße Larve – entscheidend für die richtige Bekämpfungsstrategie."},{"c":"Biologie","q":"Was versteht man unter 'Echter Mehltau' an Getreide – wie sieht er aus, wann tritt er auf, und was unterscheidet ihn von Falschem Mehltau?","o":["Weißgrauer, wattiger Belag auf der Blattoberseite (ektotroph); bei Trocken-Wärme; gut abwischbar","Grau-violetter Sporenrasen auf der Blattunterseite; fördernde Bedingungen sind Dauerfeuchtigkeit","Orangefarbene Sporenpusteln auf Ober- und Unterseite; tritt bevorzugt im Frühjahr auf","Gelbliche, wässrige Blattflecken; Sporenmasse erscheint erst bei mikroskopischer Untersuchung"],"a":0,"e":"Echter Mehltau (Erysiphe graminis) wächst außen auf der Blattoberfläche und liebt trockene Phasen mit warmen Tagen. Falscher Mehltau bildet seinen Sporenrasen typischerweise an der Blattunterseite und braucht Feuchte."},{"c":"Biologie","q":"Welcher Schädling überträgt das Gerstengelb-Verzwergungs-Virus (BYDV), und wann ist der kritische Infektionszeitraum?","o":["Blattläuse (Rhopalosiphum padi u. a.) stechen Phloem an und übertragen das Virus beim Saugen","Thripse raspeln Blattepidermis ab und übertragen Viren durch kontaminierte Mundwerkzeuge","Zikaden stechen Xylem an und übertragen das Virus passiv beim Nahrungsentzug","Drahtwürmer beschädigen Wurzeln und öffnen Eintrittspforten für systemische Viren"],"a":0,"e":"BYDV wird persistent durch saugende Blattläuse übertragen. Warme Herbste ermöglichen längeren Virusflug und höheren Befallsdruck. Frühsaaten und Mais als Nachbar erhöhen das Risiko."},{"c":"Biologie","q":"Woran erkennt man den Befall durch den Rapsglanzkäfer, und warum ist die Bekämpfung im Knospenstadium so wichtig?","o":["Befressene Blütenknospen; Käfer fressen Staubgefäße und Kronblätter vor der Öffnung auf","Schleim-Kanäle im Stängel; Larven fressen inneres Stängelgewebe und führen zum Welken","Weißliche Streifen auf Blättern; Larven miniern im Blattgewebe und hinterlassen helle Gänge","Schwarze Kotflecken auf den Spelzen; Käfer saugen Ährenflüssigkeit kurz vor der Ernte"],"a":0,"e":"Im Knospenstadium (BBCH 51–59) ist der wirtschaftliche Schaden am größten – jede angebissene Knospe ist ein verlorener Schoten. Nach der Blütenöffnung ist der Käfer nützlich (Bestäubung)."},{"c":"Biologie","q":"Was sind die typischen Schadbild-Symptome des Maiszünslers (Ostrinia nubilalis) und warum ist der Bekämpfungszeitpunkt so entscheidend?","o":["Helle Längsstreifen auf Blättern und vertrocknete Herzblätter (Deadheart); Larven fressen Triebspitze","Rote Verfärbung der unteren Blätter; Larven schädigen Wurzeln und unterbrechen Wasserversorgung","Braune Körner mit Schimmelbelag; Larven dringen nach der Blüte in Körner ein","Weiße, wollige Beläge auf Blattstielen; Insekt schützt sich durch Wachsabsonderung"],"a":0,"e":"Sobald die Raupe des Maiszünslers im Stängel ist, schützt sie das Pflanzengewebe vor Kontakt mit PSM-Spritzbrühe. Daher ist die Bekämpfung auf das Schlupffenster der Larven (Eiablage bis Einbohren) begrenzt."},{"c":"Biologie","q":"Was verursacht der Große Rapsstängelrüssler (Ceutorhynchus napi) und welches Symptom entsteht im Frühjahr?","o":["Larven fressen im Stängelmark; befallene Stängel welken oder knicken, Schote fällt aus","Larven fressen Blütenknospen von innen; ähnliches Schadbild wie Rapsglanzkäfer","Larven schaben die Blattoberfläche ab; typisches Fensterfraß-Symptom auf Blättern","Larven saugen an Wurzeln; Pflanze zeigt Welke trotz ausreichender Bodenfeuchte"],"a":0,"e":"Nach der Eiablage im Stängel fressen die Larven das Mark heraus. Das Stängelgewebe reißt im Frühjahr auf – typisches Erkennungsmerkmal, das zum Ertragsverlust durch gestörten Nährstofftransport führt."},{"c":"Biologie","q":"Woran erkennt man den Rapserdflohabefall im Herbst, und welche Generation verursacht den Hauptschaden?","o":["Kleine Löcher (Schrotschuss-Fraß) auf den Keimblättern; Käfer fressen bei Wärme aktiv","Gelbe V-Flecken von der Blattspitze; Larven saugen an Blattadern und entleeren Chloroplasten","Weiße Minen in Blättern; Larven fressen epidermal und hinterlassen transparente Gänge","Graue Verfärbung der Triebspitze; Käfer legen Eier in die Wachstumszone"],"a":0,"e":"Adulte Rapserdflöhe (Psylliodes chrysocephala) verursachen im Herbst den charakteristischen Schrotschuss-Lochfraß. Die eigentlichen Ertragsschäden entstehen dann durch die überwinternden Larven, die im Frühjahr in Blattstielen und Stängelgewebe fressen."},{"c":"Biologie","q":"Was sind die Schadbild-Merkmale des Getreidehähnchens (Oulema melanopus), und durch welche Generation entsteht das charakteristische Fensterfraß-Bild?","o":["Fensterfraß: Larven fressen das Blattmesophyll, transparente Streifen bleiben übrig","Lochfraß: Käfer beißen runde Löcher in Blätter wie beim Rapserdflohrüssler","Kantenfrass: Larven fressen Blattränder von außen nach innen in gleichmäßigen Bögen","Skeletierfraß: Larven fressen alles außer der Mittelrippe und lassen ein Gerüst übrig"],"a":0,"e":"Die schleimüberzogenen Larven des Getreidehähnchens fressen das Blattgrün (Palisadenparenchym) heraus; die verbleibende transparente Epidermis trocknet zu weißlich-silbrigen Streifen (Fensterfraß) ein."},{"c":"Biologie","q":"Warum gilt Ackerfuchsschwanz (Alopecurus myosuroides) als das problematischste Ungras in Wintergetreide-Fruchtfolgen?","o":["Frühe Abreife, hohe Bestockung, Winterkeimung und schnell entstehende Herbizidresistenz","Lange Kornruhe, Keimung nur im Frühjahr, empfindlich gegenüber allen ALS-Hemmern","Keine vegetative Ausbreitung, geringer Samenvorrat und leichte Bekämpfung mit Bodenherbiziden","Einjährige Pflanze ohne Überdauerungsorgane, kaum Bedeutung für resistente Biotypen"],"a":0,"e":"Ein einzelner AFU-Halm kann 300–1000 Samen bilden. Durch einseitige Herbizidstrategie haben sich weltweit multiple Resistenzen (target-site + metabolisch) entwickelt, die kaum noch chemisch bekämpfbar sind."},{"c":"Biologie","q":"Wie unterscheidet man Ackerfuchsschwanz von Windhalm (Apera spica-venti) im Jugendstadium – ohne Ähre?","o":["Ackerfuchsschwanz hat kurze, dichte Ähre und ist zum Zeitpunkt der Getreide-Bestockung bereits aufgelaufen","Windhalmähre ist dünner und länger; beide Arten unterscheiden sich im Blatthäutchen (Ligula)","Ackerfuchsschwanz hat blaue Blätter; Windhalm hat eine rote Blattscheide als Erkennungsmerkmal","Windhalmrispe ist kugelig; Ackerfuchsschwanz bildet eine walzenförmige, rispige Ährenstruktur"],"a":0,"e":"Die Ligula (Blatthäutchen an der Blattscheide) ist das wichtigste Unterscheidungsmerkmal: AFU-Ligula ist kurz, gezähnelt; Windhalm-Ligula ist auffällig lang und gespalten. Richtige Diagnose = richtige Herbizidwahl."},{"c":"Biologie","q":"Was versteht man unter 'Metabolischer Resistenz' bei Unkräutern, und warum ist sie besonders gefährlich?","o":["Enzyme bauen Herbizidmoleküle in der Pflanze ab, bevor sie den Wirkort erreichen; oft vererbt","Wirkort-Mutation verhindert Herbizid-Bindung; entsteht durch zufällige Punktmutation im Gen","Erhöhte Zellwanddicke verhindert Herbizid-Aufnahme ins Blattgewebe; typisch bei Gräsern","Herbizid wird aktiv ins Vakuole transportiert und dort eingeschlossen; reversibel durch pH-Änderung"],"a":0,"e":"Metabolische Resistenz wird durch Enzyme (Cytochrom P450, GST) vermittelt, die viele verschiedene Herbizidwirkstoffe inaktivieren. Im Gegensatz zur Target-Site-Resistenz kann sie mehrere HRAC-Klassen gleichzeitig betreffen."},{"c":"Biologie","q":"Was ist das 'Falsche Saatbett' und welchen Vorteil bringt diese Maßnahme bei der Bekämpfung von Ackerfuchsschwanz?","o":["Frühzeitige Bodenbearbeitung provoziert Unkrautkeimung; Keimlinge werden vor der Aussaat abgetötet","Saatbett wird mit Herbizid vorbehandelt und erst nach Abbau des Wirkstoffs eingesät","Bodenfeuchte wird durch Folienabdeckung erhöht, damit Unkrautsamen tiefer sinken","Saattiefe wird erhöht, damit Kulturpflanzen über die Unkrautkeimungszone aufsteigen"],"a":0,"e":"Durch wiederholtes Provozieren und Beseitigen von AFU-Keimlingen vor der Kulturpflanzen-Saat kann der Samenvorrat im Boden über Jahre deutlich reduziert werden – sehr wirksame, herbizidfreie Maßnahme."},{"c":"Biologie","q":"Was versteht man unter der 'Schadschwelle' im Integrierten Pflanzenschutz?","o":["Populationsdichte, ab der der wirtschaftliche Schaden die Bekämpfungskosten übersteigt","Maximale erlaubte Bestandsdichte des Schädlings laut Pflanzenschutzgesetz","Mindestbefall, ab dem eine chemische Behandlung gesetzlich vorgeschrieben ist","Schwellenwert für die Zulassung eines neuen Insektizids nach EFSA-Bewertung"],"a":0,"e":"Die Schadschwelle ist kein fester Wert, sondern abhängig von Befallsdichte, Kulturwert, Mittelkosten und Prognose. Nur bei Überschreitung ist eine Bekämpfung ökonomisch und ökologisch vertretbar."},{"c":"Biologie","q":"Welche Strategie der Bodenbearbeitung fördert das Fusarium-Risiko im Winterweizen nach Mais?","o":["Minimalbodenbearbeitung lässt Unkrautsamen an der Oberfläche keimen, wo sie leicht bekämpfbar sind","Tiefpflügen verlagert Unkrautsamen dauerhaft unter die Keimtiefe und vermindert den Aufgang","Häufige Bodenbearbeitung erschöpft den Samenvorrat rasch durch erzwungene Keimung","Direktsaat ohne Bodenbearbeitung reduziert Unkrautdruck durch Lichtmangel an der Oberfläche"],"a":0,"e":"Fusarium-Arten überleben auf Maisstoppeln an der Bodenoberfläche als Primärinokulum. Pflügen (tiefes Einarbeiten) reduziert das Risiko; Mulchsaat mit Stoppelresten erhöht es massiv."},{"c":"Biologie","q":"Wann ist das BBCH-Stadium 51 im Getreide erreicht, und welche Maßnahme ist an diesen Zeitpunkt geknüpft?","o":["Beginn Ährenschieben: erste Ährenspitze aus der Blattscheide sichtbar; wichtig für Fungizid-Timing","Beginn Schossen: erster Knoten fühlbar; Einstiegstermin für Wachstumsregler","Vollblüte: Hälfte aller Pflanzen blüht; optimaler Zeitpunkt für Fusarium-Ährenbehandlung","Beginn Bestockung: erster Seitentrieb sichtbar; Termin für frühe Herbizidgabe"],"a":0,"e":"BBCH 51 markiert das Beginn-Ährenschieben. Die Ährenbehandlung (Fusarium/Septoria-Prophylaxe) findet zwischen BBCH 61–65 (Vollblüte) statt – aber das Ziel-Stadium 51 ist der späteste Planungszeitpunkt."},{"c":"Wirkstoffe","q":"Was bedeutet 'HRAC-Gruppe A' bei Herbiziden, und warum ist Resistenz in dieser Gruppe ein weltweites Problem?","o":["Hemmer der Acetyl-CoA-Carboxylase (ACCase); wirken nur gegen Gräser, nicht gegen Dikotyle","Hemmer der ALS (Acetolactat-Synthase); wirken gegen Gräser und Dikotyle, Resistenz verbreitet","Zellmembran-Disruptoren (PPO-Hemmer); wirken bei Licht, nicht selektiv einsetzbar","Wuchsstoffherbizide (Auxin-Mimetika); wirken spezifisch gegen breitblättrige Unkräuter"],"a":0,"e":"Gruppe A umfasst Aryloxyphenoxypropionate ('Fops') und Cyclohexandione ('Dims'). Durch jahrzehntelangen Einsatz gegen AFU und Windhalm haben sich Resistenzmutationen am ACCase-Gen weltweit durchgesetzt."},{"c":"Wirkstoffe","q":"Wie wirken Sulfonylharnstoffe (HRAC-Gruppe B) und warum ist der Wirkungseintritt verzögert?","o":["ALS-Hemmer; blockieren Biosynthese essentieller Aminosäuren; breite Wirkung, hohe Resistenzgefahr","ACCase-Hemmer; blockieren Fettsäuresynthese in Chloroplasten; wirken nur gegen Gräser","PPO-Hemmer; erzeugen toxische Sauerstoffradikale; wirken nur bei Sonnenlicht","Auxin-Mimetika; stören Wachstumsregulation; wirken bevorzugt gegen Kletterlabkraut"],"a":0,"e":"ALS-Hemmer (Gruppe B) stoppen die Zellteilung durch Blockade der Aminosäuresynthese. Das Unkraut hört sofort auf zu wachsen, stirbt aber erst ab, wenn die vorhandenen Aminosäurereserven erschöpft sind."},{"c":"Wirkstoffe","q":"Wie wirken Strobilurine (FRAC-Gruppe 11) und warum sind sie hochgradig resistenzgefährdet?","o":["Hemmen die Atmungskette (Komplex III) der Pilz-Mitochondrien; Resistenz durch G143A-Mutation weit verbreitet","Hemmen die Ergosterol-Biosynthese (Demethylierung); wirken gegen Mehltau und Roste systemisch","Hemmen den Energiestoffwechsel (SDHI Komplex II); neuere Gruppe mit breitem Wirkungsspektrum","Verhindern die Zellteilung der Pilze durch Spindel-Inhibition; wirken gegen Boden-Pathogene"],"a":0,"e":"Strobilurine (z. B. Azoxystrobin, Pyraclostrobin) haben einen einzigen Angriffspunkt (Cytochrom b, G143A-Mutation). Eine Einzelmutation genügt für vollständige Resistenz, daher striktes Mischungsgebot mit anderen FRAC-Klassen."},{"c":"Wirkstoffe","q":"Wie wirkt Glyphosat, und warum erfasst es auch tiefwurzelnde Rhizomunkräuter?","o":["Hemmt EPSPS und blockiert die Shikimisäure-Synthese; systemisch, auch tiefwurzelnde Arten erfasst","Hemmt ALS und blockiert Aminosäuren-Synthese; nicht systemisch, nur Blattbehandlung möglich","Hemmt ACCase und unterbindet Fettsäure-Biosynthese; selektiv nur gegen einjährige Gräser","Hemmt die Zellteilung des Meristems; bodenwirksam, wird von Wurzeln aktiv aufgenommen"],"a":0,"e":"Glyphosat ist phloem-mobil: Es wandert aktiv mit den Photoassimilaten in alle Senken der Pflanze, auch in tief im Boden liegende Rhizome von Quecke oder Ackerwinde. Daher ist es ein effektives Totalherbizid gegen ausdauernde Unkräuter."},{"c":"Wirkstoffe","q":"Was ist ein 'Safener' und in welcher Kultur wird er typischerweise eingesetzt?","o":["Schützende Begleitsubstanz, die Kulturpflanzen vor Herbizidschäden bewahrt; typisch in Mais","Emulgiermittel, das den Wirkstoff in Wasser auflöst und gleichmäßig im Tank verteilt","Adjuvant, das die Haftfähigkeit von Fungiziden auf wachsbeschichteten Blättern erhöht","Prüfsubstanz im Zulassungsverfahren, die Toxizität des Wirkstoffs simuliert"],"a":0,"e":"Safener (z. B. Isoxadifen, Cyprosulfamide) werden Gräser-Herbiziden im Mais beigemischt. Sie 'trainieren' spezifische Entgiftungsenzyme in der Maispflanze vor, sodass das Herbizid rasch metabolisiert wird, bevor es Schaden anrichtet."},{"c":"Wirkstoffe","q":"Was besagt der FRAC/HRAC-Code und wie nutzt man ihn für ein Resistenzmanagement?","o":["Klassifizierungscode für Wirkmechanismus; dient der gezielten Rotation zur Resistenzvermeidung","Zulassungsnummer des BVL; zeigt an, ob ein Mittel in Deutschland zugelassen ist","Herstellercode für die Formulierungsart; zeigt EC, WG oder SC für Anwender an","Rückstandskategorisierung der EFSA; zeigt erlaubte Rückstandsmengen in der Frucht"],"a":0,"e":"Wirkstoffe mit demselben FRAC/HRAC-Code haben denselben Angriffspunkt – wer sie mehrfach hintereinander einsetzt, selektiert resistente Individuen. Wer Codes rotiert (z. B. FRAC 3 + 7 + 11), verhindert dies."},{"c":"Wirkstoffe","q":"Was ist Bodenherbizid-Wirkung und welche Voraussetzung ist im Boden unbedingt nötig?","o":["Wirkstoff wird von aufgehenden Keimlingen über Wurzel oder Keimblatt aufgenommen; Bodenfeuchte entscheidend","Wirkstoff wird nach der Anwendung sofort photolytisch abgebaut; nur Direktkontakt mit Keim wirksam","Bodenherbizid gelangt über Regenwasser ins Grundwasser; daher nur auf trockenen Böden erlaubt","Wirkstoff bindet an Tonminerale und wird durch Regenwasser zu den Wurzeln transportiert"],"a":0,"e":"Auf trockenem Boden bleibt der Wirkstoff an Bodenpartikel adsorbiert und wird von den Keimlingswurzeln oder Keimblättern nicht aufgenommen. Erst mit Niederschlag oder Beregnung löst er sich und entfaltet seine Wirkung."},{"c":"Biologie","q":"Was versteht man unter 'Phytophthora infestans' und warum kann die Krankheit innerhalb weniger Tage einen ganzen Kartoffelbestand vernichten?","o":["Oomycet (kein echter Pilz); bildet weißes Sporenlager auf Blattunterseite; gefördert durch Blattnässe und Kühle","Echter Pilz; bildet olivgraue Pusteln auf Blattoberseite; gefördert durch Wärme und Wind","Bakterium; verursacht ölige, wässrige Flecken; übertragen durch infiziertes Pflanzgut","Virus; verursacht mosaikartige Gelbflecken; übertragen durch Blattläuse im Frühjahr"],"a":0,"e":"Phytophthora ist kein echter Pilz, sondern ein Oomycet. Bei idealen Bedingungen (18–22 °C, Blattnässe) sind innerhalb von 3 Tagen neue Sporangien reif – ein einziger Herd kann in wenigen Tagen einen Hektar befallen."},{"c":"Biologie","q":"Was ist 'Mutterkorn' (Claviceps purpurea) im Roggen, und welche Bedingungen begünstigen seinen Befall?","o":["Claviceps purpurea; ersetzt Körner durch Sklerotien (Mutterkörner); enthalten giftige Alkaloide","Ustilago nuda; ersetzt Körner durch schwarzen Sporenstaub; wirksam bekämpfbar durch Beizung","Tilletia caries; ersetzt Körner durch übelriechende Sporenmasse; überträgt sich durch Saatgut","Fusarium graminearum; erzeugt rosa Sporenpolster; produziert DON und ZEA als Mykotoxine"],"a":0,"e":"Sklerotien von Mutterkorn enthalten Alkaloide (Ergotamine), die für Mensch und Tier hochgiftig sind. Feuchtes Wetter hält Blüten länger offen; unvollständige Bestäubung schafft Eintrittspforten für den Pilz."},{"c":"Biologie","q":"Welche Neonikotinoide sind EU-weit für Freilandsaatgutbeize weitgehend verboten, und was ist der Hauptgrund?","o":["EU-weit verboten für Freilandsaatgutbeizung seit 2018; nur Ausnahmegenehmigungen in Gewächshäusern","In der EU zugelassen für Getreide-Beizung; ausgenommen sind Wasserreis und Tabak","Verboten seit 2013 nur für blühende Kulturen; in Gemüsekulturen weiterhin erlaubt","Zugelassen für Saatgutbeizung bis 30 cm Tiefe; Freilandeinsatz als Spritzung verboten"],"a":0,"e":"Die EU hat Imidacloprid, Clothianidin und Thiamethoxam (drei Neonikotinoide) 2018 für alle Freilandanwendungen weitgehend verboten. Der Hauptgrund ist ihre systemische Aufnahme durch Pflanzen: Bienen und Hummeln werden durch geringe, subletale Mengen in Pollen und Nektar bei der Orientierung und beim Lernen geschädigt."},{"c":"Biologie","q":"Was bedeutet 'Integrierter Pflanzenschutz' (IPS) nach dem Pflanzenschutzgesetz, und in welcher Reihenfolge sind die Maßnahmen zu prüfen?","o":["Vorrang nicht-chemischer Maßnahmen (Fruchtfolge, Resistenzsorten); Chemie nur bei Überschreitung der Schadschwelle","Maximaler Einsatz zugelassener Mittel zur Prophylaxe; Schaden verhindern ist besser als behandeln","Verzicht auf alle synthetischen Wirkstoffe; nur biologische und physikalische Methoden erlaubt","Chemische Behandlung als erste Maßnahme; Schaden durch frühzeitigen Einsatz minimieren"],"a":0,"e":"Der IPS verlangt: 1) Prophylaxe durch Fruchtfolge/Sorten/Bodenbearbeitung, 2) Monitoring und Schadschwellen, 3) Mechanische/biologische Maßnahmen, 4) Chemische Maßnahmen nur bei Schadschwellenüberschreitung."},{"c":"Technik","q":"Was ist eine 'pneumatische Pflanzenschutzspritze' und welche Zielgruppen profitieren davon?","o":["Luftstrom trägt Tröpfchen in den Bestand; eingesetzt im Weinbau und Obstbau für schwer zugängliche Strukturen","Druckluft presst Brühe durch Schlauchdüsen; höherer Druck als Flachstrahl, geringere Abdrift","Luft wird durch Ventilator in den Spritzstrahl gemischt; erzeugt Feinstaub für Gewächshaus-Anwendung","Pneumatisch bedeutet drucklos; Brühe fließt per Schwerkraft und wird erst an der Düse verdüst"],"a":0,"e":"Pneumatische Gebläsespritzen ('Tunnel-' oder 'Gebläsegeräte') nutzen einen kräftigen Luftstrom, um Tröpfchen aktiv tief in die Bestandsstruktur zu transportieren – unverzichtbar für den Raumkulturbau (Reben, Äpfel)."},{"c":"Recht","q":"Was ist der Unterschied zwischen 'Zulassungsbeendigungstermin' und 'Aufbrauchfrist' bei einem Pflanzenschutzmittel?","o":["Zulassungsende: geordneter Ablauf mit Aufbrauchfrist; Widerruf: sofortige Beschränkung möglich bei Risiko","Zulassungsende und Widerruf sind identisch; beide enden mit sofortigem Anwendungsverbot","Zulassungsende gilt für neue Chargen; bestehende Lagerbestände dürfen unbegrenzt aufgebraucht werden","Widerruf gilt nur für Handel; Landwirte mit bestehendem Lagerbestand sind nicht betroffen"],"a":0,"e":"Der Zulassungsbeendigungstermin beendet den Handel. Die Aufbrauchfrist (gesetzlich max. 18 Monate nach Widerruf) erlaubt dem Landwirt, bereits erworbene Ware aufzubrauchen. Nach Ablauf der Aufbrauchfrist ist jede Anwendung verboten."},{"c":"Biologie","q":"Was sind die typischen Symptome von Cercospora beticola an Zuckerrübenblättern, und welche Auswirkung hat starker Befall auf den Ertrag?","o":["Kleine braune Flecken mit gelbem Hof auf Blättern; feuchte Bedingungen und späte Infektionen bevorzugt","Weiße Sporenpusteln auf Blattunterseite; Infektion über Spaltöffnungen, schlechte Sorten anfällig","Große nekrotische Flecken mit dunkelbraunem Rand; infolge von Bodenverdichtung und Staunässe","Gelbe Längsstreifen auf Blättern; Pilz wächst in Leitbündeln und stoppt den Wasserfluss"],"a":0,"e":"Cercospora-Flecken sind kreisrund mit hellgrauem Zentrum und intensiv rotem Rand. Starker Befall zwingt die Rübe, neue Blätter zu bilden ('Zweitverhulstung') – auf Kosten der Zuckereinlagerung in die Wurzel."},{"c":"Biologie","q":"Woran erkennt man die Netzfleckenkrankheit (Pyrenophora teres) der Gerste, und welcher Witterungstyp fördert sie?","o":["Braune, netzartige Läsionen (Netz- und Längsstreifen kombiniert); begünstigt durch kühle Nässe","Orange Sporenpusteln in parallelen Reihen; befällt nur Sommergerste in der Schossphase","Weiße, runde Flecken mit schwarzem Rand; Infektion über Saatgut und Bodensporen möglich","Graugrüne Flecken mit Sektoren; entstehen durch Kombination von Pilz und Bakterium"],"a":0,"e":"Das netzartige Muster aus braunen Längs- und Querstreifen ist das unverwechselbare Merkmal. Feuchte, kühle Perioden begünstigen die Infektion. Die Krankheit kann bis zu 30 % Ertragsverlust verursachen."},{"c":"Technik","q":"Was versteht man unter 'sensorgestützter Teilflächenbehandlung' und welche Einsparungen sind möglich?","o":["Sensoren erkennen Pflanzendichte oder Schädlingsbesatz; Ausbringmenge wird teilflächenspezifisch angepasst","Sensoren messen den Feuchtigkeitsgehalt der Brühe und regeln den Verdünnungsgrad automatisch","Sensoren erfassen Bodentemperatur und steuern den Spritzzeitpunkt für optimale Wirkstoffaufnahme","Sensoren überwachen den Luftdruck am Gestänge und passen die Düsenweite an Windverhältnisse an"],"a":0,"e":"Optische Sensoren (z. B. WEEDit, Greenseeker) erkennen photosynthetisch aktive Biomasse oder Unkrautmuster. Nur dort, wo wirklich Unkraut ist, wird gespritzt – drastische PSM-Einsparung und Umweltentlastung."},{"c":"Biologie","q":"Was sind 'Mykotoxine' und welche Bedeutung haben sie für die Lebensmittel- und Futtermittelsicherheit?","o":["Schimmelpilz-Giftstoffe in Getreide (z. B. DON, ZEA); entstehen bei Fusarium-Befall, Grenzwerte gesetzlich","Wachstumsregulatoren, die vom Pilz produziert werden; fördern Sporulation bei Trockenheit","Enzyme, die Zellwände abbauen; machen befallene Körner weicher, aber weniger giftig","Natürliche Farbpigmente in Pilzen; geben befallene Körner eine rötliche Farbe"],"a":0,"e":"Mykotoxine (z. B. DON = Deoxynivalenol) sind in der Pflanze gebildete Gifte, die Backen oder Kochen überleben. Sie schädigen Leber, Immunsystem und Nieren von Mensch und Tier. EU-Grenzwerte regeln maximal zulässige Gehalte in Getreide und Mehl."},{"c":"Biologie","q":"Was sind Nützlinge im Pflanzenschutz, welche Beispiele gibt es und wie fördert man sie?","o":["Marienkäfer, Florfliege, Schlupfwespen; fressen Schädlinge oder parasitieren sie; durch Blühstreifen gefördert","Hilfsstoffe wie Netzmittel und Spreiter; verbessern die Wirkstoffhaftung auf Blattoberflächen","Nützliche Pilze wie Mykorrhiza; erschließen Nährstoffe und senken Düngebedarf der Kultur","Pheromone in Fallen; locken Schädlinge an und ermöglichen Bonituren ohne Bestandsbegehung"],"a":0,"e":"Ein reiches Nützlingsnetz (Raubinsekten, Parasitoide, Spinnen) reguliert Schädlingspopulationen und kann den chemischen Insektizideinsatz deutlich reduzieren. Heckenpflanzungen und Blühstreifen sind dabei zentrale Bausteine im IPS."},{"c":"Recht","q":"Was besagt das 'Verzeichnis regionalisierter Kleinstrukturanteile' bei NW-Auflagen und wer profitiert davon?","o":["Ermöglicht PSM-Einsatz in kleinen Kulturen ohne offiziell zugelassenes Mittel; erfordert Genehmigung","Enthält verbotene Mittel der roten Liste; Anwendung ist nur mit Spezialzulassung erlaubt","Listet alle biologischen Mittel der EU; hilft bei der Auswahl nach IPS-Kriterien","Verzeichnis für PSM mit Wartezeit unter 7 Tagen; vereinfacht den Spritzeinsatz vor der Ernte"],"a":0,"e":"In Regionen mit hohem Kleinstrukturanteil (> X % der Fläche ist Landschaftselement) kann der Mindestabstand zu Gewässern von 10 m auf 5 m oder von 5 m auf 0 m reduziert werden – unter der Bedingung, dass eine ausreichende Pufferwirkung durch die Landschaftsstruktur gegeben ist."},{"c":"Technik","q":"Was ist der Unterschied zwischen einem Saugfilter und einem Druckfilter an der Pflanzenschutzspritze – wo sitzen sie und welche Maschenweite ist feiner?","o":["Saugfilter sitzt vor der Pumpe und schützt sie; Druckfilter sitzt dahinter und schützt Düsen","Saugfilter sitzt nach der Pumpe; Druckfilter sitzt vor der Pumpe um Kavitation zu vermeiden","Beide Filter sind technisch identisch; Unterschied liegt nur in der Maschengröße des Gewebes","Saugfilter filtriert Feststoffe; Druckfilter filtert gelöste Wirkstoffe aus der Brühe"],"a":0,"e":"Die Filterkette schützt jedes Folgebauteil: Saugfilter (grob, ~50 mesh) schützt die Pumpe, Druckfilter (mittel) schützt Leitungen und Ventile, Düsenfilter (fein, ~100–150 mesh) schützt die empfindliche Düsenöffnung. Nie ohne alle drei Filter spritzen!"},{"c":"Technik","q":"Warum darf man eine verstopfte Düse nicht mit einem Metalldraht freistechen, und was soll man stattdessen tun?","o":["Metalldraht beschädigt die Düsengeometrie (Keramik, Edelstahl); Querverteilung wird dauerhaft verfälscht","Metalldraht leitet Strom und erzeugt Elektrolyse im Messing-Düsenkörper","Metalldraht ist zu dünn, um Verstopfungen zuverlässig zu lösen; nur Hochdruckwasser wirkt","Metalldraht kann Mikrorisse in Polymerdüsen erzeugen, die erst nach Wochen sichtbar werden"],"a":0,"e":"Die Düsenöffnung ist auf Tausendstelmillimeter genau gefertigt. Selbst ein kleiner Kratzer durch Metalldraht verändert die Tropfenverteilung messbar. Im Zweifel: Düse austauschen, nicht flicken."},{"c":"Technik","q":"Was ist eine Doppelflachstrahldüse (TwinCap / TD) und bei welcher Anwendung ist sie besonders vorteilhaft?","o":["Zwei um 30° versetzt angeordnete Spritzkegel; bessere Querverteilung bei variablen Fahrbedingungen","Zwei senkrecht stehende Spritzkegel; besonders geeignet für sehr hohe Gestängehöhen über 80 cm","Düse mit zwei Ausströmöffnungen in entgegengesetzter Richtung; wirkt wie zwei Einzeldüsen","Düse mit Doppelventil; verhindert Nachtropfen doppelt so sicher wie Einfachventile"],"a":0,"e":"Bei der Fusarium-Bekämpfung ist eine allseitige Benetzung der Ähre (alle Ährchen, auch Blütenöffnungen) entscheidend. Die Doppelflachstrahldüse trifft durch ihren V-förmigen Doppelstrahl Vorder- und Rückseite gleichzeitig."},{"c":"Technik","q":"Welche Aufgabe hat die Einspülschleuse an der Pflanzenschutzspritze, und wie funktioniert das sichere Anmischen?","o":["Sicheres Einspülen von PSM-Gebinden direkt in den Spritzentank ohne Hautkontakt; Gebinde wird gespült","Ermöglicht Tankbefüllung ohne Verbindung zum Wassernetz; integrierter Systemtrenner inklusive","Schleust Restbrühe vom Tank in den Spülwasserbehälter; verhindert Überfüllung des Haupttanks","Dosiert den Wirkstoff automatisch in die Spritzleitung; ersetzt das Vorabmischen im Tank"],"a":0,"e":"Die Einspülschleuse schützt den Anwender: PSM-Konzentrat wird direkt in den Wasserstrom gespült, ohne dass unverdünnte Flüssigkeit in Kontakt mit Haut oder Kleidung kommen muss. Restmengen aus dem Gebinde werden mit dem Innenreiniger ausgespült."},{"c":"Technik","q":"Was versteht man unter 'Auslitern' einer Feldspritze, und in welchem Abstand sollte es durchgeführt werden?","o":["Überprüfen, ob Fahrgeschwindigkeit und Düsendurchfluss die eingestellte Sollmenge je Hektar liefern","Prüfen ob der Windkessel genug Luftdruck hat, um gleichmäßigen Spritzstrahl zu erzeugen","Kalibrieren des Manometers auf Nullpunkt vor Saisonbeginn bei stehendem Motor","Messen der Restbrühemenge im Tank nach der Behandlung zur Dokumentation der Ausbringmenge"],"a":0,"e":"Düsen verschleißen – besonders bei abrasiven Suspensionen (Bentonit, WP-Formulierungen). Durch Auslitern erkennt man frühzeitig, welche Düsen über 10 % vom Sollwert abweichen und ausgetauscht werden müssen."},{"c":"Technik","q":"Was bedeutet ein zuckender, unruhiger Manometerzeiger beim Spritzen, und wie behebt man das Problem?","o":["Windkessel verliert Luftdruck oder Membran ist defekt; Pulsationen schlagen direkt auf Manometer durch","Düse ist teilweise verstopft; zurückgestaute Brühe erzeugt Druckschwankungen im System","Saugfilter ist verschmutzt; ungleichmäßige Förderung führt zu Zittern des Zeigers","Fahrgeschwindigkeit ist zu hoch; Trägheitskräfte erzeugen mechanisches Schwingen des Zeigers"],"a":0,"e":"Ein zuckender Zeiger ist das klassische Zeichen für einen defekten oder leeren Windkessel. Das bedeutet: pulsierender Druck, ungleichmäßiger Spritzstrahl, erhöhter Verschleiß an Pumpenventilen und Membranen."},{"c":"Technik","q":"Was ist die maximal zulässige Restmenge im Tank einer modernen Pflanzenschutzspritze nach dem vollständigen Entleeren?","o":["0,5 % des Nennvolumens (z. B. max. 5 l bei 1.000-l-Tank)","5 % des Nennvolumens","10 Liter pauschal, unabhängig von der Tankgröße","Es gibt keine gesetzliche Vorgabe"],"a":0,"e":"Die EU-Anforderung (EN 12761) fordert eine Restmenge von ≤ 0,5 % des Nennvolumens. Das schützt vor unbeabsichtigter Verschleppung und vereinfacht die Reinigung."},{"c":"Technik","q":"Welchen Vorteil bieten Randdüsen (Endkappendüsen) am Gestängeende, und was wäre ohne sie das Problem?","o":["Reduzieren Überlappung am Feldrand und ermöglichen genaue Abstandseinhaltung zu Gewässern","Erhöhen Ausbringmenge am Rand um Randeffekte durch Windexposition auszugleichen","Schalten sich bei GPS-Erkennung der Schlaggrenze automatisch in den Sparbetrieb","Produzieren gröbere Tropfen am Rand, um Abdrift in Naturschutzflächen zu verhindern"],"a":0,"e":"Ohne Randdüse würde die letzte normale Düse zur Hälfte über das Feldende spritzen – PSM würden auf Feldwege, Böschungen oder in Gewässer gelangen. Randdüsen verhindern dies durch ihren asymmetrischen 90°-Strahl."},{"c":"Technik","q":"Was ist der Unterschied zwischen einer Membranpumpe und einer Rollenpumpe bei Pflanzenschutzspritzen?","o":["Membranpumpe ist pulsationsfrei und medientrennend (Wirkstoff berührt kein Metall); Kolbenpumpe pulsiert stärker","Membranpumpe arbeitet bei niedrigem Druck; Kolbenpumpe ist für hohen Druck bis 20 bar ausgelegt","Membranpumpe fördert ausschließlich Wasser; Kolbenpumpe kann auch viskose Suspensionen fördern","Membranpumpe hat kein Rückschlagventil; Kolbenpumpe schützt das System durch integrierte Ventile"],"a":0,"e":"Membranpumpen sind robuster, druckstabiler und leichter zu reinigen – ideal für professionelle Technik. Rollenpumpen sind günstiger und einfacher, aber empfindlicher gegenüber abrasiven Mitteln und weniger langlebig."},{"c":"Technik","q":"Was ist GPS-Section-Control und welchen praktischen Nutzen bringt es beim Spritzen?","o":["GPS schaltet Teilbreiten automatisch bei überlappenden Vorgewenden ab und verhindert Doppelbehandlung","GPS misst die Windgeschwindigkeit und stoppt die Pumpe automatisch bei Abdriftgefahr","GPS berechnet den optimalen Spritzdruck anhand von Bodenfeuchte und Bestandshöhe","GPS dokumentiert die Fahrspuren und überprüft, ob alle NW-Abstände eingehalten wurden"],"a":0,"e":"Section Control erkennt anhand der Feldform automatisch, wo bereits gespritzt wurde, und schaltet betroffene Sektionen aus. In Praxis spart das 3–8 % PSM-Einsatz und verhindert legale Probleme durch Mehrfachbehandlung."},{"c":"Recht","q":"Was ist der Sachkundenachweis im Pflanzenschutz, wer braucht ihn und wie lange ist er gültig?","o":["Pflichtnachweis für berufliche PSM-Anwender; Pflanzenschutzprüfung nach PflSchG § 9, gültig 3 Jahre","Freiwilliger Qualifikationsnachweis; kann durch Betriebskontrolle oder Online-Test erworben werden","Betriebliche Bescheinigung; vom Arbeitgeber ausgestellt, nicht staatlich anerkannt","Jahreslizenz; muss jährlich durch eine Pflichtfortbildung von 4 Stunden erneuert werden"],"a":0,"e":"Seit 2013 (EU-Richtlinie 2009/128/EG) ist der Sachkundenachweis EU-weit verpflichtend. In Deutschland gilt: Prüfung + alle 3 Jahre Fortbildung (mind. 15 Unterrichtsstunden), sonst Verlust des Nachweises."},{"c":"Recht","q":"Was bedeutet die GHS-Kennzeichnung 'GHS06' (Totenkopf mit gekreuzten Knochen) und welche Schutzmaßnahmen sind zwingend?","o":["Akut giftig (oral, dermal, inhalativ); vollständige PSA mit Atemschutz, Sachkundenachweis Pflicht","Ätzend für Haut und Augen; Schutzbrille und säurefeste Handschuhe als Mindestausrüstung","Umweltgefährlich; Gewässerabstand einhalten, PSA beschränkt auf Handschuhe und Stiefel","Explosionsgefährlich; Lagerung getrennt von Oxidationsmitteln, kein offenes Licht"],"a":0,"e":"GHS06 (akute Toxizität Stufe 1–3) kennzeichnet Stoffe, die bereits in kleinen Mengen tödlich oder sehr giftig wirken. Volle PSA inklusive Atemschutz ist Pflicht; Sicherheitsdatenblatt und Notfallmaßnahmen müssen bekannt sein."},{"c":"Recht","q":"Was regelt die Auflage 'NT 101' (Notfallzulassung / Naturschutz-Terrestrisch) und bei welcher Kulturgruppe ist sie besonders relevant?","o":["Auflagen für nach Art. 53 VO 1107/2009 notfallzugelassene Mittel; begrenzte Einsatzdauer und Menge","Auflagen für Mittel mit hohem Grundwassereintragsrisiko; nur bei nachgewiesener Feldtrockenheit","Auflagen für Behandlungen am Naturwaldrand; 100 m Abstand und Meldepflicht bei der Behörde","Auflagen für Notbehandlungen nach Hagelschlag; Anzeige beim Amt innerhalb von 48 Stunden"],"a":0,"e":"NT-Auflagen (Naturschutz Terrestrisch) schützen Insekten und andere Gliedertiere in angrenzenden Biotopen. Werden sie nicht eingehalten, erlischt die Zulassung und es drohen Bußgelder."},{"c":"Recht","q":"Darf ein Landwirt PSM auf einer nicht in seiner Bewirtschaftung stehenden Fläche (z. B. Feldweg, Bahndamm) ohne Genehmigung anwenden?","o":["Nein; Anwendung nur auf selbst bewirtschafteten Flächen zulässig, Ausnahmen erfordern Beauftragung","Ja; jeder mit Sachkundenachweis darf PSM auf beliebigen landwirtschaftlichen Flächen anwenden","Ja; Nachbarn dürfen PSM gegenseitig ausbringen, wenn eine schriftliche Vereinbarung vorliegt","Nein; Anwendung auf fremden Flächen ist nur für zugelassene Lohnunternehmen gestattet"],"a":0,"e":"Die Zulassung eines PSM gilt ausschließlich für die genannten Kulturen und Anwendungsgebiete. Nichtkulturland (Wege, Bahndämme, Böschungen) benötigt eine eigene Zulassung oder Genehmigung – Wildanwendung ist eine Ordnungswidrigkeit."},{"c":"Recht","q":"Was ist eine 'Notfallzulassung' (Art. 53 VO 1107/2009) und unter welchen Bedingungen kann sie erteilt werden?","o":["Befristete Ausnahmezulassung für 120 Tage bei unvorhergesehenem Schadenspotenzial; durch BVL erteilt","Dauerzulassung für Mittel, die noch im Prüfverfahren sind; vorläufig für maximal 1 Jahr gültig","Auflagenbefreiung für biologische Mittel in Notfallsituationen wie Trockenheit oder Hagel","Schnellzulassung für Mittel aus anderen EU-Ländern; gilt ohne Prüfung für 6 Monate"],"a":0,"e":"Notfallzulassungen (z. B. für Neonikotinoid-Beizung in Notfällen) sind zeitlich streng begrenzt und können nur bei echter Pflanzenschutznotlage beantragt werden. Sie sind EU-rechtlich kontrovers und oft Gegenstand von Klagen."},{"c":"Recht","q":"Welche Mindestangaben muss das Spritztagebuch (Aufzeichnungspflicht nach § 67 PflSchG) für jede Anwendung enthalten?","o":["Datum, Mittel, Aufwandmenge, Fläche/Schlag, Kultur, Anwendungsgrund; mindestens 3 Jahre aufzubewahren","Datum, Mittel, Lieferant, Einkaufspreis, Lagertemperatur; für die Betriebsprüfung bereitzuhalten","Mittel, Wetterlage, Windrichtung, Bodentemperatur; reicht für Cross-Compliance-Kontrolle aus","Datum, Ernteschlag, Ertragserwartung, PSM-Aufwandmenge; wird vom JKI zentral gespeichert"],"a":0,"e":"Die vollständige Dokumentation ist Grundlage für Betriebsprüfungen, Rückverfolgbarkeit von Rückständen und Cross-Compliance-Nachweise. Fehlende Einträge können zu Sanktionen bei Direktzahlungen führen."},{"c":"Recht","q":"Was bedeutet 'Zulassung für eine geringfügige Verwendung' (Minor Use) und für wen ist sie wichtig?","o":["Vereinfachtes Zulassungsverfahren für Nischenkulturen; erfordert Genehmigung durch zuständige Behörde","Vollständige Zulassung für alle Kulturen; unterscheidet sich nur im Preis vom regulären Verfahren","Ausnahmegenehmigung nach einem Unfall; gilt für den betroffenen Betrieb für maximal eine Saison","Europäische Zulassung, die alle nationalen Verfahren ersetzt; automatisch in allen EU-Ländern gültig"],"a":0,"e":"Im Minor-Use-System (Art. 51 VO 1107/2009) können Behörden, Landwirtschaftskammern oder Erzeugerverbände Ausdehnungszulassungen für Sonderkulturen beantragen, wenn ein zugelassenes Mittel einer anderen Kultur auch dort wirken würde."},{"c":"Umwelt","q":"Was versteht man unter 'Abdrift' und welche drei Faktoren beeinflussen sie am stärksten?","o":["Tropfenabdrift (Partikel), Dampfabdrift (Verdunstung), Bodenabtrag; beeinflusst durch Wind, Druck, Tropfengröße","Druck-, Temperatur- und Feuchtigkeitsabdrift; bestimmt durch Betriebsparameter der Pumpe","Direkte, indirekte und laterale Abdrift; entstehen durch Gestängehöhe, Fahrgeschwindigkeit und Düsentyp","Primär-, Sekundär- und Tertiärabdrift; Einteilung nach zeitlichem Abstand zur Anwendung"],"a":0,"e":"Abdrift ist der wichtigste Eintragspfad von PSM in Nichtzielflächen (Gewässer, Feldraine, Nachbarkulturen). Die drei Haupthebel sind: Düsentechnologie (grob statt fein), Betriebsdruck (niedrig statt hoch) und Gestängehöhe (nah am Bestand)."},{"c":"Umwelt","q":"Welche Maßnahmen schützen Gewässer vor PSM-Einträgen durch Abschwemmung (Erosion), und ab welcher Hangneigung gelten verschärfte Auflagen?","o":["Gewässerabstände einhalten, Injektordüsen einsetzen, Applikation bei Windstille; Biobed für Hofwasser","Maximale Aufwandmenge halbieren, Fahrt entlang des Gewässers und kein Eintrag per Bodenbearbeitung","Spritzen in Gewässernähe vor Regen, damit der Wirkstoff vom Boden gebunden wird bevor er abfließt","Bio-Mittel verwenden, Abstände laut Etikett ignorieren, weil Boden als natürlicher Filter gilt"],"a":0,"e":"Abschwemmungsauflagen (NG-Auflagen) verlangen Vegetationsstreifen oder Direkteinleitung verhindernde Puffer. Die genaue Hangneigungsschwelle hängt vom jeweiligen Mittel und der Bodenerosionsgefährdung ab."},{"c":"Umwelt","q":"Warum ist Spritzen bei Taubildung oder morgens bei nassem Laub problematisch?","o":["Tau verdünnt die Brühe auf dem Blatt, verringert die Wirkstoffkonzentration und fördert Auswaschung","Taufeuchte aktiviert Bodenpathogene und senkt den Wirkstoff durch Pilzabbau ab","Spritzen bei Tau erhöht Abdrift, weil Wasserdampf die Tröpfchen nach oben trägt","Morgenfeuchte verstopft Injektordüsen durch Luftfeuchtigkeitskondensation im Düsenkörper"],"a":0,"e":"Nasses Laub verdünnt die Wirkstoffkonzentration auf der Blattoberfläche. Systemische Mittel brauchen Zeit (oft 1–2 Stunden) zum Eintrocknen vor dem nächsten Niederschlag. Kontaktmittel werden durch Tau oder Regen direkt abgewaschen."},{"c":"Umwelt","q":"Was sind 'Gewässerabstandsauflagen' und wie unterscheiden sich NG-Auflagen von NW-Auflagen?","o":["NW-Auflagen legen Abstände zu Gewässern fest; NGe sind strikte Anwendungsverbote in Schutzgebieten","NW-Auflagen gelten für Landwirte; NGe gelten nur für Lohnunternehmen auf gepachteten Flächen","Beide Auflagen sind identisch; NW gilt für Oberflächengewässer, NGe nur für Grundwasser","NW-Auflagen können unterschritten werden; NGe sind starre Grenzwerte ohne Ausnahmemöglichkeit"],"a":0,"e":"NW = Naturschutz Wasser (Abdrift aus der Luft), NG = Naturschutz Gewässer/Grundwasser (Bodeneintrag durch Abschwemmung). Beide können gleichzeitig für ein Mittel gelten und unterschiedliche Abstände fordern."},{"c":"Umwelt","q":"Was ist ein 'Blühstreifen' im Rahmen des Integrierten Pflanzenschutzes und welchen Nutzen hat er?","o":["Unbehandelter Streifen mit blühenden Pflanzen; bietet Nahrung für Nützlinge und Bestäuber","Quer zum Hang angelegter Grasstreifen; dient ausschließlich als Erosionsschutz bei Starkregen","Abgedeckter Erdstreifen ohne Vegetation; verhindert PSM-Eintrag in angrenzende Naturflächen","Mit Insektiziden behandelter Randstreifen; vernichtet einwandernde Schädlinge aus Hecken"],"a":0,"e":"Blühstreifen fördern Nützlinge wie Marienkäfer, Schlupfwespen, Schwebfliegen und Wildbienen. Sie sind Teil der Agrarumweltmaßnahmen und können zur Erfüllung von Greening-/Ökoregelungsauflagen genutzt werden."},{"c":"Umwelt","q":"Welche Pflichten gelten beim Befüllen einer Pflanzenschutzspritze an einem Oberflächengewässer oder in der Nähe eines Brunnens?","o":["Systemtrenner am Hydranten Pflicht; Befüllung nur auf befestigtem Untergrund mit Bio-Bed oder Auffangwanne","Befüllung möglichst im Gewässer um Restbrühe zu verdünnen; Systemtrenner optional","Hydranten können ohne Schutzmaßnahmen genutzt werden, wenn das PSM wenig wasserlöslich ist","Befüllung aus Fließgewässern ohne Systemtrenner zulässig, wenn Abstand über 100 m eingehalten"],"a":0,"e":"Beim Befüllen besteht erhöhtes Risiko: ein Überfüllen oder Saugunfall kann große Mengen PSM direkt in Gewässer leiten. Der Systemtrenner schützt das öffentliche Netz; am Gewässer ist besondere Vorsicht und Abstand geboten."},{"c":"Biologie","q":"Was ist der 'Drahtwurm' (Larve der Schnellkäfer, Agriotes spp.) und welche Kulturen schädigt er besonders?","o":["Harte, gelbbraune Schnellkäferlarve (Agriotes spp.); frisst Keim-/Stängelbasis; Hauptschaden nach Grünlandumbruch","Weiche, weißliche Trauermücken-Larve; frisst ausschließlich Blattspreiten; tritt bei Staunässe auf","Rote, segmentierte Gallmücken-Larve; befällt Ährenspindeln und Körner bei warmen Frühjahren","Schwarze Erdfloh-Larve; frisst Feinwurzeln von Keimlingen; bekämpfbar durch Saattiefenkorrektur"],"a":0,"e":"Drahtwürmer (Larven der Elateridae) leben 3–5 Jahre im Boden und verursachen besonders nach Grünlandumbruch hohe Schäden. Jungpflanzen werden an der Basis angebohrt und sterben ab – Fehlstellen im Bestand sind die Folge."},{"c":"Biologie","q":"Was versteht man unter der 'Fritfliege' (Oscinella frit) und welches charakteristische Symptom erzeugt ihr Larvenbefall im Mais?","o":["Larven (Maden) fressen Herzblatt und erzeugen 'Deadheart'; Schäden besonders in früh gesätem Getreide","Adulte Fliegen legen Eier auf Körner; Larven höhlen Körner aus und verstärken Fusarium-Befall","Puppen überwintern im Boden und schlüpfen im Frühjahr; Adulte saugen an Blattstielen","Larven minieren in Blättern und erzeugen transparente Streifen ohne Herzblattschäden"],"a":0,"e":"Fritfliegenbefall verursacht im 2–4-Blattstadium das typische 'tote Herz': Das Herzblatt stirbt ab und lässt sich leicht herausziehen. Frühsaaten und Ausfallgetreide in der Nähe erhöhen das Risiko."},{"c":"Biologie","q":"Was ist die Schwarze Bohnenlaus (Aphis fabae) und in welchem Zusammenhang schädigt sie Zuckerrüben?","o":["Überträgt Zuckerrübenviren (BYV) durch Saugen; Schäden durch Virose stärker als durch Saugschäden","Befällt ausschließlich Körnerleguminosen und überwintert als Ei auf abgefallenen Blättern","Überträgt Gerstengelb-Verzwergungsvirus im Frühjahr; Schaden nur bei hoher Befallsdichte","Schädigt durch Honigtaupilze, die die Photosynthesefläche reduzieren; direkte Saugschäden minimal"],"a":0,"e":"In Hitze- und Trockenperioden vermehrt sie sich explosionsartig. Neben dem direkten Saugschaden (Wachstumshemmung) überträgt sie das Rübenvergilbungsvirus – ein d
