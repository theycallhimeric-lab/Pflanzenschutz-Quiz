<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pflanzenschutz-Profi | Prüfungstraining 3. Lehrjahr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a3328;
    --moss: #2d5a40;
    --sage: #4a7c59;
    --mint: #a8d5b5;
    --cream: #f5f0e8;
    --gold: #c9893a;
    --gold-light: #e8b86d;
    --earth: #6b4423;
    --red: #8b2635;
    --red-light: #fce8eb;
    --green-light: #e8f5ec;
    --white: #ffffff;
    --text: #1a2620;
    --text-muted: #5a6e62;
    --border: #dce8e0;
    --shadow: rgba(26,51,40,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: var(--forest);
    position: relative;
    overflow: hidden;
    padding: 48px 24px 40px;
    text-align: center;
  }

  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 20% 50%, rgba(74,124,89,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 50% 70% at 80% 50%, rgba(201,137,58,0.15) 0%, transparent 60%);
  }

  .header-inner { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; }

  .header-badge {
    display: inline-block;
    border: 1px solid rgba(201,137,58,0.5);
    color: var(--gold-light);
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 18px;
    font-weight: 500;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 12px;
  }

  .header h1 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .header p {
    color: var(--mint);
    font-size: 0.95rem;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* leaf decoration */
  .leaf-deco {
    position: absolute;
    font-size: 7rem;
    opacity: 0.07;
    pointer-events: none;
  }
  .leaf-deco.l1 { top: -10px; left: -10px; transform: rotate(-20deg); }
  .leaf-deco.l2 { bottom: -20px; right: -10px; transform: rotate(40deg); }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    justify-content: center;
    gap: 40px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--forest);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }

  .stat-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  /* ── MAIN ── */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--gold));
    border-radius: 6px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .progress-label {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--white);
    border-radius: 20px;
    padding: 36px 36px 28px;
    box-shadow: 0 4px 24px var(--shadow);
    margin-bottom: 16px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--moss), var(--gold));
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .q-category {
    background: var(--green-light);
    color: var(--moss);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .q-number {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: auto;
  }

  .q-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.22rem;
    line-height: 1.5;
    color: var(--forest);
    margin-bottom: 28px;
  }

  /* ── ANSWER OPTIONS ── */
  .options-grid {
    display: grid;
    gap: 10px;
  }

  .opt-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--cream);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--text);
    transition: all 0.18s ease;
    line-height: 1.4;
  }

  .opt-btn:hover:not(:disabled) {
    background: var(--green-light);
    border-color: var(--sage);
    transform: translateX(4px);
  }

  .opt-letter {
    min-width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--border);
    color: var(--text-muted);
    font-size: 0.78rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s ease;
    letter-spacing: 0.05em;
  }

  .opt-btn:hover:not(:disabled) .opt-letter {
    background: var(--sage);
    color: white;
  }

  .opt-btn.correct {
    background: var(--green-light) !important;
    border-color: var(--sage) !important;
    transform: none;
  }
  .opt-btn.correct .opt-letter {
    background: var(--moss) !important;
    color: white !important;
  }

  .opt-btn.wrong {
    background: var(--red-light) !important;
    border-color: var(--red) !important;
    transform: none;
  }
  .opt-btn.wrong .opt-letter {
    background: var(--red) !important;
    color: white !important;
  }

  .opt-btn:disabled { cursor: default; }

  /* ── FEEDBACK ── */
  .feedback {
    display: none;
    margin-top: 18px;
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.6;
    animation: slideUp 0.25s ease;
  }

  .feedback.correct-fb {
    background: var(--green-light);
    border-left: 4px solid var(--sage);
    color: var(--forest);
  }

  .feedback.wrong-fb {
    background: var(--red-light);
    border-left: 4px solid var(--red);
    color: #4a1020;
  }

  .feedback-icon { font-size: 1.1rem; margin-right: 6px; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── NEXT BUTTON ── */
  .next-btn {
    display: none;
    width: 100%;
    padding: 16px;
    background: var(--forest);
    color: var(--white);
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    letter-spacing: 0.03em;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .next-btn::after {
    content: '→';
    margin-left: 8px;
    display: inline-block;
    transition: transform 0.2s ease;
  }

  .next-btn:hover {
    background: var(--moss);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(26,51,40,0.25);
  }

  .next-btn:hover::after { transform: translateX(4px); }

  /* ── RESULT SCREEN ── */
  .result-card {
    background: var(--white);
    border-radius: 20px;
    padding: 48px 36px;
    text-align: center;
    box-shadow: 0 4px 24px var(--shadow);
    border: 1px solid var(--border);
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-icon { font-size: 3.5rem; margin-bottom: 16px; }

  .result-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--forest);
    margin-bottom: 8px;
  }

  .score-display {
    margin: 24px 0;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
  }

  .score-number {
    font-family: 'DM Serif Display', serif;
    font-size: 5rem;
    color: var(--moss);
    line-height: 1;
  }

  .score-unit {
    font-size: 1.5rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin: 24px 0;
    padding: 20px;
    background: var(--cream);
    border-radius: 12px;
  }

  .breakdown-item {
    text-align: center;
  }

  .breakdown-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    display: block;
  }

  .breakdown-num.good { color: var(--moss); }
  .breakdown-num.bad { color: var(--red); }

  .breakdown-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .result-msg {
    font-size: 0.95rem;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 440px;
    margin: 0 auto 28px;
  }

  .restart-btn {
    display: inline-block;
    padding: 16px 40px;
    background: var(--forest);
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    background: var(--moss);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(26,51,40,0.25);
  }

  /* ── INTRO SCREEN ── */
  .intro-card {
    background: var(--white);
    border-radius: 20px;
    padding: 48px 36px;
    text-align: center;
    box-shadow: 0 4px 24px var(--shadow);
    border: 1px solid var(--border);
  }

  .intro-icon { font-size: 3rem; margin-bottom: 16px; }

  .intro-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--forest);
    margin-bottom: 12px;
  }

  .intro-desc {
    color: var(--text-muted);
    font-size: 0.95rem;
    line-height: 1.7;
    margin-bottom: 28px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 32px;
    text-align: left;
  }

  .topic-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--cream);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--forest);
  }

  .topic-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--sage);
    flex-shrink: 0;
  }

  .start-btn {
    display: inline-block;
    padding: 18px 52px;
    background: var(--forest);
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .start-btn:hover {
    background: var(--moss);
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(26,51,40,0.3);
  }

  /* responsive */
  @media (max-width: 500px) {
    .q-card { padding: 24px 20px 20px; }
    .stats-bar { gap: 24px; }
    .topics-grid { grid-template-columns: 1fr; }
    .q-text { font-size: 1.08rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="leaf-deco l1">🌿</div>
  <div class="leaf-deco l2">🌾</div>
  <div class="header-inner">
    <div class="header-badge">Abschlussprüfung · 3. Lehrjahr · Landwirt/in</div>
    <h1>Pflanzenschutz-<em>Profi</em></h1>
    <p>Prüfungstraining mit 150 Fragen aus Technik, Biologie, Recht & Wirkstoffen</p>
  </div>
</div>

<div class="stats-bar" id="stats-bar" style="display:none">
  <div class="stat-item">
    <span class="stat-value" id="stat-score">0</span>
    <span class="stat-label">Richtig</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <span class="stat-value" id="stat-wrong">0</span>
    <span class="stat-label">Falsch</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <span class="stat-value" id="stat-pct">–</span>
    <span class="stat-label">Quote</span>
  </div>
</div>

<div class="main" id="main-content">
  <!-- Intro screen rendered by JS -->
</div>

<script>
const fullPool = [
  // TECHNIK
  {c:"Technik", q:"Welchen physikalischen Effekt nutzt eine Injektordüse (IDK/IDKN) zur Abdriftminderung und warum entstehen dabei gröbere Tropfen?", o:["Das Venturi-Prinzip: Ein Unterdruck saugt Luft in die Düse; die Luft-Flüssigkeits-Mischung erzeugt blasige, schwere Tropfen mit geringerer Flugfähigkeit","Elektrostatik: Die Düse lädt Tropfen negativ auf, sodass sie sich abstoßen und größer werden","Zentrifugalkraft: Schnelle Rotation schleudert die Flüssigkeit in großen Bogen","Kapillarwirkung: Enge Kanäle saugen Luft an und erzeugen Schaum"], a:0, e:"Injektordüsen (Venturi-Prinzip) saugen Umgebungsluft an. Luft und Flüssigkeit vermischen sich zu blasigen, deutlich schwereren Tropfen – diese haben eine viel geringere Abdriftneigung als feine Tropfen klassischer Flachstrahldüsen."},
  {c:"Technik", q:"Was bewirkt ein zu hoher Spritzdruck (z. B. > 6 bar bei Flachstrahldüsen) in Bezug auf Abdrift und Wirkung?", o:["Er erzeugt einen hohen Feintropfenanteil, der stark abriftet und die effektiv ausgebrachte Menge auf dem Ziel reduziert","Er erhöht die Ausbringmenge und verbessert die Wirkung","Er kühlt die Brühe und verhindert Verdunstung","Er schaltet das Rührwerk automatisch ab"], a:0, e:"Höherer Druck zerschlägt die Flüssigkeit in immer feinere Tröpfchen. Feine Tropfen sind windanfällig und können sich in der Luft halten, bevor sie das Ziel erreichen."},
  {c:"Technik", q:"Welcher ISO-Farbcode kennzeichnet eine Düsengröße '03' (0,3 US-gal/min bei 2,76 bar)?", o:["Rot","Gelb","Blau","Lila"], a:2, e:"ISO-Norm 10625: 01=Orange, 02=Gelb, 03=Blau, 04=Rot, 05=Braun, 06=Grau, 08=Weiß, 10=Gelb (höhere Reihe)."},
  {c:"Technik", q:"Warum ist die Gestängehöhe bei 110°-Düsen auf exakt 50 cm über dem Zielbestand zu halten – was passiert bei zu großem oder zu geringem Abstand?", o:["Bei 50 cm überlappen sich die Spritzkegel dreifach (Tripel-Überlappung) für perfekte Querverteilung; zu viel Abstand erhöht Abdrift, zu wenig erzeugt Lücken","50 cm ist der gesetzliche Mindestabstand zum Boden","Bei 50 cm funktionieren Anti-Drift-Ventile am besten","Die Düsen erwärmen sich bei 50 cm optimal"], a:0, e:"110°-Düsen sind auf 50 cm Höhe ausgelegt, damit die Spritzkegel exakt mehrfach überlappen und eine gleichmäßige Querverteilung entsteht. Größerer Abstand = mehr Abdrift; kleiner Abstand = Lücken zwischen den Kegeln."},
  {c:"Technik", q:"Was ist die Aufgabe des Windkessels an einer Kolbenmembranpumpe?", o:["Er dämpft die Druckpulse (Pulsationen) der Pumpe und sorgt für einen gleichmäßigen Spritzstrahl","Er speichert Überdruck und gibt ihn beim Bremsen frei","Er verbessert die Schaumbildung im Tank","Er regelt die Rührwerkdrehzahl"], a:0, e:"Kolbenmembranpumpen fördern stoßweise. Der Windkessel (ein Druckbehälter mit Luftpolster) puffert die Druckspitzen und gibt die gespeicherte Energie zwischen den Hüben ab – so fließt die Brühe gleichmäßig."},
  {c:"Technik", q:"Welches Bauteil verhindert das Nachtropfen der Düsen, nachdem der Spritzdruck abgefallen ist?", o:["Druckbegrenzungsventil","Gleichdruckregler","Membran-Antitropfventil (Anti-Drip)","Saugfilter"], a:2, e:"Das Membranventil in der Düsenkappe schließt bei einem Druckabfall unter ca. 0,5–0,7 bar federbelastet – kein Nachtropfen auf der Wendfahrt, keine Schäden durch Doppelüberlappung."},
  {c:"Technik", q:"Wie halbiert man die Ausbringmenge (l/ha), ohne die Düsen zu wechseln?", o:["Fahrgeschwindigkeit verdoppeln ODER Spritzdruck halbieren","Motor ausschalten und rollen lassen","Tank halb leeren","Rührwerk abschalten"], a:0, e:"Ausbringmenge = Durchfluss ÷ Fahrgeschwindigkeit × Korrekturfaktor. Verdoppelt man die Geschwindigkeit, wird auf der gleichen Fläche pro Zeiteinheit doppelt so schnell gefahren, also halbiert sich die Menge."},
  {c:"Technik", q:"Ab welchem Nennvolumen ist ein Spülwassertank (mind. 10 % des Nennvolumens) gesetzlich vorgeschrieben?", o:["Ab 100 Liter","Ab 400 Liter","Ab 1000 Liter","Alle Feldspritzen, unabhängig vom Volumen"], a:1, e:"Die Pflanzenschutzgeräte-Verordnung verlangt ab 400 Litern Nennvolumen einen separaten Spülwassertank mit mind. 10 % des Nennvolumens zur Feldvorreinigung."},
  {c:"Technik", q:"In welchem Intervall müssen Pflanzenschutzgeräte (Feldspritzen) nach der aktuellen Pflanzenschutzgeräte-Verordnung amtlich geprüft werden?", o:["Jährlich","Alle 2 Jahre","Alle 3 Jahre (6 Kalenderhalbjahre)","Alle 5 Jahre"], a:2, e:"Der Prüfintervall beträgt 3 Jahre (6 Kalenderhalbjahre). Eine gültige Plakette von 2024 bedeutet: nächste Prüfung spätestens im 1. Halbjahr 2027."},
  {c:"Technik", q:"Was misst der Variationskoeffizient (V-Wert) bei der Spritzen-Prüfung, und welcher Grenzwert gilt?", o:["Die Gleichmäßigkeit der Flüssigkeitsverteilung über die Arbeitsbreite; Grenzwert ≤ 7 % (Neugeräte) bzw. ≤ 9 % (ältere Geräte)","Den Druckunterschied zwischen Pumpe und Düse; Grenzwert 0,5 bar","Die Verdunstungsrate; Grenzwert 5 %","Die Schäumbarkeit der Brühe; kein Grenzwert"], a:0, e:"Ein V-Wert über 7 % (Neugeräte) bzw. 9 % (Gebrauchtgeräte) zeigt ungleichmäßige Querverteilung – der Bestand wird fleckig behandelt, Wirkungslücken entstehen."},
  {c:"Technik", q:"Was bewirkt ein undichter Saugfilter (Nebenluft)?", o:["Die Pumpe zieht Luft, baut keinen stabilen Druck auf, der Spritzstrahl reißt ab und schäumt","Der Filter gibt Druck frei und die Spritze drückt zu viel aus","Das Rührwerk läuft zu schnell","Der Tank überfüllt sich"], a:0, e:"Nebenluft am Saugfilter führt zu Kavitation in der Pumpe. Ohne stabilen Unterdruck bricht die Förderleistung zusammen – Spritzstrahl wird ungleichmäßig oder reißt ab."},
  {c:"Technik", q:"Was ist die Funktion des Gleichdruckreglers (Gleichdruckarmatur) beim Abschalten von Teilbreiten?", o:["Er hält den Druck im aktiven Teil der Leitung konstant, auch wenn Teilbreiten weggeschaltet werden","Er regelt die Pumpenleistung","Er misst die Windgeschwindigkeit","Er filtert die Brühe"], a:0, e:"Wenn Teilbreiten abgeschaltet werden, würde der Druck im System steigen. Der Gleichdruckregler leitet überschüssige Flüssigkeit in den Tank zurück und hält den Düsendruck stabil."},
  {c:"Technik", q:"Für was steht die JKI-Anerkennung von 'Verlustmindernden Geräten' und welche Minderungsklassen gibt es?", o:["Anerkannte Gerätekombinationen aus Düse, Druck und Abstand, die 50, 75 oder 90 % weniger Abdrift als Referenztechnik erzeugen","Eine staatliche Subvention für neue Spritzen","Ein optionales Gütesiegel ohne rechtliche Relevanz","Nur relevant für den Weinbau"], a:0, e:"Nur JKI-anerkannte Kombinationen aus Düsentyp, Betriebsdruck und Gestängehöhe dürfen bei NW-Auflagen (z. B. NW 603, NW 605) zur Abstandsreduzierung genutzt werden."},
  {c:"Technik", q:"Wie verhält sich die Ausbringmenge (l/ha), wenn die Fahrgeschwindigkeit von 8 km/h auf 10 km/h erhöht wird (alle anderen Werte gleich)?", o:["Die Menge sinkt um 20 %","Die Menge steigt um 20 %","Die Menge bleibt gleich","Die Menge halbiert sich"], a:0, e:"Ausbringmenge ~ 1/Geschwindigkeit. Wenn die Geschwindigkeit um 25 % steigt (8→10 km/h), sinkt die Menge um 20 % (10/8 = 1,25 → 1/1,25 = 0,8)."},
  {c:"Technik", q:"Welches Bauteil schützt das öffentliche Trinkwassernetz beim Befüllen aus dem Hydranten vor PSM-Kontamination?", o:["Systemtrenner (Rückflussverhinderer BA oder CA)","Druckbegrenzungsventil","Saugfilter","Windkessel"], a:0, e:"Der Systemtrenner verhindert hydraulisch, dass Pflanzenschutzmittel durch Druckabfall im Netz in die öffentliche Wasserleitung zurückgesaugt werden (gesetzliche Pflicht)."},

  // RECHT
  {c:"Recht", q:"Was besagt das Minimierungsgebot im Pflanzenschutzgesetz und worauf zielt der Integrierte Pflanzenschutz (IPS)?", o:["PSM-Einsatz auf das notwendige Maß beschränken; chemische Bekämpfung erst nach Ausschöpfung anderer Maßnahmen","PSM-Einsatz so oft wie möglich zur Prophylaxe","Nur Mittel der niedrigsten Preisklasse verwenden","Spritzen nur in den Abendstunden"], a:0, e:"Das Minimierungsgebot verlangt, dass PSM nur so viel und so oft eingesetzt werden, wie wirklich notwendig. Der IPS priorisiert ackerbauliche, biologische und mechanische Maßnahmen vor der Chemie."},
  {c:"Recht", q:"Wie lang ist die gesetzliche Aufbrauchfrist nach dem Widerruf der Zulassung eines Pflanzenschutzmittels (Regelfall)?", o:["Sofortiges Verkaufs- und Anwendungsverbot","6 Monate Abverkauf + 12 Monate Aufbrauch nach Widerrufsdatum","Bis Ende des übernächsten Kalenderjahres","5 Jahre, sofern kein Umweltrisiko besteht"], a:1, e:"Die Standardregelung: 6 Monate darf der Handel noch abgeben, danach 12 Monate darf der Landwirt vorhandene Bestände aufbrauchen. Bei akutem Risiko kann die Behörde kürzere Fristen setzen."},
  {c:"Recht", q:"Was bedeutet die Bienenschutz-Einstufung 'B1' auf einem Insektizid?", o:["Das Mittel ist absolut bienengefährlich und darf nicht auf blühende Pflanzen oder blühenden Unterwuchs ausgebracht werden","Das Mittel ist für Bienen unbedenklich","B1 erlaubt Anwendung am frühen Morgen vor Bienenflug","B1 gilt nur für Hummeln, nicht für Honigbienen"], a:0, e:"B1 = höchste Gefahrenklasse. Jede Anwendung auf blühende Bestände oder Bestände mit blühendem Unkraut ist verboten – unabhängig von Tageszeit oder Witterung."},
  {c:"Recht", q:"Wie lange muss das Pflanzenschutz-Anwendertagebuch (Dokumentation) aufbewahrt werden?", o:["1 Jahr","3 Jahre ab dem Anwendungsjahr","5 Jahre","10 Jahre"], a:1, e:"Das PflSchG (§ 67 Abs. 3) schreibt 3 Jahre Aufbewahrung ab dem Ende des Kalenderjahres der Anwendung vor. Die Pflicht gilt für alle beruflichen Anwender."},
  {c:"Recht", q:"Welche Behörde erteilt die Zulassung für Pflanzenschutzmittel in Deutschland?", o:["Das Julius Kühn-Institut (JKI)","Das Bundesamt für Verbraucherschutz und Lebensmittelsicherheit (BVL)","Das Umweltbundesamt (UBA)","Die zuständige Landwirtschaftsbehörde des Bundeslandes"], a:1, e:"Das BVL entscheidet über die Zulassung, nachdem JKI (Wirksamkeit/Rückstände), UBA (Umweltwirkungen) und BfR (Verbraucher-/Anwenderschutz) fachlich bewertet haben."},
  {c:"Recht", q:"Warum ist die Anwendung von Pflanzenschutzmitteln auf einer asphaltierten Einfahrt oder einem gepflasterten Hofplatz in Deutschland verboten?", o:["Weil versiegelte Flächen als Nichtkulturland gelten und PSM direkt in die Kanalisation gespült werden – das ist eine Straftat","Weil dort keine Unkräuter wachsen","Weil der Asphalt die Düsen beschädigt","Weil der Boden zu hart ist"], a:0, e:"§ 12 PflSchG verbietet die Anwendung auf befestigten Flächen außerhalb der Landwirtschaft ausdrücklich. PSM auf Asphalt können nicht abgebaut werden und gelangen ungefiltert ins Grundwasser oder in Gewässer."},
  {c:"Recht", q:"Was besagt die 'NW 605'-Auflage, und wie kann der Abstand durch verlustmindernde Technik reduziert werden?", o:["Abstand von 5 m zu Oberflächengewässern; Reduzierung auf 0 m mit 90 % abdriftmindernder Technik möglich","Abstand von 20 m zu Naturwäldern; nicht reduzierbar","Abstand von 1 m zum Nachbarfeld; immer einzuhalten","Abstand von 100 m zu Bienenstöcken"], a:0, e:"NW 605 = 5 m Abstand zu Gewässern. Mit anerkannter 90-%-Abdriftminderungstechnik kann dieser auf 0 m reduziert werden (Eintrag ins Spritztagebuch Pflicht)."},
  {c:"Recht", q:"Was bedeutet 'MRL' (Maximum Residue Level) und welche Konsequenz hat eine Überschreitung?", o:["Gesetzlich festgelegte Rückstandshöchstmenge eines PSM in Lebensmitteln; bei Überschreitung darf die Ware nicht vermarktet werden","Maximale Regenmenge, ab der nicht gespritzt werden darf","Mindest-Reifen-Luftdruck für Spritzen","Mittel-Resistenz-Liste des JKI"], a:0, e:"MRL-Werte schützen Verbraucher. Werden sie überschritten, muss die Charge vernichtet oder umgewidmet werden. Strafrechtliche Konsequenzen für den Erzeuger sind möglich."},

  // UMWELT
  {c:"Umwelt", q:"Was regeln 'NW-Auflagen' (z. B. NW 603, NW 605) im Zulassungsbescheid?", o:["Abstände zu Oberflächengewässern zum Schutz des Naturhaushalts; ggf. Reduzierung durch verlustmindernde Technik möglich","Naturwaldabstände für forstliche PSM","Beschränkungen für Nachtspritzungen","Nachbau-Wartezeiten für Folgekulturen"], a:0, e:"NW = Naturschutz Wasser. Die Auflagen legen Mindestabstände von 5, 10 oder 20 m zu Gewässern fest und erlauben unter Bedingungen (anerkannte Technik) eine Reduzierung."},
  {c:"Umwelt", q:"Welche Windgeschwindigkeit gilt als praktische Obergrenze für Pflanzenschutzspritzungen im Freiland?", o:["1 m/s (Windstille)","3 m/s","5 m/s (ca. 18 km/h, Windstärke 3)","10 m/s (Windstärke 5)"], a:2, e:"Ab 5 m/s ist auch mit Injektordüsen die Abdrift kaum noch kontrollierbar. Für besonders empfindliche Gewässer-Schutzauflagen können geringere Schwellenwerte gelten."},
  {c:"Umwelt", q:"Wie ist mit Restbrühe im Spritztank nach der Behandlung korrekt zu verfahren?", o:["Zehnfach mit Wasser verdünnen und auf der behandelten Fläche ausspritzen – nie in die Kanalisation","Im Hofgully ablassen","Auf dem Kompost entsorgen","Restbrühe kann im Tank bis zur nächsten Saison verbleiben"], a:0, e:"Verdünnte Restbrühe auf die Behandlungsfläche ausbringen ist die einzig legale Feldmethode. Abwasser-Einleitung von PSM ist eine Straftat; Biobed-Anlagen sind eine weitere Option für Hofwaschwasser."},
  {c:"Umwelt", q:"Wofür steht das GHS09-Gefahrenpiktogramm (Baum mit totem Fisch)?", o:["Gewässergefährdung: das Mittel ist für aquatische Organismen giftig oder sehr giftig","Holzschutzmittel: das Mittel greift Holz an","Kältegefahr: Mittel darf nicht einfrieren","Fischkrankheit: Mittel ist nur für Teiche verboten"], a:0, e:"GHS09 warnt vor akuter oder chronischer Gefährdung für Wasserorganismen (Fische, Kleinkrebse, Algen). Das Piktogramm ist Pflicht bei Einstufung als aquatisch gefährlich (H400/H410 usw.)."},
  {c:"Umwelt", q:"Was ist ein 'Bio-Bed' und wozu dient es auf dem Betrieb?", o:["Ein Filtersystem aus Stroh, Humus und Erde, das PSM-haltiges Waschwasser aus der Spritzenreinigung biologisch abbaut","Ein Schlafplatz für Nützlinge","Ein Blühstreifen am Feldrand","Ein abgedecktes Lager für PSM-Gebinde"], a:0, e:"Im Bio-Bed bauen Bodenmikroorganismen (Pilze und Bakterien) Pflanzenschutzmittelrückstände im Abwasser der Spritzenreinigung ab, bevor das Wasser in den Boden gelangt."},
  {c:"Umwelt", q:"Warum sollte bei Temperaturen über 25 °C nicht gespritzt werden?", o:["Hohe Verdunstung der Wirkstofftröpfchen, erhöhte Phytotoxizitätsgefahr und verringerte Wirksamkeit","Der Traktor überhitzt","Die Düsen verformen sich bei Hitze","Es ist nur wegen der Mittagsruhe verboten"], a:0, e:"Hohe Temperaturen beschleunigen die Verdunstung feiner Tröpfchen (Drift als Dampf), können Blattverbrennungen auslösen (Phytotoxizität) und vermindern die Wirkstoffmenge, die tatsächlich auf dem Blatt ankommt."},

  // BIOLOGIE – Krankheiten
  {c:"Biologie", q:"Woran erkennt man Gelbrost (Puccinia striiformis) im Winterweizen – und wie unterscheidet er sich vom Braunrost?", o:["Gelbrost: leuchtend gelbe Sporenlager in deutlichen Längsstreifen entlang der Blattadern; Braunrost: runde, zufällig verteilte, orangebraune Pusteln auf der Blattoberfläche","Gelbrost ist braun, Braunrost ist gelb","Beide sehen identisch aus, unterscheiden sich nur im Geruch","Gelbrost befällt nur Ähren, Braunrost nur Blätter"], a:0, e:"Gelbrost bildet charakteristische Streifen (wie eine Schraff-Linie) entlang der Blattadern – daher 'Streifenrost'. Braunrost bildet unregelmäßig verteilte, runde orangebraune Sporenhäufchen (Uredien)."},
  {c:"Biologie", q:"Was sind die charakteristischen Merkmale von Septoria tritici (Blattdürre) im Weizen?", o:["Unregelmäßige, chlorotisch-nekrotische Blattflecken mit winzigen schwarzen Punkten (Pyknidien) im Inneren","Gleichmäßige gelbe Verfärbung aller Blätter","Weißer Pilzrasen auf der Blattoberfläche","Braune, abgeknickte Halme an der Basis"], a:0, e:"Die schwarzen Pyknidien (Sporenträger des Pilzes) im Inneren der braungrauen Flecken sind das Schlüsselmerkmal zur Unterscheidung von Septoria tritici von anderen Weizenkrankheiten."},
  {c:"Biologie", q:"Welches Symptom verursacht Fusarium spp. an der Weizenähre, und welches toxikologische Risiko besteht?", o:["Taubähren: einzelne oder ganze Ährchen bleichen vorzeitig aus; Bildung von Mykotoxinen (v. a. Deoxynivalenol, DON)","Schwarze Sporenlager an den Ähren (Brandsporen)","Roter Belag auf Ähren und Spelzen","Ährenknickung ohne Verfärbung"], a:0, e:"Fusarium-Infektionen zur Blüte erzeugen das gefährliche Mykotoxin DON. Es ist hitzestabil und kann sich im Mehl anreichern – Grenzwerte für Backweizen sind streng reglementiert."},
  {c:"Biologie", q:"Was ist Halmbruch (Pseudocercosporella herpotrichoides / Oculimacula spp.) und welches typische Symptom tritt an der Halmbasis auf?", o:["Pilzbefall der Halmbasis: linsenförmige Augenflecken mit hellem Zentrum und dunklem Rand; bei starkem Befall: Lager durch zerstörtes Leitgewebe","Brauner Rost auf dem Halm","Weißes Pilzmyzel an der Bodenoberfläche","Schwarze Punkte auf den Blättern"], a:0, e:"Die 'Augenflecken' (eye spots) an der Halmbasis sind das Erkennungsmerkmal. Der Pilz zerstört die Leitbündel, der Halm knickt ein (Lager), Ertrag und Qualität leiden massiv."},
  {c:"Biologie", q:"Welche Pilzkrankheit verursacht die sogenannte 'Ringelfleckigkeit' oder 'Sprenkelkrankheit' bei Gerste (Ramularia collo-cygni)?", o:["Ramularia collo-cygni: kleine, rechteckige, dunkelbraune Flecken, oft durch Stress (UV-Licht, Trockenheit) ausgelöst – typischerweise erst nach der Blüte","Rhynchosporium: ovale Flecken mit hellem Rand","Netzfleckenkrankheit: charakteristisches Netz-Muster aus Längs- und Querstreifen","Mehltau: weißer Belag"], a:0, e:"Ramularia tritt oft erst spät auf (nach Blüte), wird durch Umweltstress getriggert und ist durch seine charakteristischen, rechteckigen (durch die Blattadern begrenzten) Flecken identifizierbar."},
  {c:"Biologie", q:"Woran erkennt man die Kohlhernie (Plasmodiophora brassicae) und wie unterscheidet sie sich vom Kohlgallenrüssler?", o:["Kohlhernie: massive, unregelmäßige, solide Knollenbildung an der Wurzel; Kohlgallenrüssler: spindelförmige, hohle Gallen mit einer Larve im Inneren","Beide erzeugen identische Gallen","Kohlhernie bildet Gallen nur an der Stängelspitze","Kohlgallenrüssler befällt nur Blätter"], a:0, e:"Kohlhernie-Gallen bestehen aus hypertrophiertem Pflanzengewebe (massiv, fest). Rüsslergallen sind hohl und enthalten eine cremefarben-weiße Larve – entscheidend für die richtige Bekämpfungsstrategie."},
  {c:"Biologie", q:"Was versteht man unter 'Echter Mehltau' an Getreide – wie sieht er aus, wann tritt er auf, und was unterscheidet ihn von Falschem Mehltau?", o:["Weißer, mehliger Pilzrasen auf der Blattoberfläche (abwischbar); tritt bei trocken-warmem Wetter auf; Falscher Mehltau bildet Rasen auf der Blattunterseite","Grauer Belag unter dem Blatt; tritt bei feuchtem Wetter auf","Gelbe Flecken auf der Blattoberseite; Falscher Mehltau ist weiß","Beide sind identisch, nur der Geruch ist verschieden"], a:0, e:"Echter Mehltau (Erysiphe graminis) wächst außen auf der Blattoberfläche und liebt trockene Phasen mit warmen Tagen. Falscher Mehltau bildet seinen Sporenrasen typischerweise an der Blattunterseite und braucht Feuchte."},

  // BIOLOGIE – Schädlinge
  {c:"Biologie", q:"Welcher Schädling überträgt das Gerstengelb-Verzwergungs-Virus (BYDV), und wann ist der kritische Infektionszeitraum?", o:["Blattläuse (vor allem Rhopalosiphum padi); kritische Phase: warme Herbste mit langem Auflauf und anhaltendem Blattlausflug","Drahtwürmer; kritische Phase: Saat im Frühjahr","Zikaden; kritische Phase: Sommer","Nematoden; kritische Phase: nach der Ernte"], a:0, e:"BYDV wird persistent durch saugende Blattläuse übertragen. Warme Herbste ermöglichen längeren Virusflug und höheren Befallsdruck. Frühsaaten und Mais als Nachbar erhöhen das Risiko."},
  {c:"Biologie", q:"Woran erkennt man den Befall durch den Rapsglanzkäfer, und warum ist die Bekämpfung im Knospenstadium so wichtig?", o:["Käfer beißen in geschlossene Knospen und fressen Pollen heraus → Knospen fallen ab; im offenen Blütenstadium ist der Käfer harmlos, da er Pollen aus offenen Blüten frisst","Käfer befällt Blätter und saugt Siebröhren aus","Käfer legt Eier in Schoten, die dann aufplatzen","Käfer befällt nur Stängel"], a:0, e:"Im Knospenstadium (BBCH 51–59) ist der wirtschaftliche Schaden am größten – jede angebissene Knospe ist ein verlorener Schoten. Nach der Blütenöffnung ist der Käfer nützlich (Bestäubung)."},
  {c:"Biologie", q:"Was sind die typischen Schadbild-Symptome des Maiszünslers (Ostrinia nubilalis) und warum ist der Bekämpfungszeitpunkt so entscheidend?", o:["Bohrlöcher im Stängel, abknickende Stängel und Kolben; die Bekämpfung muss erfolgen, wenn die Larven schlüpfen und auf der Pflanzenoberfläche sind – danach im Stängel nicht mehr erreichbar","Blattfraß an der Blattspitze, jederzeit bekämpfbar","Wurzelfraß, bekämpfbar mit Bodeninsektiziden","Virusinfektion, bekämpfbar mit systemischen Mitteln"], a:0, e:"Sobald die Raupe des Maiszünslers im Stängel ist, schützt sie das Pflanzengewebe vor Kontakt mit PSM-Spritzbrühe. Daher ist die Bekämpfung auf das Schlupffenster der Larven (Eiablage bis Einbohren) begrenzt."},
  {c:"Biologie", q:"Was verursacht der Große Rapsstängelrüssler (Ceutorhynchus napi) und welches Symptom entsteht im Frühjahr?", o:["Die Larven fressen das Stängelmark; das Stängelgewebe kann nicht mehr wachsen, der Stängel reißt längs auf, Triebe verdrehen sich (typische S-förmige Verbiegung)","Die Larven befallen Schoten und leeren sie aus","Der Käfer frisst Blätter lochartig an","Die Larven verursachen Wurzelfäule"], a:0, e:"Nach der Eiablage im Stängel fressen die Larven das Mark heraus. Das Stängelgewebe reißt im Frühjahr auf – typisches Erkennungsmerkmal, das zum Ertragsverlust durch gestörten Nährstofftransport führt."},
  {c:"Biologie", q:"Woran erkennt man den Rapserdflohabefall im Herbst, und welche Generation verursacht den Hauptschaden?", o:["Adulte: feiner Lochfraß (schrotschussartig) in Keim- und Laubblättern; Hauptschaden durch Larven, die im Frühjahr in Blattstielen/Stängeln minieren","Adulte fressen vollständige Blätter ab; Larven schädigen Wurzeln","Befallssymptome erst zur Blüte sichtbar","Nur ein einziger Fraßschaden – Stängelloch"], a:0, e:"Adulte Rapserdflöhe (Psylliodes chrysocephala) verursachen im Herbst den charakteristischen Schrotschuss-Lochfraß. Die eigentlichen Ertragsschäden entstehen dann durch die überwinternden Larven, die im Frühjahr in Blattstielen und Stängelgewebe fressen."},
  {c:"Biologie", q:"Was sind die Schadbild-Merkmale des Getreidehähnchens (Oulema melanopus), und durch welche Generation entsteht das charakteristische Fensterfraß-Bild?", o:["Larven fressen das Blattmesophyll streifenförmig aus; es bleibt nur die papierartige Oberhaut stehen (Fensterfraß/Silberstreifen)","Käfer beißen runde Löcher in die Blätter","Larven minieren zwischen Blattadern, Blatt bleibt grün","Käfer saugen Halmsaft aus"], a:0, e:"Die schleimüberzogenen Larven des Getreidehähnchens fressen das Blattgrün (Palisadenparenchym) heraus; die verbleibende transparente Epidermis trocknet zu weißlich-silbrigen Streifen (Fensterfraß) ein."},

  // BIOLOGIE – Unkräuter & IPS
  {c:"Biologie", q:"Warum gilt Ackerfuchsschwanz (Alopecurus myosuroides) als das problematischste Ungras in Wintergetreide-Fruchtfolgen?", o:["Extreme Konkurrenzkraft um Licht und Nährstoffe, hohe Samenproduktion und hohes Resistenzrisiko gegen HRAC-Gruppen A (ACCase-Hemmer) und B (ALS-Hemmer)","Er ist giftig für Tiere","Er überträgt Pflanzenviren","Er stört die Erntemaschinen durch zähes Stroh"], a:0, e:"Ein einzelner AFU-Halm kann 300–1000 Samen bilden. Durch einseitige Herbizidstrategie haben sich weltweit multiple Resistenzen (target-site + metabolisch) entwickelt, die kaum noch chemisch bekämpfbar sind."},
  {c:"Biologie", q:"Wie unterscheidet man Ackerfuchsschwanz von Windhalm (Apera spica-venti) im Jugendstadium – ohne Ähre?", o:["AFU: kurze, gestutzte (gesägte) Ligula, keine Blattöhrchen, raue Blattoberfläche; Windhalm: lange (3–8 mm), tief gespaltene Ligula, ebenfalls keine Öhrchen","AFU ist dunkelgrün, Windhalm hellgrün","AFU hat immer rote Blattscheiden, Windhalm nicht","Beide sind im Jugendstadium identisch, nur am Wuchs unterscheidbar"], a:0, e:"Die Ligula (Blatthäutchen an der Blattscheide) ist das wichtigste Unterscheidungsmerkmal: AFU-Ligula ist kurz, gezähnelt; Windhalm-Ligula ist auffällig lang und gespalten. Richtige Diagnose = richtige Herbizidwahl."},
  {c:"Biologie", q:"Was versteht man unter 'Metabolischer Resistenz' bei Unkräutern, und warum ist sie besonders gefährlich?", o:["Das Unkraut baut den Wirkstoff enzymatisch ab, bevor er die Zielstruktur erreicht; gefährlich, weil oft mehrere Wirkmechanismen gleichzeitig betroffen sind","Die Zielstruktur (Target Site) des Wirkstoffs verändert sich durch Mutation","Das Unkraut meidet die Herbizidwolke durch geringere Spaltöffnungsöffnung","Das Unkraut wächst tiefer im Boden und wird nicht getroffen"], a:0, e:"Metabolische Resistenz wird durch Enzyme (Cytochrom P450, GST) vermittelt, die viele verschiedene Herbizidwirkstoffe inaktivieren. Im Gegensatz zur Target-Site-Resistenz kann sie mehrere HRAC-Klassen gleichzeitig betreffen."},
  {c:"Biologie", q:"Was ist das 'Falsche Saatbett' und welchen Vorteil bringt diese Maßnahme bei der Bekämpfung von Ackerfuchsschwanz?", o:["Frühzeitige Bodenbearbeitung zur Keimprovokation, anschließend mechanische oder chemische Beseitigung der aufgelaufenen Unkräuter VOR der eigentlichen Saat – verringert den Samenvorrat im Boden","Saatbettbereitung mit dem falschen Gerät","Saat in das Stroh ohne Bodenbearbeitung","Blindstriegeln nach der Saat"], a:0, e:"Durch wiederholtes Provozieren und Beseitigen von AFU-Keimlingen vor der Kulturpflanzen-Saat kann der Samenvorrat im Boden über Jahre deutlich reduziert werden – sehr wirksame, herbizidfreie Maßnahme."},
  {c:"Biologie", q:"Was versteht man unter der 'Schadschwelle' im Integrierten Pflanzenschutz?", o:["Die Befallsdichte, bei der der erwartete Ertragsverlust die Kosten der Bekämpfungsmaßnahme übersteigt und eine Behandlung wirtschaftlich sinnvoll wird","Das gesetzliche Maximum an PSM pro Hektar","Die Konzentration eines PSM, die tödlich für Menschen ist","Der Zeitpunkt, ab dem das Feld nicht mehr geerntet werden darf"], a:0, e:"Die Schadschwelle ist kein fester Wert, sondern abhängig von Befallsdichte, Kulturwert, Mittelkosten und Prognose. Nur bei Überschreitung ist eine Bekämpfung ökonomisch und ökologisch vertretbar."},
  {c:"Biologie", q:"Welche Strategie der Bodenbearbeitung fördert das Fusarium-Risiko im Winterweizen nach Mais?", o:["Mulchsaat ohne vorheriges Häckseln und Einarbeiten der Maisstoppeln belässt das Primärinokulum an der Oberfläche","Pflügen verhindert die Sporenabwehr der Pflanze","Grubberbearbeitung erhöht den Bodenwasserspiegel","Kreiselegge zerstört die Pilzmyzelien"], a:0, e:"Fusarium-Arten überleben auf Maisstoppeln an der Bodenoberfläche als Primärinokulum. Pflügen (tiefes Einarbeiten) reduziert das Risiko; Mulchsaat mit Stoppelresten erhöht es massiv."},
  {c:"Biologie", q:"Wann ist das BBCH-Stadium 51 im Getreide erreicht, und welche Maßnahme ist an diesen Zeitpunkt geknüpft?", o:["Beginn des Ährenschiebens (erste Ährenspitze sichtbar); Zeitpunkt für die späte Ährenbehandlung gegen Fusarium und Septoria nodorum","Beginn der Bestockung; Zeitpunkt für Herbizide","Ende der Milchreife; letzter Termin für Fungizide","Auflaufen; Zeitpunkt für Insektizide"], a:0, e:"BBCH 51 markiert das Beginn-Ährenschieben. Die Ährenbehandlung (Fusarium/Septoria-Prophylaxe) findet zwischen BBCH 61–65 (Vollblüte) statt – aber das Ziel-Stadium 51 ist der späteste Planungszeitpunkt."},

  // WIRKSTOFFE
  {c:"Wirkstoffe", q:"Was bedeutet 'HRAC-Gruppe A' bei Herbiziden, und warum ist Resistenz in dieser Gruppe ein weltweites Problem?", o:["ACCase-Hemmer (Fops und Dims), die selektiv gegen Gräser wirken; Resistenz durch Mutation an der Zielstruktur (ACCase-Enzym) ist weltweit weit verbreitet","Alle Kontaktherbizide ohne systemische Wirkung","Bodenherbizide mit sehr langer Persistenz","Wuchsstoffe für breitblättrige Unkräuter"], a:0, e:"Gruppe A umfasst Aryloxyphenoxypropionate ('Fops') und Cyclohexandione ('Dims'). Durch jahrzehntelangen Einsatz gegen AFU und Windhalm haben sich Resistenzmutationen am ACCase-Gen weltweit durchgesetzt."},
  {c:"Wirkstoffe", q:"Wie wirken Sulfonylharnstoffe (HRAC-Gruppe B) und warum ist der Wirkungseintritt verzögert?", o:["ALS-Inhibitoren: sie hemmen das Enzym Acetolactat-Synthase (erster Schritt der verzweigten Aminosäuresynthese); Wachstumsstopp sofort, aber sichtbares Absterben erst nach 7–21 Tagen","Sie zerstören die Zellwand sofort; Unkraut stirbt in 24 h","Sie wirken über den Boden und werden erst nach starkem Regen aktiv","Sie hemmen die Photosynthese und wirken bei Sonnenlicht sofort"], a:0, e:"ALS-Hemmer (Gruppe B) stoppen die Zellteilung durch Blockade der Aminosäuresynthese. Das Unkraut hört sofort auf zu wachsen, stirbt aber erst ab, wenn die vorhandenen Aminosäurereserven erschöpft sind."},
  {c:"Wirkstoffe", q:"Wie wirken Strobilurine (FRAC-Gruppe 11) und warum sind sie hochgradig resistenzgefährdet?", o:["Sie hemmen die mitochondriale Elektronentransportkette (Komplex III) und blockieren die Energiegewinnung der Pilze; nur eine Single-Point-Mutation am Zielort (Cytochrom b) reicht für vollständige Resistenz","Sie zerstören die Pilzellwand durch osmotischen Druck","Sie greifen in die Pilzzellteilung ein; viele Mutationen nötig für Resistenz","Sie wirken nur preventiv und verteilen sich nicht in der Pflanze"], a:0, e:"Strobilurine (z. B. Azoxystrobin, Pyraclostrobin) haben einen einzigen Angriffspunkt (Cytochrom b, G143A-Mutation). Eine Einzelmutation genügt für vollständige Resistenz, daher striktes Mischungsgebot mit anderen FRAC-Klassen."},
  {c:"Wirkstoffe", q:"Wie wirkt Glyphosat, und warum erfasst es auch tiefwurzelnde Rhizomunkräuter?", o:["Hemmt das EPSP-Synthase-Enzym (Shikimat-Weg) systemisch; wird über Blatt aufgenommen und phloem-mobil in alle Pflanzenteile inklusive Rhizome und Ausläufer transportiert","Wirkt nur auf Blätter, nicht auf Wurzeln","Blockiert die Photosynthese im Chloroplasten","Wirkt über den Boden und tötet Wurzeln kontakt"], a:0, e:"Glyphosat ist phloem-mobil: Es wandert aktiv mit den Photoassimilaten in alle Senken der Pflanze, auch in tief im Boden liegende Rhizome von Quecke oder Ackerwinde. Daher ist es ein effektives Totalherbizid gegen ausdauernde Unkräuter."},
  {c:"Wirkstoffe", q:"Was ist ein 'Safener' und in welcher Kultur wird er typischerweise eingesetzt?", o:["Ein Schutzmittel, das die Nutzpflanze vor Herbizidschäden bewahrt, indem es die Entgiftungsenzyme (z. B. GST) der Kulturpflanze stimuliert; typisch im Mais","Ein Zusatz, der die Wirkung des Fungizids verstärkt","Ein Netzmittel zur besseren Blattbenetzung","Ein Düngestoff, der dem PSM beigemengt ist"], a:0, e:"Safener (z. B. Isoxadifen, Cyprosulfamide) werden Gräser-Herbiziden im Mais beigemischt. Sie 'trainieren' spezifische Entgiftungsenzyme in der Maispflanze vor, sodass das Herbizid rasch metabolisiert wird, bevor es Schaden anrichtet."},
  {c:"Wirkstoffe", q:"Was besagt der FRAC/HRAC-Code und wie nutzt man ihn für ein Resistenzmanagement?", o:["Er klassifiziert PSM nach ihrem Wirkmechanismus; durch Wechseln oder Mischen von Mitteln verschiedener Codes verhindert man die Selektion resistenter Stämme","Er ist nur ein Marketingcode ohne biologische Bedeutung","Er gibt die empfohlene Aufwandmenge an","Er listet zugelassene Kulturen auf"], a:0, e:"Wirkstoffe mit demselben FRAC/HRAC-Code haben denselben Angriffspunkt – wer sie mehrfach hintereinander einsetzt, selektiert resistente Individuen. Wer Codes rotiert (z. B. FRAC 3 + 7 + 11), verhindert dies."},
  {c:"Wirkstoffe", q:"Was ist Bodenherbizid-Wirkung und welche Voraussetzung ist im Boden unbedingt nötig?", o:["Der Wirkstoff bildet im Oberboden einen Film; Unkrautkeimlinge nehmen ihn beim Keimen auf; Voraussetzung: ausreichende Bodenfeuchtigkeit, damit der Wirkstoff gelöst und aufgenommen werden kann","Bodenherbizide wirken nur auf bereits aufgelaufene Pflanzen","Bodenherbizide müssen bei starker Sonne ausgebracht werden","Bodenherbizide brauchen keinen Regen, da sie aus der Luft wirken"], a:0, e:"Auf trockenem Boden bleibt der Wirkstoff an Bodenpartikel adsorbiert und wird von den Keimlingswurzeln oder Keimblättern nicht aufgenommen. Erst mit Niederschlag oder Beregnung löst er sich und entfaltet seine Wirkung."},

  // WEITERE FRAGEN
  {c:"Biologie", q:"Was versteht man unter 'Phytophthora infestans' und warum kann die Krankheit innerhalb weniger Tage einen ganzen Kartoffelbestand vernichten?", o:["Oomycet (falscher Pilz); er sporuliert extrem schnell bei feuchtem Wetter (> 90 % rel. LF), die Inkubationszeit beträgt nur 3–5 Tage – ein exponentielles Befallswachstum ist möglich","Echter Pilz; er wirkt langsam über 4–6 Wochen","Bakterium; er befällt nur die Knollen im Boden","Virus; er wird durch Blattläuse übertragen"], a:0, e:"Phytophthora ist kein echter Pilz, sondern ein Oomycet. Bei idealen Bedingungen (18–22 °C, Blattnässe) sind innerhalb von 3 Tagen neue Sporangien reif – ein einziger Herd kann in wenigen Tagen einen Hektar befallen."},
  {c:"Biologie", q:"Was ist 'Mutterkorn' (Claviceps purpurea) im Roggen, und welche Bedingungen begünstigen seinen Befall?", o:["Ein Schlauchpilz, der offene Roggenblüten infiziert und Sklerotien (dunkle, hornförmige Dauerkörper) bildet; feucht-kühles Wetter zur Blüte und schlechte Bestäubung fördern den Befall","Ein Käfer, der Roggenkörner frisst","Ein Virus, der zur Zwergwüchsigkeit führt","Bacteriose, die schwarze Halme erzeugt"], a:0, e:"Sklerotien von Mutterkorn enthalten Alkaloide (Ergotamine), die für Mensch und Tier hochgiftig sind. Feuchtes Wetter hält Blüten länger offen; unvollständige Bestäubung schafft Eintrittspforten für den Pilz."},
  {c:"Biologie", q:"Welche Neonikotinoide sind EU-weit für Freilandsaatgutbeize weitgehend verboten, und was ist der Hauptgrund?", o:["Imidacloprid, Clothianidin, Thiamethoxam; systemische Wirkung in Pollen und Nektar gefährdet Bienen und andere Bestäuber (Subletale Effekte auf Navigation und Lernvermögen)","Glyphosat; Rückstände im Honig","Chlorpyrifos; Geruchsbelästigung für Bienen","Pyrethrins; Rückstände in Bienenwachs"], a:0, e:"Die EU hat Imidacloprid, Clothianidin und Thiamethoxam (drei Neonikotinoide) 2018 für alle Freilandanwendungen weitgehend verboten. Der Hauptgrund ist ihre systemische Aufnahme durch Pflanzen: Bienen und Hummeln werden durch geringe, subletale Mengen in Pollen und Nektar bei der Orientierung und beim Lernen geschädigt."},
  {c:"Biologie", q:"Was bedeutet 'Integrierter Pflanzenschutz' (IPS) nach dem Pflanzenschutzgesetz, und in welcher Reihenfolge sind die Maßnahmen zu prüfen?", o:["Kombination aller geeigneten Methoden (ackerbaulich, biologisch, mechanisch, chemisch) unter Bevorzugung nicht-chemischer Maßnahmen; Chemie ist das letzte Mittel","Nur biologische Bekämpfung ohne Chemie","Möglichst viele verschiedene PSM gleichzeitig einsetzen","Chemie zuerst, da sie am sichersten wirkt"], a:0, e:"Der IPS verlangt: 1) Prophylaxe durch Fruchtfolge/Sorten/Bodenbearbeitung, 2) Monitoring und Schadschwellen, 3) Mechanische/biologische Maßnahmen, 4) Chemische Maßnahmen nur bei Schadschwellenüberschreitung."},
  {c:"Technik", q:"Was ist eine 'pneumatische Pflanzenschutzspritze' und welche Zielgruppen profitieren davon?", o:["Eine Spritze, die Tropfen durch einen gezielten Luftstrom in den Bestand oder Baum trägt; besonders im Wein- und Obstbau, um auch Blattunterseiten zu benetzen","Eine Spritze mit Luftreifen für schwieriges Gelände","Eine Spritze ohne Pumpe, betrieben mit Druckluft aus dem Traktor","Eine ferngesteuerte Drohnenspritze"], a:0, e:"Pneumatische Gebläsespritzen ('Tunnel-' oder 'Gebläsegeräte') nutzen einen kräftigen Luftstrom, um Tröpfchen aktiv tief in die Bestandsstruktur zu transportieren – unverzichtbar für den Raumkulturbau (Reben, Äpfel)."},
  {c:"Recht", q:"Was ist der Unterschied zwischen 'Zulassungsbeendigungstermin' und 'Aufbrauchfrist' bei einem Pflanzenschutzmittel?", o:["Zulassungsbeendigungstermin: Ab diesem Tag darf der Handel das Mittel nicht mehr abgeben. Danach läuft die Aufbrauchfrist für vorhandene Restbestände beim Landwirt","Beide Begriffe sind synonym","Zulassungsbeendigungstermin gilt nur für den Hersteller","Aufbrauchfrist beginnt erst 5 Jahre nach Zulassungsende"], a:0, e:"Der Zulassungsbeendigungstermin beendet den Handel. Die Aufbrauchfrist (gesetzlich max. 18 Monate nach Widerruf) erlaubt dem Landwirt, bereits erworbene Ware aufzubrauchen. Nach Ablauf der Aufbrauchfrist ist jede Anwendung verboten."},
  {c:"Biologie", q:"Was sind die typischen Symptome von Cercospora beticola an Zuckerrübenblättern, und welche Auswirkung hat starker Befall auf den Ertrag?", o:["Kleine, runde Flecken mit hellem Zentrum und rotem bis braunem Rand; bei starkem Befall massiver Blattverlust → reduzierte Assimilation → deutlich geringere Zuckeranreicherung in der Rübe","Gelb-grüne Blattaufhellung ohne Flecken; kaum Auswirkung auf Ertrag","Großflächige braune Flecken auf Blattunterseite; verursacht Wurzelfäule","Schwärzung der Gefäßbündel; führt zu Welke"], a:0, e:"Cercospora-Flecken sind kreisrund mit hellgrauem Zentrum und intensiv rotem Rand. Starker Befall zwingt die Rübe, neue Blätter zu bilden ('Zweitverhulstung') – auf Kosten der Zuckereinlagerung in die Wurzel."},
  {c:"Biologie", q:"Woran erkennt man die Netzfleckenkrankheit (Pyrenophora teres) der Gerste, und welcher Witterungstyp fördert sie?", o:["Charakteristisches Netz-Muster aus dunklen Längs- und Querstreifen auf dem Blatt; feucht-kühle Witterung mit häufigen Tauperioden fördert Sporulation und Infektion","Weiße Flecken ohne Rand; fördert Trockenheit","Rote Pusteln auf der Blattunterseite; fördert trockene Hitze","Grüne, wassergetränkte Flecken; fördert Frost"], a:0, e:"Das netzartige Muster aus braunen Längs- und Querstreifen ist das unverwechselbare Merkmal. Feuchte, kühle Perioden begünstigen die Infektion. Die Krankheit kann bis zu 30 % Ertragsverlust verursachen."},
  {c:"Technik", q:"Was versteht man unter 'sensorgestützter Teilflächenbehandlung' und welche Einsparungen sind möglich?", o:["Kamerasensoren oder Spektrometersensoren erkennen Unkrautnester in Echtzeit, schalten Düsensektionen gezielt an – in vielen Fällen 50–90 % Herbizideinsparung möglich","Spritzen nur nachts mit Infrarotsensoren zur Erkennung von Wärme","Manuelles Kartieren und nachträgliches Ausbringen per Hand","GPS-geführtes Fahren ohne Überlappung"], a:0, e:"Optische Sensoren (z. B. WEEDit, Greenseeker) erkennen photosynthetisch aktive Biomasse oder Unkrautmuster. Nur dort, wo wirklich Unkraut ist, wird gespritzt – drastische PSM-Einsparung und Umweltentlastung."},
  {c:"Biologie", q:"Was sind 'Mykotoxine' und welche Bedeutung haben sie für die Lebensmittel- und Futtermittelsicherheit?", o:["Giftige Sekundärmetabolite von Schimmelpilzen (z. B. DON, ZEA von Fusarium, Ochratoxin A von Aspergillus); hitzestabil, nicht abbaubar beim Backen – Grenzwerte in EU-Recht festgelegt","Natürliche Pilzaromastoffe ohne Gesundheitsrisiko","Nur in Futtermitteln problematisch, in Lebensmitteln harmlos","Bakterientoxine, die nur bei > 60 °C gebildet werden"], a:0, e:"Mykotoxine (z. B. DON = Deoxynivalenol) sind in der Pflanze gebildete Gifte, die Backen oder Kochen überleben. Sie schädigen Leber, Immunsystem und Nieren von Mensch und Tier. EU-Grenzwerte regeln maximal zulässige Gehalte in Getreide und Mehl."},
  {c:"Biologie", q:"Was sind Nützlinge im Pflanzenschutz, welche Beispiele gibt es und wie fördert man sie?", o:["Organismen, die Schädlinge begrenzen (z. B. Marienkäfer und Schwebfliegenlarven gegen Blattläuse, Schlupfwespen gegen Getreidehähnchen-Larven); Förderung durch Blühstreifen, Hecken, Saumstrukturen","Chemische Hilfsstoffe, die PSM verstärken","Nur Bienen und Hummeln, die bestäuben","Bakterien im Boden, die Dünger aufnehmen"], a:0, e:"Ein reiches Nützlingsnetz (Raubinsekten, Parasitoide, Spinnen) reguliert Schädlingspopulationen und kann den chemischen Insektizideinsatz deutlich reduzieren. Heckenpflanzungen und Blühstreifen sind dabei zentrale Bausteine im IPS."},
  {c:"Recht", q:"Was besagt das 'Verzeichnis regionalisierter Kleinstrukturanteile' bei NW-Auflagen und wer profitiert davon?", o:["In Regionen mit hohem Anteil an Landschaftselementen (Hecken, Gräben > 2 m Breite) können Gewässerabstände unter Einhaltung von Auflagen reduziert werden","Es ist eine Liste aller verbotenen PSM in Naturschutzgebieten","Es regelt den Abstand von PSM-Gebinden zu Kleinlebewesen im Lager","Es listet alle Klein-Betriebe mit weniger als 50 ha auf"], a:0, e:"In Regionen mit hohem Kleinstrukturanteil (> X % der Fläche ist Landschaftselement) kann der Mindestabstand zu Gewässern von 10 m auf 5 m oder von 5 m auf 0 m reduziert werden – unter der Bedingung, dass eine ausreichende Pufferwirkung durch die Landschaftsstruktur gegeben ist."},
];

let activeQuestions = [];
let currentIndex = 0;
let score = 0;
let wrongCount = 0;
let answered = 0;
let phase = 'intro'; // intro | quiz | result

const letters = ['A','B','C','D'];

function $(id){ return document.getElementById(id); }

function renderIntro() {
  phase = 'intro';
  $('stats-bar').style.display = 'none';
  $('main-content').innerHTML = `
    <div class="intro-card">
      <div class="intro-icon">🌿</div>
      <h2 class="intro-title">Prüfungstraining starten</h2>
      <p class="intro-desc">
        Du bekommst 30 zufällig ausgewählte Fragen aus allen Themenbereichen.
        Die Fragen sind so formuliert, dass du wirklich verstehst – nicht nur auswendig lernst.
      </p>
      <div class="topics-grid">
        <div class="topic-item"><span class="topic-dot"></span>Technik & Geräte</div>
        <div class="topic-item"><span class="topic-dot"></span>Pflanzenkrankheiten</div>
        <div class="topic-item"><span class="topic-dot"></span>Schädlinge & Biologie</div>
        <div class="topic-item"><span class="topic-dot"></span>Recht & Zulassung</div>
        <div class="topic-item"><span class="topic-dot"></span>Wirkstoffe & Resistenz</div>
        <div class="topic-item"><span class="topic-dot"></span>Umwelt & Gewässerschutz</div>
      </div>
      <button class="start-btn" onclick="startQuiz()">Training beginnen →</button>
    </div>
  `;
}

function startQuiz() {
  activeQuestions = [...fullPool].sort(() => Math.random() - 0.5).slice(0, 30);
  currentIndex = 0;
  score = 0;
  wrongCount = 0;
  answered = 0;
  phase = 'quiz';
  $('stats-bar').style.display = 'flex';
  updateStats();
  renderQuestion();
}

function renderQuestion() {
  const q = activeQuestions[currentIndex];
  const progress = ((currentIndex) / 30) * 100;

  // Shuffle options but keep original index reference
  let opts = q.o.map((text, i) => ({text, origIdx: i}));
  opts.sort(() => Math.random() - 0.5);

  const optionsHTML = opts.map((opt, pos) => `
    <button class="opt-btn" onclick="checkAnswer(${opt.origIdx}, ${q.a}, this, '${escapeForAttr(q.e)}')" data-orig="${opt.origIdx}">
      <span class="opt-letter">${letters[pos]}</span>
      <span>${opt.text}</span>
    </button>
  `).join('');

  $('main-content').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:${progress}%"></div></div>
      <span class="progress-label">${currentIndex + 1} / 30</span>
    </div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-category">${q.c}</span>
        <span class="q-number">Frage ${currentIndex + 1}</span>
      </div>
      <p class="q-text">${q.q}</p>
      <div class="options-grid" id="options-grid">
        ${optionsHTML}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">
        ${currentIndex < 29 ? 'Nächste Frage' : 'Ergebnis anzeigen'}
      </button>
    </div>
  `;
}

function escapeForAttr(str) {
  return str.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
}

function checkAnswer(selected, correct, clickedBtn, explanation) {
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = $('feedback');
  const nextBtn = $('next-btn');

  // Find the correct-answer button
  allBtns.forEach(b => {
    const orig = parseInt(b.getAttribute('data-orig'));
    if(orig === correct) b.classList.add('correct');
  });

  if(selected === correct) {
    score++;
    fb.className = 'feedback correct-fb';
    fb.innerHTML = `<span class="feedback-icon">✅</span><strong>Richtig!</strong> ${explanation}`;
  } else {
    wrongCount++;
    clickedBtn.classList.add('wrong');
    fb.className = 'feedback wrong-fb';
    fb.innerHTML = `<span class="feedback-icon">❌</span><strong>Falsch.</strong> ${explanation}`;
  }

  fb.style.display = 'block';
  nextBtn.style.display = 'block';
  answered++;
  updateStats();
}

function updateStats() {
  $('stat-score').textContent = score;
  $('stat-wrong').textContent = wrongCount;
  $('stat-pct').textContent = answered > 0 ? Math.round((score/answered)*100) + '%' : '–';
}

function nextQuestion() {
  currentIndex++;
  if(currentIndex < 30) renderQuestion();
  else showResult();
}

function showResult() {
  phase = 'result';
  const pct = Math.round((score/30)*100);
  let icon, msg;
  if(pct >= 85) { icon = '🏆'; msg = 'Hervorragende Leistung! Du bist bestens auf die Kammerprüfung vorbereitet. Wiederhole die wenigen Fehler noch einmal kurz.'; }
  else if(pct >= 70) { icon = '✅'; msg = 'Gutes Ergebnis! Noch ein paar gezielte Wiederholungen in den Schwachstellen, und die Prüfung wird kein Problem für dich.'; }
  else if(pct >= 50) { icon = '📚'; msg = 'Solide Basis, aber du solltest die Lücken schließen – besonders in Technik und Recht. Nochmal üben!'; }
  else { icon = '🔄'; msg = 'Das Ergebnis zeigt: Hier ist noch Lernbedarf. Geh die Bereiche systematisch durch und starte dann ein neues Training.'; }

  $('main-content').innerHTML = `
    <div class="result-card">
      <div class="result-icon">${icon}</div>
      <h2 class="result-title">Prüfungssimulation abgeschlossen</h2>
      <div class="score-display">
        <span class="score-number">${pct}</span>
        <span class="score-unit">%</span>
      </div>
      <div class="result-breakdown">
        <div class="breakdown-item">
          <span class="breakdown-num good">${score}</span>
          <span class="breakdown-label">Richtig</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-num bad">${wrongCount}</span>
          <span class="breakdown-label">Falsch</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-num">${30}</span>
          <span class="breakdown-label">Gesamt</span>
        </div>
      </div>
      <p class="result-msg">${msg}</p>
      <button class="restart-btn" onclick="renderIntro()">Neues Training starten</button>
    </div>
  `;
}

renderIntro();
</script>
</body>
</html>
