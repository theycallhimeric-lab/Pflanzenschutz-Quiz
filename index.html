oppelter Schadeffekt."},{"c":"Biologie","q":"Was sind Nematoden (Fadenwürmer) im Pflanzenschutz-Kontext und welche Kultur schädigen sie besonders?","o":["Fadenwürmer in Boden und Pflanze; Heterodera bildet Zysten; bekämpfbar durch Fruchtfolgepause und Resistenz","Weichhäutige Larven im Boden; fressen Feinwurzeln und erzeugen ähnliche Schäden wie Drahtwurm","Pilzähnliche Organismen; verursachen Wurzelgallen wie Plasmodiophora bei Kreuzblütlern","Mikroorganismen im Boden; übertragen Mykotoxine aus dem Boden in Pflanzenwurzeln"],"a":0,"e":"Kartoffelzystennematoden (weiß: G. pallida, gelb: G. rostochiensis) bilden Zysten, die jahrelang im Boden überdauern. Schadschwellen von 1 Ei pro ml Boden können bereits wirtschaftliche Verluste auslösen. Fruchtfolge ist die wichtigste Gegenmaßnahme."},{"c":"Biologie","q":"Woran erkennt man die Kohldrehherzmücke (Contarinia nasturtii) im Raps und wie unterscheidet sich ihr Schadbild von der Kohldrehfliege?","o":["Larven fressen Herzblatt des Rapses; typisches Symptom ist eine taube oder verrottende Triebspitze","Larven fressen Schoten von außen; Schote öffnet sich vorzeitig und verliert alle Körner","Adulte Fliegen raspeln Blattepidermis ab und legen Eier in Wunden an der Blattunterseite","Larven bohren Stängel von unten auf; ähnliches Schadbild wie Großer Rapsstängelrüssler"],"a":0,"e":"Beide verursachen Drehwuchs durch Larvenfraß im Herzbereich, aber die Mückenlarven (Contarinia nasturtii) sind weißlich und sehr klein; der Befall tritt früher auf (Herbst). Die korrekte Artbestimmung ist wichtig für den Bekämpfungszeitpunkt."},{"c":"Biologie","q":"Was ist die Schnecke (Arion/Deroceras spp.) im Pflanzenschutz, wann schadet sie am meisten und was hilft dagegen?","o":["Fressen Keimblätter und Auflaufstadien von Raps/Getreide; feuchte Bedingungen und Mulch begünstigen Schaden","Schädigen nur unterirdisches Gewebe; Schäden sichtbar erst nach vollständiger Bestockung","Überwintern ausschließlich als Eipaket in Bodenrissen; Schaden beginnt erst im Frühjahr","Befallen nur Körner im Lager; Schäden im Feld wurden bisher nicht wissenschaftlich nachgewiesen"],"a":0,"e":"Schneckenschäden treten besonders nach Mulchsaat auf feuchten Böden auf. Metaldehyd-Granulate sind effektiv, aber mit Vorsicht zu verwenden (Sicherheitsabstand zu Gewässern). Eisen-III-Phosphat ist in Bio-Betrieben zugelassen."},{"c":"Biologie","q":"Was ist der Pollen- oder Rapsglanzkäfer (Meligethes aeneus) – wie viele Larven entwickeln sich pro Knospe und warum ist das entscheidend?","o":["Frisst offene Blütenknospen; Schaden durch zerstörte Knospen, die keine Schoten bilden können","Frisst Stängelmark; Stängel knickt ein und gesamte Pflanzenhälfte welkt ab","Legt Eier in Blüten; Larven fressen Körner in der Schote, ähnlich dem Kohlschotenrüssler","Saugt Phloem-Saft; erzeugt Gallen an Blattstängeln, die die Blüte verzögern"],"a":0,"e":"Die wirtschaftliche Schadschwelle liegt bei ca. 4–5 Käfern pro Pflanze im frühen Knospenstadium (BBCH 51–53) bzw. 8–10 bei gut entwickeltem Bestand. Im Blütenstadium ist der Käfer harmlos – Bekämpfung dann schädlich für Bienen."},{"c":"Biologie","q":"Was ist der Unterschied zwischen Flugbrand (Ustilago nuda) und Steinbrand (Tilletia caries) beim Weizen?","o":["Flugbrand befällt Körner im Embryo, ist saatgutübertragen; Steinbrand bildet übelriechende Sporenballen","Flugbrand bildet sichtbare schwarze Sporenmassen auf Blättern; Steinbrand befällt nur Spelzen","Beide Brandpilze sind bodenbürtig und identisch bekämpfbar durch Saattiefenkorrektur","Flugbrand befällt Gerste, Steinbrand befällt Roggen; Weizen ist für beide unempfindlich"],"a":0,"e":"Flugbrand-Sporen infizieren zur Blüte und überdauern im Korn – erst beim nächsten Ährenschieben wird der Befall sichtbar (dann als staubige schwarze Ähre). Steinbrand-Butten bleiben bis zur Ernte intakt, führen aber durch ihren Fischgeruch zu massiver Qualitätsminderung."},{"c":"Biologie","q":"Was ist der Erreger von Phoma lingam (Schwarzbeinigkeit, Wurzelhalsfäule) im Raps und welche Symptome treten auf?","o":["Leptosphaeria maculans; Blattflecken im Herbst mit Pyknidien, Stängelgrund-Fäulnis und Abreife-Verlust","Sclerotinia sclerotiorum; Weißfäule im Stängel nach der Blüte; durch Ascosporen-Infektion","Alternaria brassicae; konzentrische Ringflecken; durch Sporenstäube bei Wind übertragen","Pythium spp.; wässrige Stängelbasis; durch Bodennässe gefördert, keine Blattflecken"],"a":0,"e":"Phoma ist die wirtschaftlich bedeutendste Rapskrankheit in Deutschland. Die Primärinfektion erfolgt im Herbst an Blättern; der Pilz wächst systemisch in den Stängelgrund. Resistente Sorten + Beizung + Fungizid-Einsatz im Herbst sind die Hauptschutzmaßnahmen."},{"c":"Biologie","q":"Was ist Botrytis cinerea (Grauschimmel) und unter welchen Bedingungen ist er besonders gefährlich?","o":["Omnipräsenter Nekrotroph; befällt Wunden und Absterbendes; gefährlich bei feuchtem Kleinklima im Bestand","Obligater Parasit auf lebendem Gewebe; sporuliert ausschließlich auf grünen, jungen Blättern","Wurzel-Oomycet; befällt Pflanzen bei Staunässe; keine Sporulation auf oberirdischen Teilen","Saatgutübertragener Ascomycet; infiziert systemisch; sichtbar erst kurz vor der Ernte"],"a":0,"e":"Botrytis ist ein opportunistischer Pilz – er besiedelt Wunden, abgestorbene Blätter und überwinterte Pflanzenreste. In Raps, Kartoffeln, Erdbeeren und Gemüse verursacht er massive Verluste; dichter Bestand und lange Tauperioden fördern ihn stark."},{"c":"Biologie","q":"Was ist die Kraut- und Knollenfäule der Kartoffel (Phytophthora infestans) und wie erkennt man den Befall?","o":["Phytophthora infestans (Oomycet); befällt Blatt und Knolle; begünstigt durch Feuchte und 10–20 °C","Botrytis cinerea; befällt Laub und Stängel; bildet grauen Sporenbelag bei Dauernässe","Alternaria solani; bildet Frühflecken auf älteren Blättern; gefördert durch trockene Wärme","Rhizoctonia solani; befällt ausschließlich Knollen; sichtbar als schwarze Sklerotien an Schale"],"a":0,"e":"Der weiße Pilzrasen auf der Blattunterseite (Sporulation bei Blattnässe) ist das diagnostische Schlüsselmerkmal. Befallene Knollen können im Lager völlig verfaulen und gesunde Knollen infizieren."},{"c":"Biologie","q":"Was ist der Unterschied zwischen obligaten und fakultativen Pathogenen im Pflanzenschutz?","o":["Obligate Parasiten brauchen lebende Wirtszellen (Echte Mehltaupilze, Roste); fakultative können auch totes Gewebe besiedeln","Obligate Parasiten sind immer gefährlicher; fakultative werden durch Insektizide bekämpft","Obligate Parasiten sind nur im Boden aktiv; fakultative wachsen nur auf oberirdischen Teilen","Kein praktischer Unterschied; Einteilung ist nur für die Taxonomie, nicht für die Bekämpfung relevant"],"a":0,"e":"Diese Unterscheidung ist wichtig für die Bekämpfungsstrategie: Obligate Parasiten (echte Mehltaupilze, Roste) können nur auf der lebenden Pflanze bekämpft werden; fakultative Parasiten müssen auch über Bodenhygiene, Stoppelmanagement und Fruchtfolge kontrolliert werden."},{"c":"Biologie","q":"Was ist die 'Rhynchosporium-Blattfleckenkrankheit' (Narbiger Blattfleck) an Gerste und welche Bedingungen fördern sie?","o":["Rhynchosporium secalis; ovale Flecken mit hellem Zentrum und dunklem Rand; kühle Feuchte begünstigt Sporenkeimung","Pyrenophora teres; netzartige Streifen und Querläsionen; trockene Sommerphasen begünstigen Ausbreitung","Ramularia collo-cygni; rechteckige Flecken nach der Blüte; durch UV-Stress der Pflanze ausgelöst","Drechslera graminea; Längsstreifen mit Chlorose; saatgutübertragen, nur bei Gerste relevant"],"a":0,"e":"Rhynchosporium ist nach Netzflecken die zweithäufigste Blattfleckenkrankheit der Gerste. Die Sporen werden durch Regen verbreitet. In engen Gerstenfruchtfolgen nimmt der Befallsdruck stark zu."},{"c":"Biologie","q":"Warum ist die Bekämpfung von Klettenlabkraut (Galium aparine) in Wintergetreide so wichtig, und welche mechanischen Konsequenzen hat starker Befall?","o":["Kletterlabkraut rankt sich an Getreide hoch, zieht es nieder und verursacht Lager; erschwerter Drusch","Kletterlabkraut versteht sich unter Gräsern und muss mit ACCase-Hemmern bekämpft werden","Klettenlabkraut produziert Allelopathine, die Getreide in der Bestockung hemmen","Klettenlabkraut überträgt Blattkrankheiten auf Weizen durch direkte Berührung"],"a":0,"e":"Durch die Kletthaken hängt sich Klettenlabkraut an alle Getreidepflanzen und an Erntemaschinen. Tausend Körner-Masse sinkt, Lagerung und Drusch werden kritisch. Frühe Bekämpfung im BBCH 10–15 des Unkrauts ist am wirtschaftlichsten."},{"c":"Biologie","q":"Was ist die Quecke (Elymus repens) und warum ist sie mit Blatt-Herbiziden im Getreide kaum zu bekämpfen?","o":["Ausdauerndes Rhizomgras; Rhizome überdauern im Boden; Herbizide wirken nur bei wachsenden Trieben","Einjähriges Gras; hoher Samenvorrat; bekämpfbar durch Bodenbearbeitung und Bodenherbizide","Zweijähriges Gras; übersteht den Winter nur als Samen; empfindlich gegen alle Blattherbizide","Ausdauerndes Gras ohne Rhizome; Horste lassen sich mechanisch leicht ausheben"],"a":0,"e":"Quecke und Winterweizen sind beide Gräser – alle ACCase-Hemmer und viele ALS-Hemmer würden das Getreide genauso schädigen. Die Bekämpfung erfolgt daher im Stoppelfeld mit systemischen Totalherbiziden (Glyphosat) oder durch Fruchtfolgemaßnahmen."},{"c":"Biologie","q":"Was versteht man unter 'Target-Site-Resistenz' (Zielort-Resistenz) bei Unkräutern, und welches bekannte Beispiel gibt es?","o":["Mutation am Wirkort verhindert Bindung des Wirkstoffs; nicht durch Rotationsstrategie aufhebbar","Enzyme bauen Herbizid ab, bevor es den Wirkort erreicht; durch Wirkstoffrotation beherrschbar","Pflanze nimmt Herbizid gar nicht auf; veränderte Wachsschicht verhindert Einlagerung","Herbizid wird in der Vakuole eingeschlossen; durch Ansäuerung der Brühe überwindbar"],"a":0,"e":"Target-Site-Resistenz ist meist monogen (eine Mutation genügt) und kann durch Wirkstoffwechsel (andere HRAC-Gruppe) umgangen werden – im Gegensatz zur metabolischen Resistenz, die meist breitere Resistenz verleiht."},{"c":"Biologie","q":"Was ist Taubnessel (Lamium spp.) und in welcher Hinsicht unterscheidet sie sich im Bekämpfungsaufwand von echten Problemunkräutern wie AFU?","o":["Taubnessel ist eine dikotyläre Deckkultur-Pflanze; reagiert anders auf Herbizide als Gräser","Taubnessel enthält ätherische Öle, die einige Herbizide chemisch inaktivieren","Taubnessel keimt tiefer als Getreide; Bodenherbizide erreichen sie nicht zuverlässig","Taubnessel ist der einzige Unkrauttyp, bei dem Nachauflauf-Herbizide versagen"],"a":0,"e":"Taubnessel ist zwar häufig, aber agronomisch wenig problematisch: Kein massiver Ertragsverlust, keine bekannten Resistenzen, breites Herbizidspektrum wirksam. Im IPS-Kontext wird man selten spezifisch für Taubnessel behandeln."},{"c":"Wirkstoffe","q":"Was sind 'Kontaktfungizide' und was 'systemische Fungizide' – was ist der praktische Unterschied bei der Bekämpfung?","o":["Kontakt wirkt nur auf behandelte Fläche; systemisch verteilt sich im Phloem oder Xylem der Pflanze","Kontakt benötigt Öl als Formulierung; systemisch wird nur in Wasser gelöst aufgenommen","Kontakt wirkt nur gegen Pilze an der Wurzel; systemisch kann nur Blatterkrankungen erreichen","Kontaktfungizide töten Pilze durch Kontaktwärme; systemische durch Enzymhemmung"],"a":0,"e":"Kontaktmittel sind rein protektiv – sie müssen vor der Infektion gleichmäßig auf der Blattoberfläche sein. Systemische Mittel dringen nach der Applikation in das Blattgewebe ein und können sogar bereits eingedrungene Pilzmyzele noch abtöten (kurativ)."},{"c":"Wirkstoffe","q":"Was sind Azole (Triazol-Fungizide) und wie wirken sie auf Pilze?","o":["DMI-Fungizide hemmen CYP51-Enzym der Ergosterol-Biosynthese; Resistenz durch Überexpression möglich","DMI-Fungizide hemmen Mitochondrien-Komplex III; wichtigste Klasse gegen Blattpilze an Getreide","DMI-Fungizide hemmen Zellwand-Chitinsynthese; wirken systemisch nach Wurzelaufnahme","DMI-Fungizide blockieren Sporulation; nur protektiv einsetzbar, kein kuratives Potenzial"],"a":0,"e":"Azole (z. B. Propiconazol, Prothioconazol, Tebuconazol) sind FRAC-Gruppe 3 (DMI-Hemmer). Sie sind systemisch, kurativ und breit wirksam. Resistenz entsteht durch Akkumulation von Punktmutationen (CYP51-Gen) – daher immer mit anderen Gruppen kombinieren."},{"c":"Wirkstoffe","q":"Was sind SDHI-Fungizide (Carboxamide, FRAC Gruppe 7) und bei welchen Kulturen werden sie häufig eingesetzt?","o":["Hemmen Succinat-Dehydrogenase (Komplex II) in Mitochondrien; breites Spektrum, resistentes Management nötig","Hemmen Acetyl-CoA-Carboxylase; selektiv nur gegen Gräser; Resistenz durch Punktmutation","Hemmen CYP51 der Ergosterol-Biosynthese; klassische Azol-Gruppe mit langer Marktverfügbarkeit","Hemmen Zellteilung durch Mikrotubuli-Bindung; eingesetzt gegen Bodenoömyceten"],"a":0,"e":"SDHIs sind eine moderne, hoch wirksame Fungizidgruppe mit systemischer und kurativer Wirkung. Da auch hier Resistenzen entstehen (SDHI-Resistenz in Botrytis, Cercospora), ist der Wechsel mit anderen Gruppen (v. a. FRAC 3 + 11) unverzichtbar."},{"c":"Wirkstoffe","q":"Was versteht man unter 'Formulierung' eines Pflanzenschutzmittels und warum ist sie wichtig?","o":["Art der Zubereitung (EC, WG, SC usw.); beeinflusst Löslichkeit, Sicherheit, Abdrift und Anwendung","Zulassungsnummer im BVL-Register; bestimmt legalen Anwendungszeitraum und Einsatzgebiet","Wirkstoffgehalt in g/l oder g/kg; bestimmt ausschließlich die nötige Aufwandmenge pro Hektar","Herstellerangabe zur Stabilität; bestimmt Lagertemperatur und Mindesthaltbarkeitsdatum"],"a":0,"e":"Die Formulierung beeinflusst massiv die Handling-Sicherheit (EC = Lösemittel, WG = staubfrei, SC = Suspension). WG- und SC-Formulierungen sind sicherer im Umgang und reduzieren das Expositionsrisiko bei der Anmischung."},{"c":"Wirkstoffe","q":"Was sind 'Pyrethroide' (IRAC Gruppe 3A) und warum können sie für Bienen und Nützlinge problematisch sein?","o":["Synthetische Pyrethrine blockieren Na-Kanäle in Insektennervenzellen; bienengefährlich, kein Freilandeinsatz in Blüte","Carbamate hemmen Acetylcholinesterase; kaum Bienengefahr, aber Warmblüter-Toxizität vorhanden","Neonikotinoide aktivieren Acetylcholin-Rezeptoren; für Freilandsaatgutbeizung EU-weit verboten","Organophosphate hemmen Cholinesterase; breites Wirkspektrum, hohe Säugertoxizität bei Kontakt"],"a":0,"e":"Pyrethroide sind sehr wirksam gegen Schädlinge, aber auch gegen Bienen, Marienkäfer und andere Nützlinge. Sie sollten nie in der Blüte oder bei Bienenflug eingesetzt werden. Nach Antrocknen ist die Kontaktgefahr für Bienen deutlich geringer."},{"c":"Wirkstoffe","q":"Was ist 'Kupfer' als Pflanzenschutzmittel, und warum wird seine Anwendungsmenge in der EU begrenzt?","o":["Fungizid mit breitem Wirkspektrum (Mehltau, Roste, Peronospora); im Bio-Anbau zugelassen; Schwermetallproblem","Herbizid für Spezialkulturen; Kupfersulfat tötet Unkrautkeime im Keimungsstadium ab","Bodenverbesserer; Kupfer fördert Mykorrhiza-Pilze und verbessert Nährstoffaufnahme","Insektizid gegen saugende Insekten; Kupfer-Ionen schädigen Zellmembranen bei Blattläusen"],"a":0,"e":"Kupfer ist im Bio-Anbau unverzichtbar (z. B. gegen Phytophthora, Falschen Mehltau), reichert sich aber im Boden an und schädigt bei hohen Gehalten Regenwürmer und Bodenmikroorganismen. Die 3-kg-Obergrenze ist ein Kompromiss zwischen Wirksamkeit und Umweltschutz."},{"c":"Wirkstoffe","q":"Was sind 'Herbizidkombinationen' und welchen strategischen Vorteil haben sie gegenüber Einzelmitteln?","o":["Mischungen verschiedener HRAC-Gruppen; breiteres Wirkspektrum und reduziertes Resistenzrisiko durch Mehrfach-Angriff","Mischungen aus Herbizid und Fungizid; Überfahrten gespart, Phytotoxizitätsgefahr steigt","Mischungen aus zwei Bodenherbiziden gleicher HRAC-Gruppe; erhöhen Bodenwirkung und Persistenz","Mischungen aus Herbizid und Flüssigdünger; reduzieren Überfahrten, Herbizidwirkung sinkt"],"a":0,"e":"Durch die Kombination verschiedener Wirkmechanismen in einem Arbeitsgang wird jedes Individuum einer Unkrautpopulation von mehreren verschiedenen Wirkstoffen angegriffen – die Wahrscheinlichkeit, dass ein Individuum gegen alle gleichzeitig resistent ist, ist sehr gering."},{"c":"Wirkstoffe","q":"Was ist Chlormequat (CCC) und in welcher Wirkstoffgruppe der Wachstumsregulatoren ist es einzuordnen?","o":["Gibberellin-Synthese-Hemmer (Wachstumsregler); kürzt Halm und erhöht Standfestigkeit gegen Lager","Systemisches Fungizid (DMI); hemmt Ergosterol-Biosynthese und wirkt gegen Halmbruch","Selektives Herbizid (ACCase-Hemmer); bekämpft Windhalm und Ackerfuchsschwanz in Getreide","Blattherbizid (ALS-Hemmer); wirkt gegen breitblättrige Unkräuter in Winterweizen"],"a":0,"e":"Chlormequat (und andere Ethephon-/Trinexapac-Ethyl-Produkte) verkürzen den Halm durch Reduktion der Internodienlänge. Das reduziert das Lagerrisiko, erhöht die Erntesicherheit und verbessert die Düngungseffizienz in intensiven Weizenbeständen."},{"c":"Wirkstoffe","q":"Was versteht man unter 'Wirkungsgrad' und 'biologischer Effizienz' bei der Beurteilung von Pflanzenschutzmitteln?","o":["Wirkungsgrad = Bestandsreduktion in %; biologische Wirksamkeit = Vergleich mit unbehandelter Kontrolle","Wirkungsgrad = Aufwandmenge in g/ha; biologische Wirksamkeit = Verbleibszeit im Boden","Wirkungsgrad = Tropfengröße in µm; biologische Wirksamkeit = Anzahl der Keimsporen","Wirkungsgrad = Selektivitätsindex; biologische Wirksamkeit = Resistenzindex des Pathogens"],"a":0,"e":"Ein Wirkungsgrad von 90 % bedeutet: 10 % der Population überlebt. Bei sehr hohem Befallsdruck reicht das eventuell nicht aus. Biologische Effizienz bewertet, ob die Bekämpfung auch wirtschaftlich einen Mehrertrag erzeugt hat."},{"c":"Technik","q":"Was ist ein 'Direkteinspeisung-System' (Direct Injection) bei modernen Pflanzenschutzspritzen und welchen Vorteil bringt es?","o":["Wirkstoff wird erst im Spritzgestänge mit Wasser gemischt; sicherere Handhabung, keine Tankmischung nötig","Wirkstoff wird direkt in den Boden injiziert; Gestänge entfällt, nur Bodennadeln im Einsatz","Wirkstoff wird durch Druckluft in die Pflanze eingeblasen; keine Brühe, kein Wasserverbrauch","Wirkstoff wird über ein separates Leitungssystem ausgebracht und erst beim Drusch aktiviert"],"a":0,"e":"Direkteinspeisung revolutioniert die Anwendung: kein Anmischen, keine Restbrühe, keine Kreuzkontamination zwischen Mitteln. Der Computer dosiert sekundengenau – das reduziert PSM-Verbrauch und Reinigungsaufwand erheblich."},{"c":"Technik","q":"Warum ist bei abrasiven PSM-Formulierungen (z. B. WP = Spritzpulver) besonders auf die Filterpflege und Pumpenwahl zu achten?","o":["Abrasive Partikel verschleißen Düsen und Ventile schnell; Auslitern häufiger nötig, Keramikteile empfehlenswert","WP löst sich vollständig auf; keine Abrasion, aber Schaumbildung erfordert häufige Tankkontrolle","WP erhöht den pH-Wert der Brühe stark; Kalkstein-Ablagerungen in Leitungen entstehen","WP bildet Klumpen bei Kälte; Düsen verstopfen und müssen täglich mit Druckluft gereinigt werden"],"a":0,"e":"WP-Formulierungen enthalten unlösliche Partikel (Kaolin, Talk, Wirkstoff-Kristalle), die wie ein Schleifmittel wirken. Keramikdüsen und -pumpenteile sind deutlich widerstandsfähiger und verlängern die Standzeit wesentlich."},{"c":"Technik","q":"Was versteht man unter 'Partial-Width-Control' und wie unterscheidet es sich von Full Section Control?","o":["Einzelne Teilbreiten werden bei Überlappung automatisch ab- und bei Lücken wieder zugeschaltet","Einzelne Düsen wählen automatisch den optimalen Betriebsdruck basierend auf der Windmessung","Einzelne Teilbreiten regulieren ihre Ausbringmenge in Echtzeit anhand von Biomasse-Sensoren","Einzelne Düsen schalten bei Unterschreitung der Mindestgeschwindigkeit auf groben Tropfen um"],"a":0,"e":"Einzeldüsenabschaltung (z. B. über Pulse-Width-Modulation) ermöglicht exakteste Konturen an Feldgrenzen und minimiert Überlappungen auf wenige Zentimeter. Full Section Control arbeitet mit größeren Blöcken und ist günstiger, aber ungenauer."},{"c":"Technik","q":"Was ist der Unterschied zwischen einer 'Schleppschlauch-' und einer 'Schleppschuh-Gülle'applikation im Hinblick auf den Pflanzenschutz?","o":["Schleppschlauch legt Gülle zwischen Reihen; Schleppschuh drückt Gülle in Boden; beide senken NH3-Verluste","Schleppschlauch ist für PSM-Flüssigdünger; Schleppschuh nur für Gülle mit Feststoffanteil","Schleppschlauch erhöht Abdrift durch tiefe Schlauchlage; Schleppschuh verhindert Verluste durch Druck","Schleppschlauch und Schleppschuh sind identisch; Unterschied liegt nur in Hersteller und Preis"],"a":0,"e":"Dieser Bezug ist im IPS relevant: optimierte Nährstoffversorgung (weniger Stress) macht Pflanzen widerstandsfähiger gegen Krankheiten und reduziert indirekt den Fungizideinsatz. Der IPS betrachtet immer das Gesamtsystem."},{"c":"Recht","q":"Was regelt die 'Pflanzenschutz-Anwendungsverordnung' (PflSchAnwV) und welche Besonderheiten gelten für Naturschutzgebiete?","o":["Enthält Anwendungsverbote in sensiblen Gebieten (Naturschutz, Gewässerrand) über Zulassungsauflagen hinaus","Regelt ausschließlich Lagerung und Transport; Anwendungsregeln stehen nur im Etikett des Mittels","Gilt nur im ökologischen Landbau; konventionelle Betriebe folgen ausschließlich BVL-Auflagen","Legt fest, welche Geräteklassen für bestimmte Kulturen eingesetzt werden müssen"],"a":0,"e":"Die PflSchAnwV ist ein bundesweit geltendes Regelwerk mit Anwendungsverboten, die über die Produktzulassung hinausgehen. In Naturschutzgebieten können landesrechtliche Verschärfungen zusätzlich gelten."},{"c":"Recht","q":"Darf man ein zugelassenes PSM in einer Anwendung einsetzen, die nicht auf dem Etikett steht (z. B. auf einer nicht aufgeführten Kultur)?","o":["Nein; Off-Label-Einsatz ist grundsätzlich verboten – jede Anwendung braucht eine Zulassung für exakte Verwendung","Ja; jeder Landwirt darf zugelassene Mittel in beliebigen Kulturen einsetzen, wenn er Sachkunde hat","Ja; Mittel aus anderen EU-Ländern dürfen ohne deutsche Zulassung verwendet werden","Nein; nur biologische Mittel dürfen außerhalb der Zulassung eingesetzt werden"],"a":0,"e":"Die Off-Label-Anwendung ist in Deutschland grundsätzlich verboten. Das Etikett ist die rechtliche Grundlage. Verstöße können zu Bußgeldern, Rückstands-Überschreitungen und Verlust der Zulassung führen."},{"c":"Recht","q":"Was ist die 'Wartezeit' eines Pflanzenschutzmittels und warum darf sie nicht unterschritten werden?","o":["Mindestzeitraum zwischen letzter Anwendung und Ernte; schützt Verbraucher vor Rückstandsüberschreitung","Maximal erlaubter Zeitraum zwischen Spritzung und Niederschlag; nach Regen ist Wiederholung nötig","Zeitraum, in dem ein Mittel nach dem Widerruf noch aufgebraucht werden darf","Mindestabstand zur nächsten Behandlung um Resistenzentwicklung beim Pilz zu verhindern"],"a":0,"e":"Die Wartezeit (z. B. 14 Tage, 28 Tage, 60 Tage) ist durch Rückstandsversuche der Hersteller ermittelt. Nach Ablauf sind die Rückstände auf oder unter dem MRL-Wert. Jede Unterschreitung ist ein Rechtsverstoß mit Vermarktungskonsequenzen."},{"c":"Recht","q":"Was besagt die Pflicht zur 'Geräteprüfung' für den Betrieb und wer führt sie durch?","o":["Pflichtprüfung alle 3 Jahre mit Plakette; V-Wert, Manometergenauigkeit, Querverteilung werden geprüft","Freiwillige Betriebsprüfung durch JKI; nur für Betriebe mit über 200 ha Spritzfläche","Jährliche Sichtprüfung reicht; amtliche Prüfung nur nach Defekten oder Unfällen nötig","Prüfung nur bei Neukauf; bestehende Geräte haben unbegrenzte Betriebserlaubnis"],"a":0,"e":"Die Prüfpflicht (EU-Richtlinie 2009/128, deutsches Recht) soll sicherstellen, dass PSM korrekt und ohne unnötige Umweltbelastung ausgebracht werden. Nicht geprüfte Geräte können zum Entzug von Direktzahlungen führen."},{"c":"Biologie","q":"Welches Symptom entsteht bei Bormangel im Raps und warum ist Bor für Raps besonders wichtig?","o":["Markverbräunung im Stängel, Hohlstängel und Blütensterilität; Bor nötig für Pollenschlauch und Zellwand","Gelbe Blattränder mit braunen Nekrosen; Bor aktiviert Chloroplastenenzyme und verhindert Seneszenz","Rötliche Verfärbung der Blattrippen; Bor steuert die Nektarproduktion der Blütenkelche","Weiße Blüten ohne Duft; Bor bildet Blütenfarbstoffe und lockt Bestäuber an"],"a":0,"e":"Bormangel tritt bevorzugt auf leichten, auswaschungsanfälligen Böden auf. In Raps ist er besonders kritisch, weil der Pollenschlauch ohne Bor nicht korrekt durch den Griffel wachsen kann – die Befruchtung scheitert, Schoten bleiben leer."},{"c":"Biologie","q":"Woran erkennt man Kupfermangel im Getreide und welche Bodenverhältnisse fördern ihn?","o":["Weiße, eingerollte Blattspitzen (Peitschensymptom) und taube Ährenspitzen; typisch auf Moorböden und hohem pH","Rote Blattränder und Streifenmuster; typisch auf verdichteten Tonböden mit niedrigem pH-Wert","Gelbe V-förmige Verfärbung von der Blattspitze; typisch auf Kalkböden mit Staunässe","Braune, nekrotische Blattränder ohne Wuchsstörung; typisch auf leichten Sandböden mit Phosphorüberschuss"],"a":0,"e":"Kupfer ist für die Ligninbildung (Halm- und Zellwandstabilität) sowie das Enzym-System der Pollenkornentwicklung wichtig. Entwässerte Moorböden und anmoorige Böden mit hohem pH und Humusgehalt sind klassische Kupfermangel-Standorte."},{"c":"Biologie","q":"Was ist Phosphormangel bei jungen Maispflanzen und wann tritt er typischerweise auf?","o":["Rötlich-violette Verfärbung junger Blätter durch Anthozyanbildung; typisch bei Kälte auf leichten Böden","Gelbe Längsstreifen auf dem Fahnenblatt; Phosphor ist mobil und wird aus alten Blättern abgezogen","Weiße, nekrotische Blattspitzen beginnend an jüngsten Blättern; durch gestörten Wassertransport","Braune, runde Flecken mit gelbem Hof; Phosphor hemmt Pilzwachstum und schützt Zellmembranen"],"a":0,"e":"Phosphormangel-Symptome im Mais verschwinden oft von selbst, sobald sich der Boden erwärmt und die Phosphoraufnahme wieder funktioniert. Bei anhaltend kalten Böden oder auf sehr P-armen Böden ist eine Startdüngung sinnvoll."},{"c":"Biologie","q":"Woran erkennt man Zinkmangel im Mais und auf welchen Böden tritt er am häufigsten auf?","o":["Weiße bis gelbliche Streifen entlang der Blattmittelrippe; typisch auf alkalischen Böden und nach Kalkung","Rote Blattverfärbung mit Einrollung; typisch auf sauren Böden unter pH 5,5 mit Aluminiumtoxizität","Braune, nekrotische Blattspitzen; typisch auf tonreichen Böden mit hohem Kaliumgehalt","Orangefarbene Flecken auf der Blattunterseite; Zink fördert Sporulation von Blattrostpilzen"],"a":0,"e":"Zink wird bei hohem pH-Wert im Boden festgelegt (Sorption an Calcit). Auf frisch gekalkten Flächen kann temporärer Zinkmangel auftreten. Blattdüngung mit Zinksulfat kann rasch helfen."},{"c":"Biologie","q":"Was ist Manganmangel ('Dörrfleckenkrankheit') bei Getreide und in welchen Böden tritt er besonders auf?","o":["Graugrüne, trockene Dörrflecken auf Blättern; typisch auf alkalischen, gut belüfteten Böden (Mn-Oxidation)","Rote Blattverfärbung in Blattachseln; typisch auf sauren Sandböden mit hoher Auswaschungsrate","Gelbe Längsstreifen auf jungen Blättern; Mangan fördert Lignin-Synthese und Zellteilung","Weiße, watteartige Flecken auf Blattoberseite; Mangan hemmt Pilzwachstum bei hohen Gehalten"],"a":0,"e":"Mangan ist für das Photosystem II unverzichtbar. Auf kalkhaltigen, anmoorigen und stark durchlüfteten Böden wird Mn²⁺ zu Mn⁴⁺ oxidiert und ist nicht mehr pflanzenverfügbar. Blattdüngung mit MnSO₄ wirkt schnell."},{"c":"Biologie","q":"Was ist die Bedeutung der 'BBCH-Skala' und welches Stadium markiert BBCH 65 beim Weizen?","o":["Phänologische Entwicklungsskala (00–99) für alle Kulturen; BBCH 65 = Vollblüte = Fusarium-Behandlungstermin","Bewertungssystem für Düngeplanung; BBCH 65 = Zeitpunkt für maximale N-Aufnahme im Getreide","Klassifikation für Herbizidwirkstoffe; BBCH 65 = letzter Termin vor der Ernte für Blattherbizide","Bonitursystem für Pilzkrankheiten; BBCH 65 = Maximum der Befallshäufigkeit bei Ährenbefall"],"a":0,"e":"Die BBCH-Skala ist international standardisiert (00–99). BBCH 65 ist das optimale Behandlungsstadium für Fusarium-Prophylaxe: Die Blüten sind offen (Infektionsfenster), aber noch nicht geschlossen. 24–48 Stunden nach Beginn des Ährenschiebens oft der beste Zeitpunkt."},{"c":"Umwelt","q":"Was ist der Unterschied zwischen 'punktuellem Eintrag' und 'diffusem Eintrag' von PSM in Gewässer?","o":["Punktuell = konzentrierter Einzeleintrag (Hofabfluss); diffus = flächiger Eintrag über viele Quellen (Auswaschung)","Punktuell = Eintrag über Luftpfad; diffus = Eintrag über direkten Bodenkontakt nach Regen","Punktuell = Eintrag aus Industrie; diffus = Eintrag aus Landwirtschaft; beide unterliegen gleichem Recht","Punktuell = temporärer Eintrag; diffus = dauerhafter Eintrag; Unterschied nur zeitlicher Natur"],"a":0,"e":"Punktuelle Einträge können durch Betriebshygiene fast vollständig verhindert werden (Bio-Bed, Abfüllanlagen, Reinigungsprotokoll). Diffuse Einträge über Abdrift und Erosion erfordern systemische Maßnahmen (Pufferstreifen, Technik, Fruchtfolge)."},{"c":"Umwelt","q":"Warum ist die Lagerung von Pflanzenschutzmitteln in einem separaten, gesicherten Raum gesetzlich vorgeschrieben?","o":["Eigener, verschlossener, temperierter Raum; Sicherheitsdatenblatt und Feuerlöscher Pflicht; kein Kinderzugang","Keller mit Bodenablauf ist ausreichend; Etiketten müssen sichtbar sein, Rest ist empfohlen","Gemeinsame Lagerung mit Pflanzenschutz-Geräten ist erlaubt; nur flüssige Mittel brauchen Auffangwanne","Lagerung in der Feldscheune neben Düngemitteln zulässig; getrennte Räume nur für GHS06-Mittel"],"a":0,"e":"PSM-Lager müssen: verschlossen und gesichert sein, Auffangwanne mit ausreichendem Volumen haben, gut belüftet sein, Sicherheitsdatenblätter und Erste-Hilfe-Informationen bereithalten sowie von Lebensmitteln und Futtermitteln getrennt sein."},{"c":"Umwelt","q":"Was bedeutet 'Bienenschutzauflage B2' und wie unterscheidet sie sich von B1 und B4?","o":["Nur bei guten Bedingungen (kein Bienenflug); Anwendung nicht während der Bienentracht zulässig","Absolut bienengefährlich wie B1; keine Anwendung, auch nicht nachts oder bei Regenwetter","Bienensicher; Mittel darf jederzeit ohne Einschränkungen auf blühende Bestände ausgebracht werden","Nur für Honigbienen eingeschränkt; Wildbienenarten können trotz B2-Einstufung beeinträchtigt werden"],"a":0,"e":"B2-Mittel dürfen bei Bienenflug nicht eingesetzt werden, aber am Abend nach Ende des Flugs ist eine Anwendung möglich, sofern kein blühender Unterwuchs vorhanden ist. B3 (bienengefährlich, spezielle Einschränkungen) ist eine weitere Klasse."},{"c":"Umwelt","q":"Was versteht man unter 'Drift als Dampf' (Dampfabdrift) und unter welchen Bedingungen ist sie besonders relevant?","o":["Wirkstoff verdunstet von der Blattoberfläche und kondensiert andernorts; gefördert durch Wärme und Wind","Wirkstoff driftet als Tröpfchen ab; gefördert durch hohen Druck und Feintropfen bei Windstille","Wirkstoff wird durch Verdunstung in Bodenporen gezogen; gefördert durch Frost und Staunässe","Wirkstoff bildet Dampfkristalle, die durch Regen in Gewässer gespült werden"],"a":0,"e":"Selbst wenn die Spritztropfen das Ziel treffen, können die flüchtigen Wirkstoff-Anteile noch Stunden nach der Applikation in die Luft abgegeben werden – besonders bei leichtflüchtigen Substanzen (z. B. bestimmte Herbizide wie Clomazone). Vorsicht bei Nachbarkulturen und Gewässern."},{"c":"Biologie","q":"Was ist die 'Getreidezikade' und welche Schäden verursacht sie?","o":["Überträgt Gerstengelb-Verzwergungsvirus (BYDV); Massenvermehrung bei warmem Herbst, Schaden an früh gesätem Getreide","Befällt Blattadern durch Saugen und erzeugt Gallen; bekämpfbar mit ACCase-Hemmern im Herbst","Saugt an Ährenspindeln und überträgt Fusarium-Sporen; gefährdet nur Sommergerste nach der Blüte","Produziert Honigtau und fördert Rußtaupilze; kein Virusvektor, aber Schaden durch Assimilationsverlust"],"a":0,"e":"WDV (Wheat Dwarf Virus) kann zu Ertragsausfällen von über 50 % führen. Spätsaaten und warme Herbste erhöhen das Infektionsrisiko. Die Bekämpfung zielt auf die Zikaden als Vektoren – Saatzeitpunkt ist die wichtigste Vorbeugemaßnahme."},{"c":"Biologie","q":"Was ist der 'Getreidelaufkäfer' und welche Rolle spielt er im Integrierten Pflanzenschutz?","o":["Laufkäfer (Carabidae) fressen Schneckeneier, Drahtwürmer und Unkrautsamen; Nützling, durch Blühstreifen fördern","Laufkäfer befallen Getreidewurzeln; Schaden ähnlich Drahtwurm, besonders nach feuchtem Herbst","Laufkäfer übertragen Getreidekrankheiten durch Bodenkontakt; bekämpft durch Bodeninsektizide","Laufkäfer saugen an Ähren; Schaden durch Mykotoxin-Einschleppung bei hohem Befallsdruck"],"a":0,"e":"Laufkäfer sind einer der wichtigsten Regulatoren von Bodenschädlingen und Unkrautsamen. Intensive Bodenbearbeitung und Insektizide dezimieren ihre Populationen – ein weiterer Grund für den schonenden Bodenangang im IPS."},{"c":"Biologie","q":"Was ist die 'Weißstängeligkeit' in Raps und welcher Pilz verursacht sie?","o":["Sclerotinia sclerotiorum; weißes Myzel und schwarze Sklerotien im Stängel; Infektion über Ascosporen in Blüte","Verticillium longisporum; Gelbfleckenmosaik und Gefäßverfärbung; durch Boden übertragen","Phoma lingam; graue Blattflecken im Herbst; Stängelgrund-Fäulnis typisch im Frühjahr","Alternaria brassicae; dunkle Ringflecken auf Siliquen; fördernde Bedingungen sind trockene Hitze"],"a":0,"e":"Sclerotinia sclerotiorum infiziert über fallende Blütenblätter, die auf Blättern und Stengelgabeln liegen bleiben und als Nährstoffquelle dienen. Sklerotien überdauern jahrelang im Boden – enge Fruchtfolge und blütengezielte Fungizide sind die Hauptmaßnahmen."},{"c":"Biologie","q":"Was ist 'Schwarzbeinigkeit' (Pythium spp., Rhizoctonia solani) bei Kartoffeln und Zuckerrüben?","o":["Wasserschimmelpilze befallen Keim bei Staunässe; brauner Stängelgrund; häufig auf schweren Böden","Fusarium befällt Stängelbasis bei Trockenheit; rötliche Verfärbung; saatgutübertragen","Cercospora befällt Keimlinge über infizierte Erde; weiße Flecken an der Stängelbasis","Halmbruch-Erreger befällt bereits keimende Körner; weißes Myzel mit dunklem Rand an Wurzel"],"a":0,"e":"'Damping-off' (Umfallkrankheit) ist die gefährlichste Keimlingskrankheit. Rhizoctonia solani (AG 2-2 bei Rüben, AG 3 bei Kartoffeln) ist häufiger Erreger. Gute Drainagen und lockere Böden reduzieren das Risiko; Beize mit Thiram/Iprodion hilft vorbeugend."},{"c":"Biologie","q":"Was ist die 'Viröse Vergilbung' der Zuckerrübe (Beet Yellows Virus, BYV / Beet Mild Yellowing Virus, BMYV) und welcher Schädling überträgt sie?","o":["Vergilbungsviren (BYV/BMYV); Überträger Myzus persicae; Symptome: Gelbung, Wachstumshemmung, Ertragsverluste","Bakteriosen durch Rübenderbrüssler-Fraßwunden; Symptome: Welke, Gefäßring-Verbräunung","Fusarium-Pilze über Bodeninokulat; Symptome: Weißfärbung, Stängelkollaps, Knollenverbräunung","Heterodera schachtii (Nematode) direkt im Blattgewebe; Symptome: Gelbmosaik, Zuckerentzug"],"a":0,"e":"Die Grüne Pfirsichblattlaus ist der wichtigste Virusvektor bei Zuckerrüben. Durch den Wegfall von Neonikotinoid-Beizmitteln ist die Bekämpfung schwieriger geworden – Monitoring und Insektizideinsatz bei Schadschwellenüberschreitung sind jetzt entscheidend."},{"c":"Technik","q":"Was bedeutet 'Einzeldüsenschaltung' mit PWM (Pulse-Width Modulation) und welchen Vorteil bietet sie gegenüber klassischer Druckregelung?","o":["Jede Düse wird elektronisch getaktet (Puls/Pause); Ausbringmenge konstant bei jeder Fahrgeschwindigkeit","Pumpe schaltet taktweise ab; spart Kraftstoff und kühlt Brühe bei Hitze über 25 °C","Druckverstärker öffnet pulsierend; erzeugt Großtropfen durch Unterdruck im Düsenkörper","Rührwerk taktet in Intervallen; verhindert Sedimentation ohne Dauerbetrieb im Spritzgestänge"],"a":0,"e":"Bei klassischer Druckregelung verändert sich mit dem Druck auch die Tropfengröße. PWM hält den Druck (und damit die Tropfengröße) konstant und variiert stattdessen die Ein-/Ausschaltfrequenz – optimale Tropfenqualität bei jeder Fahrgeschwindigkeit."},{"c":"Recht","q":"Was sind 'Grenzwerte für Pflanzenschutzmittel im Grundwasser' und welcher Wert gilt EU-weit?","o":["0,1 µg/l für alle Einzelwirkstoffe; bei Überschreitung kein Trinkwassernutzung ohne Aufbereitung möglich","0,5 µg/l für Wirkstoffe ohne Grundwasserrelevanz; erhöhter Grenzwert nach GW-Risikoklasse","1,0 µg/l für abbaubare Wirkstoffe; Überschreitung führt zu Einsatz von Aktivkohlefiltern","5,0 µg/l für zugelassene Mittel mit Bodenadsorption; Grenzwert gilt nur für Zonen III von Trinkwasserschutz"],"a":0,"e":"Der 0,1-µg/l-Grenzwert gilt unabhängig von der Toxizität des Wirkstoffs – er ist ein Vorsorgewert. PSM-Wirkstoffe und ihre Metaboliten dürfen zusammen 0,5 µg/l nicht überschreiten. Überschreitungen führen zum Entzug der Zulassung."},{"c":"Biologie","q":"Was ist 'Stickstoffmangel' beim Getreide und wie erkennt man ihn im Bestand?","o":["Gelbverfärbung beginnend an ältesten Blättern; Stickstoff ist mobil, wird aus alten in neue Blätter verlagert","Rötlich-violette Blattränder; Stickstoff wird in Speicherproteinen festgehalten, erst bei Starkmangel sichtbar","Weiße Längsstreifen auf Fahnenblatt; Stickstoff hemmt Chlorophyllsynthese bei zu hohem Gehalt","Braune, nekrotische Blattspitzen an allen Etagen; Stickstoff wird über die Wurzel bevorzugt ausgewaschen"],"a":0,"e":"Da Stickstoff mobil ist, zeigt sich Mangel zuerst an den ältesten Blättern (Phloemmobilität). Nährstoffmangelsymptome beginnen 'von unten nach oben'. Zur Einschätzung hilft ein SPAD-Chlorophyllmeter."},{"c":"Wirkstoffe","q":"Was sind 'Ethephon'-Produkte und wie wirken sie im Getreide?","o":["Setzt Ethylen im Gewebe frei; Ethylen kürzt Internodien und senkt Schwerpunkt gegen Lager","Hemmt Gibberellin-Biosynthese direkt; wirkt bodenbürtig und kürzt ausschließlich das unterste Internodium","Aktiviert Cytokinin-Synthese; fördert Seitentriebe und erhöht Bestockungsrate im Frühjahr","Blockiert Abscisinsäure-Rezeptoren; verhindert Absterben des Fahnenblatts bei Trockenstress"],"a":0,"e":"Ethephon-Produkte (z. B. Cerone, Camposan) wirken über Etyhlen-Freisetzung. Sie kürzen den oberen Halmabschnitt, senken den Schwerpunkt und reduzieren das Lagerrisiko. Wichtig: nur bei wachsenden Pflanzen einsetzen – bei Hitze kann es zu Phytotoxizität kommen."},{"c":"Umwelt","q":"Warum ist der Zeitraum der Hauptblüte im Rapsbestand für den Bienenschutz besonders kritisch?","o":["Bienen sammeln aktiv Pollen und Nektar; Insektizide und Fungizide können Völker schädigen; B1-Mittel verboten","Bienen fliegen nicht in blühende Rapsbestände; Schäden entstehen ausschließlich am Feldrand","Raps produziert in der Blüte keinen Nektar; Bienenschäden durch Pollen-Überdosierung möglich","Fungizide sind in der Rapsblüte grundsätzlich erlaubt; nur B1-Insektizide sind eingeschränkt"],"a":0,"e":"Zur Rapsblüte sind Bienenvölker oft direkt am Feld aufgestellt. B1-Insektizide sind strikt verboten. Fungizide (Sclerotinia-Behandlung) sollten nur abends nach dem Bienenflug und vorzugsweise ohne Bienengefährlichkeits-Einstufung eingesetzt werden."},{"c":"Biologie","q":"Was ist der 'Anbauabstand' und die 'Fruchtfolge-Pause' bei der Bekämpfung der Kohlhernie im Raps?","o":["Mindestens 3–4 Jahre Raps-Pause; alle Kreuzblütler als Zwischenfrucht vermeiden; Dauersporen überleben Jahrzehnte","Eine 1-jährige Pause reicht vollständig aus; Fungizide können Kohlhernie-Zysten im Boden abtöten","Kohlhernie wird durch zugelassene Fungizide komplett eliminiert; Fruchtfolge spielt keine Rolle","Fruchtfolge hat keinen Einfluss; nur resistente Sorten schützen zuverlässig vor Zysten-Neuinfektion"],"a":0,"e":"Plasmodiophora-Dauersporen überdauern 10–20 Jahre im Boden! Resistente Sorten sind die wirksamste Strategie; bei stark befallenen Schlägen empfehlen sich 4–5 Jahre Raps-freie Fruchtfolge und der Verzicht auf alle Kreuzblütler als Zwischenfrucht."},{"c":"Technik","q":"Was ist ein 'Kammerfilter' (Druckfilter mit mehreren Kammern) an einer Pflanzenschutzspritze und wozu dient die mehrstufige Filtration?","o":["Mehrstufige Filterkaskade schützt Ventile, Regelorgane und Düsen vor Verstopfung und Verschleiß","Einkammer-Filter mit besonders feinem Gewebe; reinigt die Brühe vollständig in einem Durchgang","Druckloser Vorratsbehälter puffert Schwankungen im Spritzvolumen bei Teilbreitenbetrieb aus","Filtersystem nur für Fungizide mit Suspensionsformulierung; nicht geeignet für EC-Formulierungen"],"a":0,"e":"Die Filterkaskade (Einfüllsieb → Saugfilter → Druckfilter → Düsenfilter) ist ein Sicherheitssystem. Jeder Filter hat seine Aufgabe; werden sie regelmäßig gereinigt und auf Schäden geprüft, bleibt die gesamte Anlage funktionssicher."},{"c":"Recht","q":"Was bedeutet 'Cross-Compliance' im Zusammenhang mit dem Pflanzenschutzmitteleinsatz und welche Konsequenzen drohen bei Verstößen?","o":["EU-Direktzahlungen sind an Grundanforderungen geknüpft; PSM-Verstöße führen zu Direktzahlungs-Kürzungen","Cross-Compliance betrifft ausschließlich den Tierschutz; PSM-Anwendung ist nicht Teil dieser Regelung","PSM-Verstöße haben keinen Einfluss auf Direktzahlungen; nur Nitratzusatzauflagen sind relevant","Cross-Compliance gilt ausschließlich für Bio-Betriebe; konventionelle Betriebe sind ausgenommen"],"a":0,"e":"Im Rahmen der GAP-Konditionalität (früher Cross-Compliance) werden Direktzahlungen an Mindeststandards geknüpft. Dazu gehören: Sachkundenachweis, Spritzen-Prüfung, Anwendungsdokumentation und Einhaltung von Gewässerabständen. Verstöße werden bei Vor-Ort-Kontrollen festgestellt."},{"c":"Biologie","q":"Was ist die 'Biologische Bekämpfung' mit Trichogramma und bei welchem Schädling wird sie eingesetzt?","o":["Schlupfwespen parasitieren Zünsler-Eier; werden als Eikarten ausgebracht; im Ökolandbau zugelassen","Raubmilben fressen Zünsler-Larven im Boden; werden als Granulat vor der Saat ausgebracht","Bacillus-Präparate lösen Zünsler-Eier chemisch auf; werden als Spritzbrühe auf Blätter gebracht","Steinernema-Nematoden befallen Zünsler-Larven im Stängel; werden per Drohne ausgebracht"],"a":0,"e":"Die Trichogramma-Methode ist ein Parade-Beispiel für biologische Bekämpfung: Die Schlupfwespen legen ihre Eier in die Eier des Maiszünslers, die Larven der Schlupfwespe frisst die Zünsler-Larve auf. Kein PSM nötig, bienensicher, im Ökolandbau standard."},{"c":"Wirkstoffe","q":"Was sind 'Beizmittel' (Saatgutbehandlung) und welche Vorteile haben sie gegenüber Bodenbehandlung?","o":["Direkt auf Saatgut aufgetragen; geringe Wirkstoffmenge, gezielter Schutz für Keimling, keine Flächenbelastung","Teurer und weniger präzise als Bodenbehandlung; Wirkstoff kann nicht zur Pflanze gelangen","Erhöhen Keimrate durch Nährstoffzusatz; wirken nicht gegen Pathogene, nur als Starter-Dünger","Schützen nur gegen Pilze; Insekten und Bakterien werden nicht vom Beizmittel erfasst"],"a":0,"e":"Saatgutbeizung ist ökonomisch und ökologisch effizient: minimale Wirkstoffmengen (g/100 kg Saatgut statt g/ha) schützen das Saatgut und den Keimling gezielt vor bodenbürtigen Pathogenen (Pythium, Fusarium, Tilletia) und frühen Schädlingen."},{"c":"GHS-Bild","img":"<svg viewBox=\"0 0 120 120\" xmlns=\"http://www.w3.org/2000/svg\">\n    <polygon points=\"60,6 114,114 6,114\" fill=\"#e63946\" stroke=\"#c1121f\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n    <polygon points=\"60,18 104,108 16,108\" fill=\"white\"/>\n    <text x=\"60\" y=\"72\" text-anchor=\"middle\" font-size=\"46\" font-family=\"serif\">☠</text>\n    <text x=\"60\" y=\"100\" text-anchor=\"middle\" font-size=\"11\" font-family=\"sans-serif\" fill=\"#c1121f\" font-weight=\"bold\">GHS06</text>\n  </svg>","q":"Was bedeutet dieses GHS-Piktogramm und welche Schutzmaßnahmen sind beim Umgang zwingend?","o":["Giftig/Sehr giftig (akute Toxizität Kat. 1–3); vollständige PSA mit Atemschutz; Sicherheitsdatenblatt kennen","Umweltgefährlich (aquatisch); Gewässerabstand einhalten; Handschuhe als Mindest-PSA ausreichend","Ätzend für Haut und Augen; säurefeste Handschuhe und Vollschutzbrille als einzige Schutzmaßnahme","Entzündbar und explosionsgefährlich; Zündquellen fernhalten; PSA nicht erforderlich bei kurzer Exposition"],"a":0,"e":"GHS06 (Totenkopf) kennzeichnet akut giftige Stoffe. Bereits kleine Mengen können tödlich oder schwer schädlich sein. Volle PSA inklusive Atemschutz ist Pflicht."},{"c":"GHS-Bild","img":"<svg viewBox=\"0 0 120 120\" xmlns=\"http://www.w3.org/2000/svg\">\n    <polygon points=\"60,6 114,114 6,114\" fill=\"#e63946\" stroke=\"#c1121f\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n    <polygon points=\"60,18 104,108 16,108\" fill=\"white\"/>\n    <g transform=\"translate(30,30)\">\n      <rect x=\"2\" y=\"28\" width=\"16\" height=\"22\" fill=\"#2d6a4f\" rx=\"2\"/>\n      <circle cx=\"10\" cy=\"20\" r=\"8\" fill=\"#2d6a4f\"/>\n      <line x1=\"18\" y1=\"42\" x2=\"30\" y2=\"50\" stroke=\"#2d6a4f\" stroke-width=\"3\"/>\n      <ellipse cx=\"38\" cy=\"52\" rx=\"12\" ry=\"6\" fill=\"none\" stroke=\"#c1121f\" stroke-width=\"2.5\"/>\n      <line x1=\"27\" y1=\"48\" x2=\"50\" y2=\"58\" stroke=\"#c1121f\" stroke-width=\"2.5\"/>\n      <path d=\"M38,46 Q50,30 58,38\" fill=\"none\" stroke=\"#2d6a4f\" stroke-width=\"2\"/>\n      <ellipse cx=\"52\" cy=\"28\" rx=\"8\" ry=\"5\" fill=\"#2d6a4f\" opacity=\"0.5\"/>\n    </g>\n    <text x=\"60\" y=\"104\" text-anchor=\"middle\" font-size=\"11\" font-family=\"sans-serif\" fill=\"#c1121f\" font-weight=\"bold\">GHS09</text>\n  </svg>","q":"Welche Gefahrenklasse symbolisiert dieses Piktogramm und was muss bei der Anwendung besonders beachtet werden?","o":["Umweltgefährlich (aquatisch); NW-Auflagen einhalten; Biobed und Auffangwanne beim Spülwasser nutzen","Giftig für den Menschen; vollständige Schutzausrüstung mit Atemschutz und Ganzkörperschutz tragen","Ätzend für Haut und Schleimhäute; säurefeste Handschuhe und Gesichtsschutz als Mindest-Schutz","Explosionsgefährlich bei Wärme; Lagerung ausschließlich in gekühlten und gut belüfteten Räumen"],"a":0,"e":"GHS09 (Baum mit totem Fisch) warnt vor Gefährdung der Wasserumwelt. Gewässerabstände (NW-Auflagen), sachgemäße Restbrühen-Entsorgung und Bio-Bed-Nutzung sind Pflicht."},{"c":"GHS-Bild","img":"<svg viewBox=\"0 0 120 120\" xmlns=\"http://www.w3.org/2000/svg\">\n    <polygon points=\"60,6 114,114 6,114\" fill=\"#e63946\" stroke=\"#c1121f\" stroke-width=\"3\" stroke-linejoin=\"round\"/>\n    <polygon points=\"60,18 104,108 16,108\" fill=\"white\"/>\n    <text x=\"60\" y=\"68\" text-anchor=\"middle\" font-size=\"13\" font-family=\"sans-serif\" font-weight=\"bold\" fill=\"#1a1a1a\">⚠</text>\n    <text x=\"60\" y=\"56\" text-anchor=\"middle\" font-size=\"30\">⚠️</text>\n    <path d=\"M38,75 Q42,62 50,68 Q56,58 60,65 Q65,55 72,62 Q80,56 84,70\" fill=\"none\" stroke=\"#e63946\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n    <text x=\"60\" y=\"94\" text-anchor=\"middle\" font-size=\"9\" font-family=\"sans-serif\" fill=\"#555\">Haut/Auge Reizung</text>\n    <text x=\"60\" y=\"105\" text-anchor=\"middle\" font-size=\"11\" font-family=\"sans-serif\" fill=\"#c1121f\" font-weight=\"bold\">GHS07</text>\n  </svg>","q":"Was bedeutet GHS07 (Ausrufezeichen) und für welche Gefahren steht es?","o":["Gesundheitsschädlich/reizend (Haut, Auge, Atemwege); Handschuhe und Schutzbrille als Mindest-PSA","Sehr giftig (akut oral/dermal); vollständige Schutzausrüstung mit Vollatemschutz und Chemikalienschutz","Krebserzeugend/erbgutverändernd; Schwangere ausgeschlossen; besonders strenge Langzeitschutzmaßnahmen","Explosionsgefährlich bei Funken; metallfreie Werkzeuge und antistatische Schutzkleidung erforderlich"],"a":0,"e":"GHS07 (Ausrufezeichen) signalisiert mittlere Gesundheitsgefahren: Hautreizung, Augenreizung, Atemwegsreizung oder Sensibilisierung. Handschuhe und Schutzbrille sind Mindestanforderung."},{"c":"GHS-Bild","img":"<svg viewBox=\"0 0 120 120\" xmlns=\"http://www.w3.org/2000/svg\">\n    <polygon points=\"60,6 114,114 6,114\" fill=\"#e63946\" stroke=\"#c1121f\" stroke-width=\"3\" stroke-line nter Verstopfung führt zu pendelndem Gesamtdruck"],"a":0,"e":"Ein zuckender Manometerzeiger ist das klassische Symptom eines entleerten oder defekten Windkessels. Ohne das Luftpolster pulsiert jeder Pumpenhub direkt auf das Manometer und die Düsen – ungleichmäßiger Spritzstrahl ist die Folge."},{"c":"Krankheit-Bild","img":"<svg viewBox=\"0 0 200 130\" xmlns=\"http://www.w3.org/2000/svg\">\n    <rect width=\"200\" height=\"130\" fill=\"#e8f5ec\" rx=\"8\"/>\n    <!-- Blatt Umriss -->\n    <path d=\"M30,100 Q30,20 100,15 Q170,20 170,100 Q135,115 100,118 Q65,115 30,100Z\" fill=\"#4a9e5c\" stroke=\"#2d6a4f\" stroke-width=\"1.5\"/>\n    <!-- Mittelrippe -->\n    <line x1=\"100\" y1=\"15\" x2=\"100\" y2=\"118\" stroke=\"#2d6a4f\" stroke-width=\"2\"/>\n    <!-- Gelbrost-Streifen: gelbe Sporenlager entlang der Adern -->\n    <line x1=\"78\" y1=\"20\" x2=\"68\" y2=\"110\" stroke=\"#ffd166\" stroke-width=\"5\" stroke-linecap=\"round\" opacity=\"0.9\"/>\n    <line x1=\"85\" y1=\"18\" x2=\"76\" y2=\"112\" stroke=\"#ffd166\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.8\"/>\n    <line x1=\"115\" y1=\"18\" x2=\"124\" y2=\"112\" stroke=\"#ffd166\" stroke-width=\"5\" stroke-linecap=\"round\" opacity=\"0.9\"/>\n    <line x1=\"122\" y1=\"20\" x2=\"132\" y2=\"110\" stroke=\"#ffd166\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.8\"/>\n    <!-- Kleine Sporenpusteln als Punkte -->\n    <circle cx=\"78\" cy=\"35\" r=\"3\" fill=\"#f4a261\"/>\n    <circle cx=\"82\" cy=\"50\" r=\"3\" fill=\"#f4a261\"/>\n    <circle cx=\"76\" cy=\"65\" r=\"3\" fill=\"#f4a261\"/>\n    <circle cx=\"118\" cy=\"38\" r=\"3\" fill=\"#f4a261\"/>\n    <circle cx=\"122\" cy=\"55\" r=\"3\" fill=\"#f4a261\"/>\n    <circle cx=\"126\" cy=\"72\" r=\"3\" fill=\"#f4a261\"/>\n    <text x=\"100\" y=\"128\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#2d6a4f\" font-style=\"italic\">Weizen – Blatt</text>\n  </svg>","q":"Welche Pilzkrankheit zeigt dieses Blattbild mit gelben, streifenförmig angeordneten Sporenlagern entlang der Blattadern?","o":["Gelbrost (Puccinia striiformis) – Sporenlager in charakteristischen Längsstreifen","Braunrost (Puccinia triticina) – runde, zufällig verteilte Pusteln","Septoria tritici – nekrotische Flecken mit schwarzen Pyknidien","Echter Mehltau – weißer, mehliger Belag"],"a":0,"e":"Gelbrost ist am streifenartigen Muster entlang der Blattadern eindeutig erkennbar. Im Gegensatz dazu bildet Braunrost zufällig verteilte, runde orangebraune Pusteln. Gelbrost braucht kühle Temperaturen (8–15 °C) für optimale Sporenkeimung."},{"c":"Krankheit-Bild","img":"<svg viewBox=\"0 0 200 130\" xmlns=\"http://www.w3.org/2000/svg\">\n    <rect width=\"200\" height=\"130\" fill=\"#e8f5ec\" rx=\"8\"/>\n    <!-- Blatt -->\n    <path d=\"M30,100 Q30,20 100,15 Q170,20 170,100 Q135,115 100,118 Q65,115 30,100Z\" fill=\"#5ab368\" stroke=\"#2d6a4f\" stroke-width=\"1.5\"/>\n    <line x1=\"100\" y1=\"15\" x2=\"100\" y2=\"118\" stroke=\"#2d6a4f\" stroke-width=\"2\"/>\n    <!-- Septoria-Flecken: unregelmäßig, nekrotisch mit Pyknidien -->\n    <ellipse cx=\"70\" cy=\"45\" rx=\"22\" ry=\"13\" fill=\"#c9a86c\" stroke=\"#8B6914\" stroke-width=\"1\"/>\n    <ellipse cx=\"70\" cy=\"45\" rx=\"22\" ry=\"13\" fill=\"#d4b483\" opacity=\"0.7\"/>\n    <circle cx=\"62\" cy=\"42\" r=\"2\" fill=\"#111\"/>\n    <circle cx=\"70\" cy=\"48\" r=\"2\" fill=\"#111\"/>\n    <circle cx=\"79\" cy=\"43\" r=\"2\" fill=\"#111\"/>\n    <circle cx=\"66\" cy=\"50\" r=\"1.5\" fill=\"#111\"/>\n    <ellipse cx=\"130\" cy=\"70\" rx=\"18\" ry=\"10\" fill=\"#c9a86c\" stroke=\"#8B6914\" stroke-width=\"1\"/>\n    <circle cx=\"124\" cy=\"68\" r=\"2\" fill=\"#111\"/>\n    <circle cx=\"132\" cy=\"72\" r=\"2\" fill=\"#111\"/>\n    <circle cx=\"138\" cy=\"67\" r=\"1.5\" fill=\"#111\"/>\n    <ellipse cx=\"90\" cy=\"90\" rx=\"14\" ry=\"8\" fill=\"#c9a86c\" stroke=\"#8B6914\" stroke-width=\"1\"/>\n    <circle cx=\"86\" cy=\"89\" r=\"1.5\" fill=\"#111\"/>\n    <circle cx=\"93\" cy=\"92\" r=\"1.5\" fill=\"#111\"/>\n    <text x=\"100\" y=\"128\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#2d6a4f\" font-style=\"italic\">Weizen – Blatt</text>\n  </svg>","q":"Das Blatt zeigt bräunliche, nekrotische Flecken mit winzigen schwarzen Punkten. Welche Krankheit ist das?","o":["Septoria tritici (Blattdürre) – schwarze Pyknidien in bräunlichen Flecken sind das Diagnose-Merkmal","Gelbrost (Puccinia striiformis) – gelbe Sporenpusteln entlang der Blattadern in Längsstreifen","Echter Mehltau (Erysiphe graminis) – weißer, abwischbarer Belag auf der Blattoberseite","Halmbruch (Oculimacula) – linsenförmiger Augenfleck an der Halmbasis nahe dem Boden"],"a":0,"e":"Die winzigen schwarzen Pyknidien innerhalb der braungrauen Flecken sind das Diagnostik-Merkmal von Septoria tritici. Die Sporulation erfolgt bei Blattnässe; die Sporen werden durch Regenspritzer auf neue Blätter übertragen."},{"c":"Krankheit-Bild","img":"<svg viewBox=\"0 0 200 130\" xmlns=\"http://www.w3.org/2000/svg\">\n    <rect width=\"200\" height=\"130\" fill=\"#e8f5ec\" rx=\"8\"/>\n    <!-- Blatt -->\n    <path d=\"M30,100 Q30,20 100,15 Q170,20 170,100 Q135,115 100,118 Q65,115 30,100Z\" fill=\"#6abf69\" stroke=\"#2d6a4f\" stroke-width=\"1.5\"/>\n    <line x1=\"100\" y1=\"15\" x2=\"100\" y2=\"118\" stroke=\"#2d6a4f\" stroke-width=\"1.5\"/>\n    <!-- Echter Mehltau: weißlich-grauer Belag, \"wattig\" -->\n    <ellipse cx=\"80\" cy=\"50\" rx=\"30\" ry=\"16\" fill=\"white\" stroke=\"#ccc\" stroke-width=\"1\" opacity=\"0.92\"/>\n    <ellipse cx=\"85\" cy=\"55\" rx=\"22\" ry=\"11\" fill=\"#f0ede8\" opacity=\"0.8\"/>\n    <ellipse cx=\"120\" cy=\"75\" rx=\"26\" ry=\"13\" fill=\"white\" stroke=\"#ccc\" stroke-width=\"1\" opacity=\"0.9\"/>\n    <ellipse cx=\"118\" cy=\"78\" rx=\"18\" ry=\"9\" fill=\"#f0ede8\" opacity=\"0.8\"/>\n    <!-- Textur -->\n    <ellipse cx=\"75\" cy=\"48\" rx=\"8\" ry=\"5\" fill=\"white\" opacity=\"0.6\"/>\n    <ellipse cx=\"90\" cy=\"52\" rx=\"7\" ry=\"4\" fill=\"white\" opacity=\"0.6\"/>\n    <ellipse cx=\"115\" cy=\"73\" rx=\"8\" ry=\"4\" fill=\"white\" opacity=\"0.6\"/>\n    <text x=\"100\" y=\"128\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#2d6a4f\" font-style=\"italic\">Getreide – Blatt</text>\n  </svg>","q":"Das Blatt zeigt einen weißlich-grauen, watteartigen Belag auf der Oberfläche. Welche Krankheit liegt vor?","o":["Echter Mehltau (Erysiphe graminis) – ektotropher Pilz wächst auf Blattoberseite, abwischbar","Falscher Mehltau (Peronospora) – grauer Sporenrasen ausschließlich auf der Blattunterseite","Septoria nodorum – bräunliche Spelzenflecken an Ähren, kein Belag auf den Blättern","Ramularia collo-cygni – rechteckige, braune Flecken auf Fahnenblatt nach der Blüte"],"a":0,"e":"Echter Mehltau wächst als weißer, mehliger Pilzrasen auf der Blattoberseite (ektotropher Parasit). Er ist abwischbar und bevorzugt trocken-warme Bedingungen. Befallene Blätter verlieren Assimilationsfläche."},{"c":"Krankheit-Bild","img":"<svg viewBox=\"0 0 200 140\" xmlns=\"http://www.w3.org/2000/svg\">\n    <rect width=\"200\" height=\"140\" fill=\"#e8f5ec\" rx=\"8\"/>\n    <!-- Halm -->\n    <rect x=\"88\" y=\"10\" width=\"24\" height=\"100\" fill=\"#8bc34a\" stroke=\"#5d8a1e\" stroke-width=\"1.5\" rx=\"3\"/>\n    <!-- Halmbruch-Augenfleck -->\n    <ellipse cx=\"100\" cy=\"88\" rx=\"18\" ry=\"11\" fill=\"#d4a373\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <ellipse cx=\"100\" cy=\"88\" rx=\"10\" ry=\"6\" fill=\"#f5e6c8\" stroke=\"#8B6914\" stroke-width=\"1\"/>\n    <ellipse cx=\"100\" cy=\"88\" rx=\"4\" ry=\"3\" fill=\"#c9a86c\"/>\n    <!-- Pfeil auf Augenfleck -->\n    <line x1=\"148\" y1=\"88\" x2=\"120\" y2=\"88\" stroke=\"#e63946\" stroke-width=\"2\" marker-end=\"url(#redArr)\"/>\n    <text x=\"155\" y=\"92\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#e63946\" font-weight=\"bold\">!</text>\n    <!-- Boden -->\n    <rect x=\"20\" y=\"110\" width=\"160\" height=\"20\" fill=\"#8B7355\" rx=\"3\" opacity=\"0.4\"/>\n    <text x=\"100\" y=\"122\" text-anchor=\"middle\" font-size=\"9\" font-family=\"sans-serif\" fill=\"#fff\">Bodennähe</text>\n    <text x=\"100\" y=\"136\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#2d6a4f\" font-style=\"italic\">Getreide – Halmbasis</text>\n  </svg>","q":"Das Bild zeigt einen charakteristischen Fleck an der Halmbasis des Getreides. Welche Krankheit wird hier dargestellt?","o":["Halmbruch (Oculimacula) – linsenförmiger Augenfleck mit hellem Kern an der Halmbasis","Fusarium (Gibberella) – rötliche, diffuse Verfärbung der Halmbasis ohne scharfen Rand","Schwarzbeinigkeit (Pythium/Rhizoctonia) – Schwärzung und Einschnürung der Keimlingsbasis","Rhizoctonia solani – braune, diffuse Verbräunung ohne Augenfleck, meist bei Bodenfeuchte"],"a":0,"e":"Der charakteristische Augenfleck (helles Zentrum, dunkelbrauner Rand) an der Halmbasis ist das Kennzeichen des Halmbruchs. Der Pilz zerstört die Leitbündel – der Halm knickt ein, Ertragsausfälle durch gestörten Nährstofftransport sind die Folge."},{"c":"BBCH-Bild","img":"<svg viewBox=\"0 0 220 140\" xmlns=\"http://www.w3.org/2000/svg\">\n    <rect width=\"220\" height=\"140\" fill=\"#e8f5ec\" rx=\"8\"/>\n    <!-- Boden -->\n    <rect x=\"0\" y=\"105\" width=\"220\" height=\"35\" fill=\"#8B7355\" opacity=\"0.35\" rx=\"0\"/>\n    <!-- Haupttrieb -->\n    <line x1=\"90\" y1=\"105\" x2=\"90\" y2=\"30\" stroke=\"#5d8a1e\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n    <!-- Blätter am Haupttrieb -->\n    <path d=\"M90,85 Q65,75 55,60\" fill=\"none\" stroke=\"#6abf69\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n    <path d=\"M90,70 Q115,58 120,44\" fill=\"none\" stroke=\"#6abf69\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n    <path d=\"M90,55 Q68,45 62,32\" fill=\"none\" stroke=\"#6abf69\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n    <!-- Bestockungstriebe -->\n    <line x1=\"100\" y1=\"105\" x2=\"115\" y2=\"55\" stroke=\"#5d8a1e\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n    <path d=\"M115,75 Q135,65 140,52\" fill=\"none\" stroke=\"#6abf69\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n    <line x1=\"108\" y1=\"105\" x2=\"130\" y2=\"72\" stroke=\"#5d8a1e\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n    <line x1=\"80\" y1=\"105\" x2=\"62\" y2=\"58\" stroke=\"#5d8a1e\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n    <!-- BBCH Label -->\n    <rect x=\"148\" y=\"18\" width=\"58\" height=\"28\" fill=\"#2d6a4f\" rx=\"6\"/>\n    <text x=\"177\" y=\"30\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"white\">BBCH</text>\n    <text x=\"177\" y=\"42\" text-anchor=\"middle\" font-size=\"14\" font-family=\"sans-serif\" fill=\"white\" font-weight=\"bold\">2x</text>\n    <text x=\"110\" y=\"130\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#2d6a4f\" font-style=\"italic\">Winterweizen</text>\n  </svg>","q":"Das Diagramm zeigt eine Getreidepflanze mit Haupt- und mehreren Seitentrieben. Welchem BBCH-Hauptstadium entspricht das?","o":["BBCH 2x – Bestockung; x steht für die Anzahl der sichtbaren Bestockungstriebe (1–9)","BBCH 1x – Blattentwicklung; x steht für die Anzahl der entfalteten Laubblätter","BBCH 3x – Schossen; x steht für die Anzahl fühlbarer Knoten am gestreckten Halm","BBCH 5x – Ähren-/Rispenschieben; x steht für den Prozentsatz der herausgeschobenen Ähren"],"a":0,"e":"Das Bestockungsstadium (BBCH 20–29) ist an den seitlichen Trieben erkennbar, die aus der Blattachsel der Keimblätter entstehen. BBCH 21 = 1 Bestockungstrieb, BBCH 23 = 3 Bestockungstriebe usw. Wichtig für Herbizid-Timing."},{"c":"BBCH-Bild","img":"<svg viewBox=\"0 0 220 150\" xmlns=\"http://www.w3.org/2000/svg\">\n    <rect width=\"220\" height=\"150\" fill=\"#e8f5ec\" rx=\"8\"/>\n    <!-- Boden -->\n    <rect x=\"0\" y=\"118\" width=\"220\" height=\"32\" fill=\"#8B7355\" opacity=\"0.35\"/>\n    <!-- Halm -->\n    <line x1=\"110\" y1=\"118\" x2=\"110\" y2=\"30\" stroke=\"#8bc34a\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n    <!-- Knoten (Internodien) -->\n    <ellipse cx=\"110\" cy=\"100\" rx=\"10\" ry=\"5\" fill=\"#5d8a1e\"/>\n    <ellipse cx=\"110\" cy=\"78\" rx=\"10\" ry=\"5\" fill=\"#5d8a1e\"/>\n    <ellipse cx=\"110\" cy=\"56\" rx=\"10\" ry=\"5\" fill=\"#5d8a1e\"/>\n    <!-- Blattscheiden -->\n    <path d=\"M110,100 Q80,90 72,75\" fill=\"none\" stroke=\"#6abf69\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n    <path d=\"M110,78 Q138,66 142,52\" fill=\"none\" stroke=\"#6abf69\" stroke-width=\"3.5\" stroke-linecap=\"round\"/>\n    <!-- Fahnenblatt oben -->\n    <path d=\"M110,38 Q135,28 140,18\" fill=\"none\" stroke=\"#4a9e5c\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n    <!-- BBCH Label -->\n    <rect x=\"148\" y=\"18\" width=\"58\" height=\"28\" fill=\"#2d6a4f\" rx=\"6\"/>\n    <text x=\"177\" y=\"30\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"white\">BBCH</text>\n    <text x=\"177\" y=\"42\" text-anchor=\"middle\" font-size=\"14\" font-family=\"sans-serif\" fill=\"white\" font-weight=\"bold\">3x</text>\n    <text x=\"110\" y=\"142\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#2d6a4f\" font-style=\"italic\">Getreide – Schossen</text>\n  </svg>","q":"Die Pflanze zeigt gestreckte Internodien mit sichtbaren Knoten. In welchem BBCH-Stadium befindet sie sich?","o":["BBCH 3x – Schossen; gestreckte Internodien und fühlbare Knoten kennzeichnen dieses Stadium","BBCH 2x – Bestockung; seitliche Triebe sichtbar, aber Haupthalm noch nicht gestreckt","BBCH 5x – Ährenschieben; Ähre bewegt sich durch die Blattscheide nach oben","BBCH 1x – Blattentwicklung; nur Blätter vorhanden, noch kein Streckungs-Internodium"],"a":0,"e":"Das Schossen (BBCH 30–39) ist an der Streckung der Internodien erkennbar. BBCH 31 = 1. Knoten fühlbar, BBCH 37 = Fahnenblatt sichtbar. Wichtiger Zeitpunkt für Wachstumsregler und erste Fungizidmaßnahme."},{"c":"BBCH-Bild","img":"<svg viewBox=\"0 0 200 150\" xmlns=\"http://www.w3.org/2000/svg\">\n    <rect width=\"200\" height=\"150\" fill=\"#e8f5ec\" rx=\"8\"/>\n    <!-- Halm -->\n    <line x1=\"100\" y1=\"140\" x2=\"100\" y2=\"55\" stroke=\"#8bc34a\" stroke-width=\"5\"/>\n    <!-- Ähre vollständig herausgeschoben -->\n    <rect x=\"88\" y=\"18\" width=\"24\" height=\"40\" fill=\"#d4a373\" stroke=\"#8B6914\" stroke-width=\"1.5\" rx=\"3\"/>\n    <!-- Ährchen-Linien -->\n    <line x1=\"88\" y1=\"24\" x2=\"76\" y2=\"24\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"88\" y1=\"30\" x2=\"74\" y2=\"31\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"88\" y1=\"36\" x2=\"76\" y2=\"37\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"112\" y1=\"26\" x2=\"124\" y2=\"25\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"112\" y1=\"32\" x2=\"126\" y2=\"32\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"112\" y1=\"38\" x2=\"124\" y2=\"39\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <!-- Grannen -->\n    <line x1=\"91\" y1=\"18\" x2=\"87\" y2=\"5\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"96\" y1=\"18\" x2=\"94\" y2=\"4\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"100\" y1=\"18\" x2=\"100\" y2=\"3\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"104\" y1=\"18\" x2=\"106\" y2=\"4\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"109\" y1=\"18\" x2=\"113\" y2=\"5\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <!-- Fahnenblatt -->\n    <path d=\"M100,55 Q128,44 132,32\" fill=\"none\" stroke=\"#4a9e5c\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n    <!-- BBCH -->\n    <rect x=\"138\" y=\"18\" width=\"50\" height=\"28\" fill=\"#2d6a4f\" rx=\"6\"/>\n    <text x=\"163\" y=\"30\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"white\">BBCH</text>\n    <text x=\"163\" y=\"42\" text-anchor=\"middle\" font-size=\"14\" font-family=\"sans-serif\" fill=\"white\" font-weight=\"bold\">59</text>\n    <text x=\"100\" y=\"148\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#2d6a4f\" font-style=\"italic\">Weizen – Ähre vollst.</text>\n  </svg>","q":"Die Ähre ist vollständig aus der Blattscheide herausgeschoben. Welchem BBCH-Stadium entspricht das – und welche Maßnahme ist hier besonders zeitkritisch?","o":["BBCH 59 – Ähre vollständig herausgeschoben; letzte Chance für Fungizid vor der Blüte (ab BBCH 61)","BBCH 39 – letzter Knoten sichtbar; jetzt Zeitpunkt für Wachstumsregler im Getreide","BBCH 71 – Körner wasserreif; Fungizidwirkung hat keinen Einfluss mehr auf Ertrag","BBCH 51 – Beginn Ährenschieben; Ähre gerade in der Blattscheide sichtbar werdend"],"a":0,"e":"BBCH 59 markiert das Ende des Ährenschiebens. Die Blüte (BBCH 61–69) beginnt bald – der optimale Zeitpunkt für die Ährenbehandlung gegen Fusarium ist BBCH 61–65. Wird diese Phase verpasst, ist der Infektionsschutz deutlich reduziert."},{"c":"BBCH-Bild","img":"<svg viewBox=\"0 0 200 150\" xmlns=\"http://www.w3.org/2000/svg\">\n    <rect width=\"200\" height=\"150\" fill=\"#e8f5ec\" rx=\"8\"/>\n    <!-- Halm -->\n    <line x1=\"100\" y1=\"140\" x2=\"100\" y2=\"52\" stroke=\"#8bc34a\" stroke-width=\"5\"/>\n    <!-- Ähre -->\n    <rect x=\"88\" y=\"15\" width=\"24\" height=\"40\" fill=\"#d4a373\" stroke=\"#8B6914\" stroke-width=\"1.5\" rx=\"3\"/>\n    <line x1=\"88\" y1=\"22\" x2=\"76\" y2=\"22\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"88\" y1=\"30\" x2=\"74\" y2=\"31\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"88\" y1=\"38\" x2=\"76\" y2=\"39\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"112\" y1=\"22\" x2=\"124\" y2=\"22\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"112\" y1=\"30\" x2=\"126\" y2=\"31\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"112\" y1=\"38\" x2=\"124\" y2=\"39\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <!-- Staubbeutel (Antheren) herausstehend -->\n    <ellipse cx=\"82\" cy=\"24\" rx=\"5\" ry=\"2.5\" fill=\"#ffd166\" stroke=\"#c9893a\" stroke-width=\"1\"/>\n    <ellipse cx=\"78\" cy=\"33\" rx=\"5\" ry=\"2.5\" fill=\"#ffd166\" stroke=\"#c9893a\" stroke-width=\"1\"/>\n    <ellipse cx=\"80\" cy=\"41\" rx=\"5\" ry=\"2.5\" fill=\"#ffd166\" stroke=\"#c9893a\" stroke-width=\"1\"/>\n    <ellipse cx=\"118\" cy=\"25\" rx=\"5\" ry=\"2.5\" fill=\"#ffd166\" stroke=\"#c9893a\" stroke-width=\"1\"/>\n    <ellipse cx=\"122\" cy=\"33\" rx=\"5\" ry=\"2.5\" fill=\"#ffd166\" stroke=\"#c9893a\" stroke-width=\"1\"/>\n    <ellipse cx=\"120\" cy=\"41\" rx=\"5\" ry=\"2.5\" fill=\"#ffd166\" stroke=\"#c9893a\" stroke-width=\"1\"/>\n    <!-- Grannen -->\n    <line x1=\"96\" y1=\"15\" x2=\"94\" y2=\"4\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"100\" y1=\"15\" x2=\"100\" y2=\"3\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <line x1=\"104\" y1=\"15\" x2=\"106\" y2=\"4\" stroke=\"#8B6914\" stroke-width=\"1.5\"/>\n    <!-- Fahnenblatt -->\n    <path d=\"M100,52 Q128,42 133,30\" fill=\"none\" stroke=\"#4a9e5c\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n    <!-- BBCH -->\n    <rect x=\"138\" y=\"18\" width=\"50\" height=\"28\" fill=\"#2d6a4f\" rx=\"6\"/>\n    <text x=\"163\" y=\"30\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"white\">BBCH</text>\n    <text x=\"163\" y=\"42\" text-anchor=\"middle\" font-size=\"14\" font-family=\"sans-serif\" fill=\"white\" font-weight=\"bold\">65</text>\n    <text x=\"100\" y=\"148\" text-anchor=\"middle\" font-size=\"10\" font-family=\"sans-serif\" fill=\"#2d6a4f\" font-style=\"italic\">Weizen – Vollblüte</text>\n  </svg>","q":"Die gelben Staubbeutel (Antheren) hängen sichtbar aus den Ährchen heraus. Welches BBCH-Stadium und welche Behandlungsmaßnahme ist jetzt optimal?","o":["BBCH 65 – Vollblüte; optimaler Termin für Fusarium-Ährenbehandlung mit Azol oder SDHI-Azol","BBCH 39 – letzter Knoten sichtbar; jetzt Wachstumsregler und erste Fungizidbehandlung","BBCH 29 – Bestockungsende; jetzt Herbizidanwendung und Bestandsschluss abwarten","BBCH 77 – teigige Reife; Behandlungen haben keinen wirtschaftlichen Nutzen mehr"],"a":0,"e":"BBCH 65 (Vollblüte, Antheren hängen sichtbar heraus) ist das optimale Behandlungsstadium gegen Fusarium in der Ähre. Die Infektion erfolgt genau in diesem Zeitfenster – ein Behandlungsverzug von 3–4 Tagen kann den Wirkungsgrad auf 50 % halbieren."}];

(function applyAnswerPatches() {
  fullPool.forEach(q => {
    for(const [fragment, [newOpts, newA]] of Object.entries(answerPatches)) {
      if(new RegExp(fragment).test(q.q)) {
        q.o = newOpts;
        q.a = newA;
        break;
      }
    }
  });
})();

function renderIntro() {
  phase = 'intro';
  $('stats-bar').style.display = 'none';
  $('main-content').innerHTML = `
    <div class="intro-card">
      <div class="intro-icon">🌿</div>
      <h2 class="intro-title">Prüfungstraining starten</h2>
      <p class="intro-desc">
        Du bekommst 30 zufällig ausgewählte Fragen aus allen Themenbereichen.
        Die Fragen sind so formuliert, dass du wirklich verstehst – nicht nur auswendig lernst.
      </p>
      <div class="topics-grid">
        <div class="topic-item"><span class="topic-dot"></span>Technik & Geräte</div>
        <div class="topic-item"><span class="topic-dot"></span>Pflanzenkrankheiten</div>
        <div class="topic-item"><span class="topic-dot"></span>Schädlinge & Biologie</div>
        <div class="topic-item"><span class="topic-dot"></span>Recht & Zulassung</div>
        <div class="topic-item"><span class="topic-dot"></span>Wirkstoffe & Resistenz</div>
        <div class="topic-item"><span class="topic-dot"></span>Umwelt & Gewässerschutz</div>
      </div>
      <button class="start-btn" onclick="startQuiz()">Training beginnen →</button>
    </div>
  `;
}

function startQuiz() {
  activeQuestions = [...fullPool].sort(() => Math.random() - 0.5).slice(0, 30);
  currentIndex = 0;
  score = 0;
  wrongCount = 0;
  answered = 0;
  phase = 'quiz';
  $('stats-bar').style.display = 'flex';
  updateStats();
  renderQuestion();
}

function getCatClass(c) {
  if(c === 'GHS-Bild') return 'cat-ghs';
  if(c === 'Technik-Bild') return 'cat-techbild';
  if(c === 'Krankheit-Bild') return 'cat-krank';
  if(c === 'BBCH-Bild') return 'cat-bbch';
  return '';
}

function renderQuestion() {
  const q = activeQuestions[currentIndex];
  const progress = ((currentIndex) / 30) * 100;

  currentShuffledOpts = q.o.map((text, i) => ({text, origIdx: i}));
  currentShuffledOpts.sort(() => Math.random() - 0.5);

  const optionsHTML = currentShuffledOpts.map((opt, pos) => `
    <button class="opt-btn" onclick="checkAnswer(${opt.origIdx})" data-orig="${opt.origIdx}">
      <span class="opt-letter">${letters[pos]}</span>
      <span>${opt.text}</span>
    </button>
  `).join('');

  const imageHTML = q.img ? `<div class="q-image">${q.img}</div>` : '';
  const catClass = getCatClass(q.c);

  $('main-content').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:${progress}%"></div></div>
      <span class="progress-label">${currentIndex + 1} / 30</span>
    </div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-category ${catClass}">${q.c}</span>
        <span class="q-number">Frage ${currentIndex + 1}</span>
      </div>
      ${imageHTML}
      <p class="q-text">${q.q}</p>
      <div class="options-grid" id="options-grid">
        ${optionsHTML}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">
        ${currentIndex < 29 ? 'Nächste Frage' : 'Ergebnis anzeigen'}
      </button>
    </div>
  `;
}

function checkAnswer(selected) {
  const q = activeQuestions[currentIndex];
  const correct = q.a;
  const explanation = q.e;

  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = $('feedback');
  const nextBtn = $('next-btn');

  // Highlight correct answer
  allBtns.forEach(b => {
    const orig = parseInt(b.getAttribute('data-orig'));
    if(orig === correct) b.classList.add('correct');
  });

  if(selected === correct) {
    score++;
    fb.className = 'feedback correct-fb';
    fb.innerHTML = `<span class="feedback-icon">✅</span><strong>Richtig!</strong> ${explanation}`;
  } else {
    wrongCount++;
    // Highlight the clicked wrong button
    allBtns.forEach(b => {
      if(parseInt(b.getAttribute('data-orig')) === selected) b.classList.add('wrong');
    });
    fb.className = 'feedback wrong-fb';
    fb.innerHTML = `<span class="feedback-icon">❌</span><strong>Falsch.</strong> ${explanation}`;
  }

  fb.style.display = 'block';
  nextBtn.style.display = 'block';
  answered++;
  updateStats();
}

function updateStats() {
  $('stat-score').textContent = score;
  $('stat-wrong').textContent = wrongCount;
  $('stat-pct').textContent = answered > 0 ? Math.round((score/answered)*100) + '%' : '–';
}

function nextQuestion() {
  currentIndex++;
  if(currentIndex < 30) renderQuestion();
  else showResult();
}

function showResult() {
  phase = 'result';
  const pct = Math.round((score/30)*100);
  let icon, msg;
  if(pct >= 85) { icon = '🏆'; msg = 'Hervorragende Leistung! Du bist bestens auf die Kammerprüfung vorbereitet. Wiederhole die wenigen Fehler noch einmal kurz.'; }
  else if(pct >= 70) { icon = '✅'; msg = 'Gutes Ergebnis! Noch ein paar gezielte Wiederholungen in den Schwachstellen, und die Prüfung wird kein Problem für dich.'; }
  else if(pct >= 50) { icon = '📚'; msg = 'Solide Basis, aber du solltest die Lücken schließen – besonders in Technik und Recht. Nochmal üben!'; }
  else { icon = '🔄'; msg = 'Das Ergebnis zeigt: Hier ist noch Lernbedarf. Geh die Bereiche systematisch durch und starte dann ein neues Training.'; }

  $('main-content').innerHTML = `
    <div class="result-card">
      <div class="result-icon">${icon}</div>
      <h2 class="result-title">Prüfungssimulation abgeschlossen</h2>
      <div class="score-display">
        <span class="score-number">${pct}</span>
        <span class="score-unit">%</span>
      </div>
      <div class="result-breakdown">
        <div class="breakdown-item">
          <span class="breakdown-num good">${score}</span>
          <span class="breakdown-label">Richtig</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-num bad">${wrongCount}</span>
          <span class="breakdown-label">Falsch</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-num">${30}</span>
          <span class="breakdown-label">Gesamt</span>
        </div>
      </div>
      <p class="result-msg">${msg}</p>
      <button class="restart-btn" onclick="renderIntro()">Neues Training starten</button>
    </div>
  `;
}

renderIntro();
</script>
